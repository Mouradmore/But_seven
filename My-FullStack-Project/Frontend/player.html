<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>But_Seven Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ================= CSS ================= */
        body { margin: 0; background-color: #0f0f0f; color: #fff; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        .player-page-layout { display: flex; height: 100vh; gap: 20px; padding: 20px; box-sizing: border-box; }
        .main-player-section { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .player-container { position: relative; width: 100%; height: 70vh; background: #000; border-radius: 12px; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        #main-video { width: 100%; height: 100%; object-fit: contain; }
        #brightness-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0); pointer-events: none; z-index: 10; }
        #touch-layer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 20; }
        
        .controls-container { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 15px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); display: flex; flex-direction: column; gap: 15px; z-index: 30; transition: opacity 0.3s ease; }
        .progress-area { display: flex; align-items: center; gap: 10px; color: #fff; font-size: 14px; font-weight: bold; }
        #progress-bar { flex: 1; cursor: pointer; accent-color: #007bff; height: 4px; background: rgba(255, 255, 255, 0.3); border-radius: 5px; outline: none; }
        .buttons-area { display: flex; justify-content: space-between; }
        .control-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; transition: transform 0.2s; }
        .control-btn:hover { transform: scale(1.1); color: #007bff; }

        .current-video-details { margin-top: 15px; padding: 10px; }
        .current-video-details h1 { font-size: 20px; margin: 0 0 10px 0; }
        .video-meta { color: #aaa; font-size: 14px; display: flex; gap: 15px; }

        /* القائمة الجانبية والتفاعلات */
        .playlist-sidebar { width: 350px; display: flex; flex-direction: column; background: #1c1c1c; border-radius: 12px; overflow: hidden; }
        .playlist-header { padding: 15px; background: #252525; border-bottom: 1px solid #333; }
        .playlist-header h3 { margin: 0; font-size: 16px; display: flex; justify-content: space-between; }
        .playlist-items { flex: 1; overflow-y: auto; padding: 10px; }
        .playlist-items::-webkit-scrollbar { width: 6px; }
        .playlist-items::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        .playlist-card { display: flex; gap: 10px; margin-bottom: 15px; cursor: pointer; border-radius: 8px; padding: 5px; transition: background 0.2s; }
        .playlist-card:hover { background: #2a2a2a; }
        .playlist-thumb { width: 120px; height: 68px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
        .playlist-info { display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .playlist-title { font-size: 13px; font-weight: bold; margin: 0 0 5px 0; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .playlist-author { font-size: 11px; color: #aaa; }

        .interaction-sidebar { position: absolute; right: 20px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; z-index: 40; }
        .interact-btn { background: rgba(0, 0, 0, 0.5); border: none; color: #fff; font-size: 24px; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        .interact-btn span { font-size: 12px; margin-top: 2px; }
        .interact-btn.liked i { color: #ff3b30; }

        .comments-panel { position: absolute; bottom: 0; left: 0; width: 100%; height: 60vh; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border-top-left-radius: 20px; border-top-right-radius: 20px; z-index: 50; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .comments-panel.open { transform: translateY(0); }
        .panel-header { display: flex; justify-content: space-between; padding: 15px 20px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .comments-list { flex: 1; overflow-y: auto; padding: 15px; color: #fff; }
        .comment-input-area { display: flex; padding: 15px; background: rgba(0,0,0,0.5); gap: 10px; }
        #comment-input { flex: 1; padding: 10px 15px; border-radius: 20px; border: none; outline: none; background: #333; color: #fff; }
        #submit-comment { background: #007bff; color: #fff; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }

        @media (max-width: 900px) {
            .player-page-layout { flex-direction: column; height: auto; padding: 0; gap: 0; }
            .player-container { height: 40vh; border-radius: 0; }
            .playlist-sidebar { width: 100%; border-radius: 0; margin-top: 20px; }
        }
    </style>
</head>

<body>
    <div class="player-page-layout">
        <div class="main-player-section">
            <div id="but-seven-player" class="player-container">
                <video id="main-video" playsinline></video>
                <div id="brightness-overlay"></div>
                <div id="touch-layer"></div>
                <div id="ui-controls" class="controls-container">
                    <div class="progress-area">
                        <span id="current-time">0:00</span>
                        <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
                        <span id="total-time">0:00</span>
                    </div>
                    <div class="buttons-area">
                        <button id="play-pause-btn" class="control-btn"><i class="fas fa-play"></i></button>
                        <button id="fullscreen-btn" class="control-btn"><i class="fas fa-expand"></i></button>
                    </div>
                </div>
            </div>
            
            <div class="current-video-details">
                <h1 id="video-title-display">جاري التحميل...</h1>
                <div class="video-meta">
                    <span id="video-author-display"></span>
                    <span id="video-views-display"></span>
                </div>
            </div>
        </div>
        
        <aside class="playlist-sidebar">
            <div class="playlist-header">
                <h3>التالي <i class="fas fa-list-ul"></i></h3>
            </div>
            <div id="playlist-container" class="playlist-items">
                </div>
        </aside>
    </div>

    <div class="interaction-sidebar">
        <button id="like-btn" class="interact-btn">
            <i class="fas fa-heart"></i>
            <span id="likes-count">0</span>
        </button>
        <button id="comment-btn" class="interact-btn">
            <i class="fas fa-comment-dots"></i>
            <span id="comments-count">0</span>
        </button>
    </div>

    <div id="comments-panel" class="comments-panel">
        <div class="panel-header">
            <h3>التعليقات</h3>
            <button id="close-comments" style="background:none; border:none; color:white; cursor:pointer;"><i class="fas fa-times"></i></button>
        </div>
        <div id="comments-list" class="comments-list"></div>
        <div class="comment-input-area">
            <input type="text" id="comment-input" placeholder="اكتب تعليقاً...">
            <button id="submit-comment"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
 
   <script>
       // ================= JavaScript =================
const video = document.getElementById('main-video');
const touchLayer = document.getElementById('touch-layer');
const brightnessOverlay = document.getElementById('brightness-overlay');
const playlistContainer = document.getElementById('playlist-container');

let currentVideoId = null;

// المتغيرات لحفظ حالة اللمس
let startX = 0, startY = 0, currentVolume = 1, currentBrightness = 0, isSwiping = false;
const SWIPE_THRESHOLD = 30, SEEK_SECONDS = 10;

// 1. التقاط بداية اللمس
if (touchLayer) {
    touchLayer.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        currentVolume = video ? video.volume : 1;
        isSwiping = false;
    });

    // 2. تتبع حركة السحب
    touchLayer.addEventListener('touchmove', (e) => {
        if (!e.touches.length || !video) return;
        const currentX = e.touches[0].clientX, currentY = e.touches[0].clientY;
        const diffX = currentX - startX, diffY = currentY - startY;
        
        if (Math.abs(diffX) > SWIPE_THRESHOLD || Math.abs(diffY) > SWIPE_THRESHOLD) {
            isSwiping = true;
            if (Math.abs(diffY) > Math.abs(diffX)) {
                const swipeDistance = diffY / window.innerHeight;
                if (startX > window.innerWidth / 2) {
                    video.volume = Math.max(0, Math.min(1, currentVolume - swipeDistance));
                } else if (brightnessOverlay) {
                    let newBrightness = Math.max(0, Math.min(0.8, currentBrightness + swipeDistance));
                    brightnessOverlay.style.backgroundColor = `rgba(0, 0, 0, ${newBrightness})`;
                    currentBrightness = newBrightness;
                }
            }
        }
    });

    // 3. النقر المزدوج (التقديم والتأخير)
    let lastTapTime = 0;
    touchLayer.addEventListener('touchend', (e) => {
        if (!video) return;
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTapTime;
        
        if (!isSwiping && tapLength < 300 && tapLength > 0) {
            const tapX = e.changedTouches[0].clientX;
            if (tapX > window.innerWidth / 2) video.currentTime += SEEK_SECONDS;
            else video.currentTime -= SEEK_SECONDS;
            e.preventDefault();
        }
        lastTapTime = currentTime;
    });
}

// 4. عناصر التحكم بالفيديو
const playPauseBtn = document.getElementById('play-pause-btn');
const progressBar = document.getElementById('progress-bar');
const currentTimeEl = document.getElementById('current-time');
const totalTimeEl = document.getElementById('total-time');
const fullscreenBtn = document.getElementById('fullscreen-btn');
const uiControls = document.getElementById('ui-controls');

function formatTime(seconds) {
    if (isNaN(seconds)) return "0:00";
    const min = Math.floor(seconds / 60);
    const sec = Math.floor(seconds % 60);
    return `${min}:${sec < 10 ? '0' : ''}${sec}`;
}

function togglePlay() {
    if (!video || !video.src) return; 
    
    if (video.paused) { 
        video.play().catch(e => console.log("التشغيل يحتاج تفاعل المستخدم")); 
        if (playPauseBtn) playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>'; 
    } else { 
        video.pause(); 
        if (playPauseBtn) playPauseBtn.innerHTML = '<i class="fas fa-play"></i>'; 
    }
}

if (playPauseBtn) playPauseBtn.addEventListener('click', togglePlay);
if (touchLayer) touchLayer.addEventListener('click', (e) => { if (!isSwiping) togglePlay(); });

if (video) {
    video.addEventListener('ended', () => {
        if (playPauseBtn) playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
    });

    video.addEventListener('timeupdate', () => {
        if (video.duration && progressBar) {
            progressBar.value = (video.currentTime / video.duration) * 100;
            if (currentTimeEl) currentTimeEl.textContent = formatTime(video.currentTime);
            if (totalTimeEl) totalTimeEl.textContent = formatTime(video.duration);
        }
    });
}

if (progressBar) {
    progressBar.addEventListener('input', (e) => { 
        if (video && video.duration) video.currentTime = (e.target.value / 100) * video.duration; 
    });
}

if (fullscreenBtn) {
    fullscreenBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) { 
            document.documentElement.requestFullscreen().catch(e => console.log(e)); 
            fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>'; 
        } else { 
            document.exitFullscreen(); 
            fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>'; 
        }
    });
}

let timeout;
function resetHideUI() {
    if (uiControls) {
        uiControls.style.opacity = '1';
        clearTimeout(timeout);
        timeout = setTimeout(() => { if (video && !video.paused) uiControls.style.opacity = '0'; }, 3000);
    }
}
document.addEventListener('mousemove', resetHideUI);
document.addEventListener('touchstart', resetHideUI);

// =======================================================
// 5. النظام الذكي والمحمي لاستخراج الفيديوهات (بدون انهيار)
// =======================================================

function getVideosFromLocalProjects() {
    let videoProjects = [];
    try {
        const allProjects = JSON.parse(localStorage.getItem('codeProjects') || '[]');
        const parser = new DOMParser();

        allProjects.forEach(p => {
            const code = (p.htmlCode || p.html || '');
            if (!code) return;

            // تحويل الكود إلى عناصر HTML حقيقية للبحث داخلها بأمان
            const doc = parser.parseFromString(code, 'text/html');
            
            let extractedUrl = '';
            
            // البحث عن مصدر الفيديو
            const sourceTag = doc.querySelector('source');
            const videoTag = doc.querySelector('video');
            const iframeTag = doc.querySelector('iframe[src*="youtube.com"], iframe[src*="youtu.be"]');

            if (sourceTag && sourceTag.getAttribute('src')) {
                extractedUrl = sourceTag.getAttribute('src');
            } else if (videoTag && videoTag.getAttribute('src')) {
                extractedUrl = videoTag.getAttribute('src');
            } else if (iframeTag && iframeTag.getAttribute('src')) {
                extractedUrl = iframeTag.getAttribute('src');
            }

            if (extractedUrl) {
                videoProjects.push({
                    id: p.id || Math.random().toString(36).substr(2, 9),
                    title: p.title || 'مشروع بدون عنوان',
                    author: p.author || 'But_Seven',
                    views: p.views || 0,
                    videoUrl: extractedUrl, 
                    thumbnail: p.profilePic || 'data:image/svg+xml;charset=utf-8,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ccc"%3E%3Cpath d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/%3E%3C/svg%3E',
                    isYouTube: extractedUrl.includes('youtube') || extractedUrl.includes('youtu.be')
                });
            }
        });
    } catch (error) {
        console.error("خطأ أثناء قراءة المشاريع:", error);
    }
    return videoProjects;
}

function loadPlaylist(videos) {
    if (!playlistContainer) return;
    playlistContainer.innerHTML = ''; 
    
    videos.forEach(vid => {
        const card = document.createElement('div');
        card.className = 'playlist-card';
        card.addEventListener('click', () => { window.location.href = `player.html?v=${vid.id}`; });
        
        card.innerHTML = `
            <img class="playlist-thumb" src="${vid.thumbnail}" alt="Thumb">
            <div class="playlist-info">
                <h4 class="playlist-title">${vid.title}</h4>
                <span class="playlist-author">${vid.author}</span>
            </div>
        `;
        playlistContainer.appendChild(card);
    });
}

function fetchAndLoadVideo(requestedId = null) {
    let videos = getVideosFromLocalProjects();
    
    // 💡 فيديو تجريبي احتياطي: إذا لم يجد النظام أي مشروع يحتوي على فيديو، سيعرض هذا الفيديو لكي لا تظل الشاشة سوداء!
    if (videos.length === 0) {
        videos = [{
            id: 'demo123',
            title: 'فيديو تجريبي (لم يتم العثور على مشاريع)',
            author: 'النظام',
            views: 999,
            videoUrl: 'https://www.w3schools.com/html/mov_bbb.mp4', // فيديو تجريبي مجاني
            thumbnail: 'data:image/svg+xml;charset=utf-8,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ccc"%3E%3Cpath d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/%3E%3C/svg%3E',
            isYouTube: false
        }];
    }

    let targetVideo = requestedId ? videos.find(v => String(v.id) === String(requestedId)) : videos[0];
    if (!targetVideo) targetVideo = videos[0]; 
    
    if (targetVideo) {
        currentVideoId = targetVideo.id;
        
        if (targetVideo.isYouTube) {
            if (video) video.style.display = 'none';
            const playerContainer = document.getElementById('but-seven-player');
            if (playerContainer) {
                playerContainer.innerHTML += `<iframe src="${targetVideo.videoUrl}" width="100%" height="100%" frameborder="0" allowfullscreen style="position:absolute; top:0; left:0; z-index: 50;"></iframe>`;
            }
        } else {
            if (video) {
                video.src = targetVideo.videoUrl;
                video.load();
            }
        }
        
        // تحديث النصوص
        const titleDisplay = document.getElementById('video-title-display');
        const authorDisplay = document.getElementById('video-author-display');
        const viewsDisplay = document.getElementById('video-views-display');
        
        if (titleDisplay) titleDisplay.textContent = targetVideo.title;
        if (authorDisplay) authorDisplay.innerHTML = `<i class="fas fa-user-circle"></i> ${targetVideo.author}`;
        if (viewsDisplay) viewsDisplay.innerHTML = `<i class="fas fa-eye"></i> ${targetVideo.views} مشاهدة`;
        
        loadPlaylist(videos);
    }
}

// 6. تشغيل الكود بمجرد أن تجهز الصفحة
window.addEventListener('DOMContentLoaded', () => {
    try {
        const urlParams = new URLSearchParams(window.location.search);
        const requestedVideoId = urlParams.get('v');
        fetchAndLoadVideo(requestedVideoId);
    } catch (e) {
        console.error("حدث خطأ غير متوقع أثناء بدء التشغيل:", e);
    }
});
</script>
</body>
</html>
