body {
    margin: 0;
    background-color: #0f0f0f;
    color: #fff;

.player-page-layout {
    display: flex;
    height: 100vh;
    gap: 20px;

/* قسم الفيديو يأخذ المساحة المتبقية */
.main-player-section {

/* ضمان بقاء المشغل بحدود معينة */
.player-container {

.current-video-details {

}

.current-video-details h1 {

}

.video-meta {
    color: #aaa;
    font-size: 14px;

/* القائمة الجانبية */

    flex-direction: column;
    background: #1c1c1c;

.playlist-header {

}

.playlist-header h3 {

    font-size: 16px;
    display: flex;
    justify-content: space-between;
}

.playlist-items {

    overflow-y: auto;

}

/* تحسين شكل شريط التمرير للقائمة الجانبية */
.playlist-items::-webkit-scrollbar { width: 6px; }
.playlist-items::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

/* عناصر قائمة التشغيل (الكروت المصغرة) */
.playlist-card {

    padding: 5px;

.playlist-card:hover {

}

.playlist-thumb {

    height: 68px;

}

.playlist-title {
    font-size: 13px;

        width: 100%;
        border-radius: 0;

    }

<script>
  const video = document.getElementById('main-video');
const touchLayer = document.getElementById('touch-layer');
const brightnessOverlay = document.getElementById('brightness-overlay');

// المتغيرات لحفظ حالة اللمس
let startX = 0;
let startY = 0;
let currentVolume = 1; // من 0 إلى 1
let currentBrightness = 0; // من 0 (مضيء) إلى 1 (معتم بالكامل)
let isSwiping = false;

// إعدادات حساسية السحب
const SWIPE_THRESHOLD = 30; // المسافة المطلوبة لاعتبار اللمس "سحباً"
const SEEK_SECONDS = 10; // عدد الثواني للتقديم/التأخير عند النقر المزدوج

// 1. التقاط بداية اللمس
touchLayer.addEventListener('touchstart', (e) => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
  currentVolume = video.volume;
  isSwiping = false;
});

// 2. تتبع حركة السحب
touchLayer.addEventListener('touchmove', (e) => {
  if (!e.touches.length) return;
  
  const currentX = e.touches[0].clientX;
  const currentY = e.touches[0].clientY;
  
  const diffX = currentX - startX;
  const diffY = currentY - startY;
  
  // التأكد أن المستخدم يسحب فعلياً وليس مجرد نقرة طويلة
  if (Math.abs(diffX) > SWIPE_THRESHOLD || Math.abs(diffY) > SWIPE_THRESHOLD) {
    isSwiping = true;
    
    // تحديد ما إذا كان السحب أفقياً أم عمودياً
    if (Math.abs(diffY) > Math.abs(diffX)) {
      // -- السحب العمودي (أعلى/أسفل) --
      const screenWidth = window.innerWidth;
      const swipeDistance = diffY / window.innerHeight; // نسبة السحب من حجم الشاشة
      
      if (startX > screenWidth / 2) {
        // النصف الأيمن: التحكم بالصوت
        let newVolume = currentVolume - swipeDistance;
        // التأكد أن الصوت بين 0 و 1
        video.volume = Math.max(0, Math.min(1, newVolume));
      } else {
        // النصف الأيسر: التحكم بالسطوع (الوهمي)
        let newBrightness = currentBrightness + swipeDistance;
        newBrightness = Math.max(0, Math.min(0.8, newBrightness)); // أقصى تعتيم 80% لكي لا تختفي الشاشة
        brightnessOverlay.style.backgroundColor = `rgba(0, 0, 0, ${newBrightness})`;
        currentBrightness = newBrightness;
      }
    } else {
      // -- السحب الأفقي (يمين/يسار) --
      // يمكن استخدام هذه المساحة لتغيير موضع الفيديو (Seek) بربط diffX بـ video.currentTime
      // مثال: video.currentTime += (diffX > 0 ? 1 : -1) * 0.5;
    }
  }
});

// 3. النقر المزدوج (التقديم والتأخير)
let lastTapTime = 0;
touchLayer.addEventListener('touchend', (e) => {
  const currentTime = new Date().getTime();
  const tapLength = currentTime - lastTapTime;
  
  // إذا لم يكن هناك سحب، وكانت النقرة سريعة (أقل من 300 ملي ثانية)
  if (!isSwiping && tapLength < 300 && tapLength > 0) {
    const screenWidth = window.innerWidth;
    const tapX = e.changedTouches[0].clientX;
    
    if (tapX > screenWidth / 2) {
      // نقر مزدوج على اليمين: تقديم
      video.currentTime += SEEK_SECONDS;
    } else {
      // نقر مزدوج على اليسار: تأخير
      video.currentTime -= SEEK_SECONDS;
    }
    
    // منع تشغيل النقر المزدوج الافتراضي للمتصفح
    e.preventDefault();
  }
  
  lastTapTime = currentTime;
});
const playPauseBtn = document.getElementById('play-pause-btn');
const progressBar = document.getElementById('progress-bar');
const currentTimeEl = document.getElementById('current-time');
const totalTimeEl = document.getElementById('total-time');
const fullscreenBtn = document.getElementById('fullscreen-btn');
const uiControls = document.getElementById('ui-controls');

// 1. تحويل الثواني إلى صيغة دقائق:ثواني
function formatTime(seconds) {
    const min = Math.floor(seconds / 60);
    const sec = Math.floor(seconds % 60);
    return `${min}:${sec < 10 ? '0' : ''}${sec}`;
}

// 2. التشغيل والإيقاف المؤقت
function togglePlay() {
    if (video.paused) {
        video.play();
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
    } else {
        video.pause();
        playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
    }
}
playPauseBtn.addEventListener('click', togglePlay);

// عند النقر على الفيديو نفسه للتشغيل/الإيقاف (تضاف لطبقة اللمس)
touchLayer.addEventListener('click', (e) => {
    // التأكد من أن النقرة ليست سحباً
    if (!isSwiping) togglePlay();
});

// 3. تحديث شريط التقدم والوقت أثناء التشغيل
video.addEventListener('timeupdate', () => {
    const current = video.currentTime;
    const duration = video.duration;
    
    if (duration) {
        // تحديث قيمة الشريط
        progressBar.value = (current / duration) * 100;
        // تحديث النصوص
        currentTimeEl.textContent = formatTime(current);
        totalTimeEl.textContent = formatTime(duration);
    }
});

// 4. تغيير وقت الفيديو عند سحب شريط التقدم
progressBar.addEventListener('input', (e) => {
    const seekTime = (e.target.value / 100) * video.duration;
    video.currentTime = seekTime;
});

// 5. وضع ملء الشاشة الفعلي (للمتصفح)
fullscreenBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
    } else {
        document.exitFullscreen();
        fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
    }
});

// 6. إخفاء الواجهة تلقائياً عند عدم التفاعل
let timeout;
function resetHideUI() {
    uiControls.style.opacity = '1';
    clearTimeout(timeout);
    timeout = setTimeout(() => {
        if (!video.paused) uiControls.style.opacity = '0';
    }, 3000);
}
document.addEventListener('mousemove', resetHideUI);
document.addEventListener('touchstart', resetHideUI);
if ('mediaSession' in navigator) {
  // تحديث بيانات الإشعار عند تحميل فيديو جديد
  function updateMediaSession(title, artist, artworkUrl) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: title,
      artist: artist,
      artwork: [
        { src: artworkUrl, sizes: '512x512', type: 'image/jpeg' }
      ]
    });
  }
  
  // ربط أزرار الإشعارات بوظائف المشغل
  navigator.mediaSession.setActionHandler('play', () => {
    video.play();
    playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
  });
  
  navigator.mediaSession.setActionHandler('pause', () => {
    video.pause();
    playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
  });
  
  navigator.mediaSession.setActionHandler('seekforward', () => {
    video.currentTime = Math.min(video.currentTime + 10, video.duration);
  });
  
  navigator.mediaSession.setActionHandler('seekbackward', () => {
    video.currentTime = Math.max(video.currentTime - 10, 0);
  });
  
  // استدعاء تجريبي للبيانات (يتم استبدالها لاحقاً ببيانات الـ API)
  updateMediaSession('عنوان الفيديو التجريبي', 'But_Seven_Dev', 'path/to/cover.jpg');
}

            card.addEventListener('click', () => {

            card.innerHTML = `
                <img class="playlist-thumb" src="${video.thumbnail || 'img/default-thumb.jpg'}" alt="${video.title}">

                    <span class="playlist-author">${video.author || 'But_Seven'}</span>
                </div>
            `;
            
            playlistContainer.appendChild(card);
        });
        
    } catch (error) {
        console.error('خطأ في تحميل القائمة الجانبية:', error);
        playlistContainer.innerHTML = '<p style="text-align:center; color:#ff3b30; font-size:12px;">حدث خطأ في تحميل الفيديوهات.</p>';
    }
}
