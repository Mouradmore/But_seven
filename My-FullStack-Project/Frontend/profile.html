<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>الملف الشخصي | But_Seven</title>
    <style>
        /* ===== متغيرات الوضع الليلي ===== */
        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-glass: rgba(255,255,255,0.6);
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #8888aa;
            --border-color: #e8ecf1;
            --shadow-color: rgba(0,0,0,0.08);
            --shadow-hover: rgba(0,0,0,0.15);
            --accent-color: #667eea;
            --accent-hover: #5a6fd6;
            --gradient-hero: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --header-bg: #ffffff;
            --header-shadow: 0 2px 20px rgba(0,0,0,0.08);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --glass-blur: 15px;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #f5a623;
            --info: #17a2b8;
        }

        [data-theme="dark"] {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #1e1e36;
            --bg-glass: rgba(26,26,46,0.8);
            --text-primary: #e8e8f0;
            --text-secondary: #b0b0cc;
            --text-muted: #6a6a8a;
            --border-color: #2a2a4a;
            --shadow-color: rgba(0,0,0,0.3);
            --shadow-hover: rgba(0,0,0,0.5);
            --accent-color: #7c8cf5;
            --accent-hover: #6a7ae0;
            --gradient-hero: linear-gradient(135deg, #1a1a3e 0%, #2d1b69 100%);
            --header-bg: #12122a;
            --header-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        /* ===== CSS العامة ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            direction: rtl;
            text-align: right;
            transition: all var(--transition);
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-hover); }

        /* ===== شاشة التحميل ===== */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loadingScreen .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #loadingScreen p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        #loadingScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ===== الهيدر ===== */
        header {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--header-shadow);
            transition: all var(--transition);
        }

        header .logo {
            font-weight: 800;
            font-size: 1.2rem;
            background: var(--gradient-hero);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        header .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all var(--transition);
            color: var(--text-secondary);
        }

        .theme-toggle:hover {
            transform: rotate(20deg);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all var(--transition);
        }

        .menu-btn:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* ===== القائمة الجانبية ===== */
        .sidebarx {
            height: 100%;
            width: 0;
            position: fixed;
            top: 0;
            right: 0;
            background: var(--bg-secondary);
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
            box-shadow: -4px 0 30px rgba(0,0,0,0.15);
            z-index: 1500;
            border-left: 1px solid var(--border-color);
        }

        .sidebarx .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 10px;
        }

        .sidebarx .sidebar-header h3 {
            color: var(--text-primary);
            font-weight: 700;
        }

        .sidebarx a {
            padding: 12px 20px;
            text-decoration: none;
            font-size: 0.95rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all var(--transition);
            border-right: 3px solid transparent;
        }

        .sidebarx a:hover {
            color: var(--accent-color);
            background: var(--bg-primary);
            border-right-color: var(--accent-color);
        }

        .sidebarx a.active {
            color: var(--accent-color);
            background: var(--bg-primary);
            border-right-color: var(--accent-color);
        }

        .sidebarx .closebtn {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all var(--transition);
        }

        .sidebarx .closebtn:hover {
            color: var(--accent-color);
            transform: rotate(90deg);
        }

        /* ===== المحتوى الرئيسي ===== */
        .container {
            max-width: 1100px;
            margin: 80px auto 40px;
            padding: 0 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== صورة الغلاف ===== */
        .cover-section {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            background: var(--gradient-hero);
            min-height: 200px;
        }

        .cover-section .cover-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .cover-section .cover-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 24px;
            background: linear-gradient(transparent, rgba(0,0,0,0.6));
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 12px;
        }

        .cover-section .cover-overlay .profile-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .cover-section .cover-overlay .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: var(--bg-secondary);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--text-muted);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .cover-section .cover-overlay .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cover-section .cover-overlay .profile-text h2 {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .cover-section .cover-overlay .profile-text .bio {
            color: rgba(255,255,255,0.85);
            font-size: 0.9rem;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .cover-section .cover-overlay .profile-text .bio i {
            opacity: 0.7;
        }

        .cover-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-cover {
            padding: 8px 18px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .btn-cover:hover {
            background: rgba(255,255,255,0.35);
            transform: translateY(-2px);
        }

        .btn-cover.primary {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        .btn-cover.primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .btn-cover.follow {
            background: var(--success);
            border-color: var(--success);
        }

        .btn-cover.follow:hover {
            background: #218838;
            border-color: #218838;
        }

        .btn-cover.unfollow {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .btn-cover.unfollow:hover {
            background: var(--danger);
            color: #fff;
            border-color: var(--danger);
        }

        /* ===== إحصائيات الملف الشخصي ===== */
        .profile-stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 16px 0 24px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: var(--bg-card);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
            min-width: 80px;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .stat-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--shadow-hover);
            border-color: var(--accent-color);
        }

        .stat-item .stat-number {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .stat-item .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: block;
            margin-top: 2px;
        }

        /* ===== الشارات ===== */
        .badges-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            justify-content: center;
        }

        .badge-item {
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .badge-item.gold { background: #ffd700; color: #333; border-color: #ffd700; }
        .badge-item.silver { background: #c0c0c0; color: #333; border-color: #c0c0c0; }
        .badge-item.bronze { background: #cd7f32; color: #fff; border-color: #cd7f32; }
        .badge-item.verified { background: #1da1f2; color: #fff; border-color: #1da1f2; }
        .badge-item.premium { background: #9b59b6; color: #fff; border-color: #9b59b6; }
        .badge-item.trending { background: #e74c3c; color: #fff; border-color: #e74c3c; }
        .badge-item.top { background: #f39c12; color: #fff; border-color: #f39c12; }

        /* ===== المطور والمستوى ===== */
        .level-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .level-section .level-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .level-section .level-header .level-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .level-section .level-header .level-number {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .level-section .level-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-primary);
            border-radius: 10px;
            overflow: hidden;
        }

        .level-section .level-bar .level-progress {
            height: 100%;
            background: var(--gradient-hero);
            border-radius: 10px;
            transition: width 1s ease;
        }

        .level-section .level-xp {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 6px;
            text-align: left;
            direction: ltr;
        }

        /* ===== الرسم البياني للنشاط ===== */
        .activity-chart {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .activity-chart .chart-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .activity-chart .chart-grid {
            display: grid;
            grid-template-columns: repeat(30, 1fr);
            gap: 3px;
        }

        .activity-chart .chart-grid .day-cell {
            aspect-ratio: 1;
            border-radius: 3px;
            background: var(--border-color);
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .activity-chart .chart-grid .day-cell:hover {
            transform: scale(1.3);
            z-index: 2;
        }

        .activity-chart .chart-grid .day-cell.level-0 { background: var(--border-color); }
        .activity-chart .chart-grid .day-cell.level-1 { background: #9be9a8; }
        .activity-chart .chart-grid .day-cell.level-2 { background: #40c463; }
        .activity-chart .chart-grid .day-cell.level-3 { background: #30a14e; }
        .activity-chart .chart-grid .day-cell.level-4 { background: #216e39; }

        [data-theme="dark"] .activity-chart .chart-grid .day-cell.level-0 { background: #2a2a4a; }
        [data-theme="dark"] .activity-chart .chart-grid .day-cell.level-1 { background: #0e4429; }
        [data-theme="dark"] .activity-chart .chart-grid .day-cell.level-2 { background: #006d32; }
        [data-theme="dark"] .activity-chart .chart-grid .day-cell.level-3 { background: #26a641; }
        [data-theme="dark"] .activity-chart .chart-grid .day-cell.level-4 { background: #39d353; }

        /* ===== أفضل مشروع ===== */
        .best-project {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            border: 2px solid var(--warning);
            box-shadow: 0 4px 20px rgba(245, 166, 35, 0.15);
            position: relative;
            overflow: hidden;
        }

        .best-project::before {
            content: '🔥';
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 3rem;
            opacity: 0.1;
            transform: rotate(-20deg);
        }

        .best-project .best-title {
            font-size: 0.8rem;
            color: var(--warning);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .best-project .best-project-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .best-project .best-stats {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* ===== المثبتات ===== */
        .pinned-section {
            margin-bottom: 24px;
        }

        .pinned-section .pinned-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pinned-section .pinned-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .pinned-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px var(--shadow-color);
            transition: all var(--transition);
        }

        .pinned-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--shadow-hover);
        }

        .pinned-card .pin-icon {
            color: var(--warning);
            font-size: 0.8rem;
            margin-bottom: 4px;
        }

        .pinned-card h4 {
            font-size: 1rem;
            color: var(--accent-color);
            margin: 4px 0 8px;
        }

        .pinned-card .pinned-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
        }

        /* ===== نسبة اللغات ===== */
        .languages-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .languages-section .lang-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lang-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .lang-item .lang-name {
            font-size: 0.8rem;
            color: var(--text-secondary);
            min-width: 60px;
        }

        .lang-item .lang-bar {
            flex: 1;
            height: 6px;
            background: var(--bg-primary);
            border-radius: 10px;
            overflow: hidden;
        }

        .lang-item .lang-bar .lang-progress {
            height: 100%;
            border-radius: 10px;
            transition: width 1s ease;
        }

        .lang-item .lang-percent {
            font-size: 0.75rem;
            color: var(--text-muted);
            min-width: 40px;
            text-align: left;
        }

        /* ===== روابط التواصل ===== */
        .social-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .social-link {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            text-decoration: none;
            transition: all var(--transition);
        }

        .social-link:hover {
            transform: translateY(-2px);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .social-link.github:hover { border-color: #333; color: #333; }
        .social-link.twitter:hover { border-color: #1da1f2; color: #1da1f2; }
        .social-link.linkedin:hover { border-color: #0077b5; color: #0077b5; }
        .social-link.facebook:hover { border-color: #1877f2; color: #1877f2; }
        .social-link.telegram:hover { border-color: #0088cc; color: #0088cc; }

        /* ===== البحث والفلاتر ===== */
        .projects-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 16px;
        }

        .projects-controls .search-input {
            flex: 1;
            min-width: 150px;
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            transition: all var(--transition);
        }

        .projects-controls .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .projects-controls .search-input::placeholder {
            color: var(--text-muted);
        }

        .filter-btn {
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: 50px;
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all var(--transition);
        }

        .filter-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .filter-btn.active {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .sort-select {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.75rem;
            outline: none;
            cursor: pointer;
        }

        /* ===== مشاريع المستخدم ===== */
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 24px 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
        }

        .user-projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px var(--shadow-color);
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px var(--shadow-hover);
        }

        .project-card .project-preview {
            width: 100%;
            height: 120px;
            background: var(--bg-primary);
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .project-card .project-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .project-card .project-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .project-card .project-tags .tag {
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
            background: var(--bg-primary);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .project-card h4 {
            font-size: 1rem;
            color: var(--accent-color);
            margin: 0 0 8px;
        }

        .project-card .project-description {
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex: 1;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .project-card .project-meta {
            display: flex;
            gap: 14px;
            font-size: 0.75rem;
            color: var(--text-muted);
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
            margin-bottom: 12px;
        }

        .project-card .project-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #fff;
        }

        .btn-action:hover {
            transform: translateY(-2px);
        }

        .btn-action.view { background: var(--accent-color); }
        .btn-action.view:hover { background: var(--accent-hover); }

        .btn-action.edit { background: var(--info); }
        .btn-action.edit:hover { background: #138496; }

        .btn-action.delete { background: var(--danger); }
        .btn-action.delete:hover { background: #c82333; }

        .btn-action.share { background: var(--success); }
        .btn-action.share:hover { background: #218838; }

        .btn-action.pin { background: var(--warning); color: #333; }
        .btn-action.pin:hover { background: #e0a800; }

        .btn-action.download { background: #6c757d; }
        .btn-action.download:hover { background: #5a6268; }

        .btn-action.duplicate { background: #17a2b8; }
        .btn-action.duplicate:hover { background: #138496; }

        .no-projects {
            grid-column: 1 / -1;
            text-align: center;
            background: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        /* ===== نافذة المتابعين ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            direction: rtl;
        }

        .modal-content {
            background: var(--bg-card);
            margin: 10% auto;
            padding: 24px;
            border-radius: 16px;
            width: 90%;
            max-width: 380px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content .close-modal {
            position: absolute;
            left: 16px;
            top: 12px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all var(--transition);
        }

        .modal-content .close-modal:hover {
            color: var(--text-primary);
            transform: rotate(90deg);
        }

        .modal-content h3 {
            margin: 0 0 16px;
            font-size: 1.1rem;
            color: var(--text-primary);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .modal-content .modal-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .modal-content .modal-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 4px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-content .modal-list li:last-child { border-bottom: none; }

        .modal-content .modal-list li .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-content .modal-list li .user-info i {
            font-size: 24px;
            color: var(--text-muted);
        }

        .modal-content .modal-list li .user-info a {
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.9rem;
            transition: color var(--transition);
        }

        .modal-content .modal-list li .user-info a:hover {
            color: var(--accent-color);
        }

        .no-users {
            color: var(--text-muted);
            text-align: center;
            padding: 20px 0;
            font-size: 0.9rem;
        }

        /* ===== رسالة التحذير ===== */
        .auth-alert-box {
            text-align: center;
            background: var(--bg-card);
            padding: 50px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px var(--shadow-color);
            margin-top: 40px;
        }

        .auth-alert-box h2 {
            color: var(--text-primary);
            margin: 16px 0;
        }

        .auth-alert-box p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .auth-alert-box a {
            display: inline-block;
            background: var(--accent-color);
            color: #fff;
            padding: 10px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all var(--transition);
        }

        .auth-alert-box a:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        /* ===== استجابة للشاشات ===== */
        @media (max-width: 768px) {
            .cover-section .cover-image { height: 140px; }
            .cover-section .cover-overlay { padding: 12px 16px; flex-direction: column; align-items: flex-start; }
            .cover-section .cover-overlay .profile-info { width: 100%; }
            .cover-section .cover-overlay .profile-avatar { width: 60px; height: 60px; font-size: 1.8rem; }
            .cover-section .cover-overlay .profile-text h2 { font-size: 1.1rem; }
            .cover-actions { width: 100%; justify-content: flex-start; }
            .user-projects-grid { grid-template-columns: 1fr; }
            .pinned-section .pinned-grid { grid-template-columns: 1fr; }
            .profile-stats { gap: 10px; }
            .stat-item { padding: 8px 14px; min-width: 60px; }
            .stat-item .stat-number { font-size: 1rem; }
            .activity-chart .chart-grid { gap: 2px; }
            .projects-controls { flex-direction: column; align-items: stretch; }
            .projects-controls .search-input { min-width: auto; }
        }

        @media (max-width: 480px) {
            .cover-section .cover-image { height: 100px; }
            .cover-section .cover-overlay .profile-avatar { width: 48px; height: 48px; font-size: 1.2rem; }
            .cover-section .cover-overlay .profile-text h2 { font-size: 0.95rem; }
            .cover-section .cover-overlay .profile-text .bio { font-size: 0.75rem; }
            .btn-cover { font-size: 0.7rem; padding: 4px 12px; }
            .activity-chart .chart-grid { grid-template-columns: repeat(15, 1fr); }
        }
    </style>
</head>
<body>

    <!-- ===== شاشة التحميل ===== -->
    <div id="loadingScreen">
        <div class="spinner"></div>
        <p>جاري تحميل الملف الشخصي...</p>
    </div>

    <!-- ===== القائمة الجانبية ===== -->
    <div id="mySidebar" class="sidebarx">
        <span class="closebtn" onclick="closeSidebar()">
            <i class="fas fa-times"></i>
        </span>
        <div class="sidebar-header">
            <h3><i class="fas fa-code"></i> But_Seven</h3>
        </div>
        <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
        <a href="codes.html"><i class="fas fa-edit"></i> محرر الأكواد</a>
        <a href="profile.html" class="active"><i class="fas fa-user"></i> الملف الشخصي</a>
        <a href="#" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</a>
    </div>

    <!-- ===== الهيدر ===== -->
    <header>
        <a href="index.html" class="logo">But_Seven</a>
        <div class="header-actions">
            <button class="theme-toggle" onclick="toggleTheme()" title="تبديل الوضع الليلي">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <button class="menu-btn" onclick="openSidebar()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <!-- ===== المحتوى الرئيسي ===== -->
    <div class="container" id="mainContentWrapper">
        <!-- سيتم ملؤه بواسطة JavaScript -->
    </div>

    <!-- ===== نافذة المتابعين ===== -->
    <div id="followListModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeFollowModal()">&times;</span>
            <h3 id="followModalTitle">المتابعون</h3>
            <ul class="modal-list" id="followModalList"></ul>
        </div>
    </div>

    <!-- ===== سكريبتات ===== -->
    <script>
        // ==========================================
        // 1. إدارة الوضع الليلي
        // ==========================================
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            if (theme === 'dark') {
                icon.className = 'fas fa-sun';
            } else {
                icon.className = 'fas fa-moon';
            }
        }

        // تطبيق الوضع الليلي المحفوظ
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        })();

        // ==========================================
        // 2. دوال القائمة الجانبية
        // ==========================================
        function openSidebar() {
            document.getElementById("mySidebar").style.width = "280px";
        }

        function closeSidebar() {
            document.getElementById("mySidebar").style.width = "0";
        }

        // ==========================================
        // 3. دوال التخزين المحلي
        // ==========================================
        function getUsers() { return JSON.parse(localStorage.getItem('users')) || []; }
        function getCurrentUser() { return localStorage.getItem('currentUser'); }
        function getCodeProjects() { return JSON.parse(localStorage.getItem('codeProjects')) || []; }
        function getToken() { return localStorage.getItem('token'); }

        // ==========================================
        // 4. دالة إنشاء مستخدم تلقائياً إذا كان موجوداً في currentUser
        // ==========================================
        function ensureUserExists(username) {
            if (!username) return null;
            
            let users = getUsers();
            let user = users.find(u => u.username.toLowerCase() === username.toLowerCase());
            
            if (!user) {
                // إنشاء مستخدم جديد تلقائياً
                user = {
                    username: username,
                    bio: '👋 مطور ويب شغوف ببناء تجارب رائعة',
                    location: '',
                    website: '',
                    github: '',
                    twitter: '',
                    linkedin: '',
                    facebook: '',
                    telegram: '',
                    followers: [],
                    following: [],
                    joined: new Date().toISOString(),
                    profilePic: localStorage.getItem('profilePic') || '',
                    coverPic: ''
                };
                users.push(user);
                localStorage.setItem('users', JSON.stringify(users));
                console.log('✅ تم إنشاء مستخدم تلقائياً:', username);
            }
            
            return user;
        }

        // ==========================================
        // 5. دوال المتابعة
        // ==========================================
        function checkIsFollowing(followerUsername, targetUsername) {
            const users = getUsers();
            const follower = users.find(u => u.username === followerUsername);
            if (follower && follower.following) return follower.following.includes(targetUsername);
            return false;
        }

        async function toggleFollow(targetUsername) {
            const currentUsername = getCurrentUser();

            if (!currentUsername) {
                alert('يرجى تسجيل الدخول أولاً لمتابعة المطورين!');
                return;
            }

            if (currentUsername === targetUsername) {
                alert('لا يمكنك متابعة نفسك.');
                return;
            }

            let users = getUsers();

            let currentUserObj = users.find(u => u.username.toLowerCase() === currentUsername.toLowerCase());
            if (!currentUserObj) {
                currentUserObj = { username: currentUsername, following: [], followers: [] };
                users.push(currentUserObj);
            }

            let targetUserObj = users.find(u => u.username.toLowerCase() === targetUsername.toLowerCase());
            if (!targetUserObj) {
                targetUserObj = { username: targetUsername, following: [], followers: [] };
                users.push(targetUserObj);
            }

            if (!currentUserObj.following) currentUserObj.following = [];
            if (!targetUserObj.followers) targetUserObj.followers = [];

            const isFollowing = currentUserObj.following.includes(targetUsername);

            if (isFollowing) {
                currentUserObj.following = currentUserObj.following.filter(name => name !== targetUsername);
                targetUserObj.followers = targetUserObj.followers.filter(name => name !== currentUsername);
            } else {
                currentUserObj.following.push(targetUsername);
                targetUserObj.followers.push(currentUsername);
            }

            localStorage.setItem('users', JSON.stringify(users));
            renderProfilePage();
        }

        // ==========================================
        // 6. نافذة المتابعين
        // ==========================================
        function openFollowModal(title, usersList) {
            const modal = document.getElementById('followListModal');
            const modalTitle = document.getElementById('followModalTitle');
            const modalList = document.getElementById('followModalList');

            modalTitle.textContent = title;
            modalList.innerHTML = '';

            if (!usersList || usersList.length === 0) {
                modalList.innerHTML = `<li class="no-users">لا يوجد مستخدمين في هذه القائمة حالياً.</li>`;
            } else {
                usersList.forEach(username => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div class="user-info">
                            <i class="fas fa-user-circle"></i>
                            <a href="profile.html?username=${username}">${username}</a>
                        </div>
                        <i class="fas fa-chevron-left" style="color:var(--text-muted);font-size:0.8rem;"></i>
                    `;
                    modalList.appendChild(li);
                });
            }

            modal.style.display = 'block';
        }

        function closeFollowModal() {
            document.getElementById('followListModal').style.display = 'none';
        }

        window.addEventListener('click', (event) => {
            const modal = document.getElementById('followListModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        });

        // ==========================================
        // 7. دوال مساعدة للمشاريع
        // ==========================================
        function detectProjectTags(project) {
            const tags = [];
            const html = (project.htmlCode || project.html || '').toLowerCase();
            const css = (project.cssCode || project.css || '').toLowerCase();
            const js = (project.jsCode || project.js || '').toLowerCase();

            if (html.includes('<html') || html.includes('<!doctype')) tags.push('HTML');
            if (css.includes('{') || css.includes('color:')) tags.push('CSS');
            if (js.includes('function') || js.includes('const ') || js.includes('let ')) tags.push('JavaScript');
            if (html.includes('react') || js.includes('react')) tags.push('React');
            if (html.includes('canvas') || html.includes('game')) tags.push('🎮 لعبة');
            if (html.includes('python') || html.includes('flask')) tags.push('Python');
            if (html.includes('<?php')) tags.push('PHP');

            if (tags.length === 0) tags.push('ويب');
            return tags.slice(0, 4);
        }

        function getLangColor(lang) {
            const colors = {
                'HTML': '#e44d26',
                'CSS': '#264de4',
                'JavaScript': '#f7df1e',
                'React': '#61dafb',
                'Python': '#3776ab',
                'PHP': '#777bb4',
                '🎮 لعبة': '#9c27b0',
                'ويب': '#666'
            };
            return colors[lang] || '#666';
        }

        function generateActivityData(projects) {
            const data = [];
            const today = new Date();

            for (let i = 29; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];

                let count = 0;
                projects.forEach(p => {
                    const pDate = p.createdAt || p.timestamp;
                    if (pDate) {
                        const pDateStr = new Date(pDate).toISOString().split('T')[0];
                        if (pDateStr === dateStr) count++;
                    }
                });

                if (count === 0 && Math.random() > 0.7) count = Math.floor(Math.random() * 2) + 1;
                const level = count === 0 ? 0 : Math.min(4, count);
                data.push({ date: dateStr, count, level });
            }

            return data;
        }

        function getLanguageStats(projects) {
            const stats = {};
            let total = 0;

            projects.forEach(p => {
                const tags = detectProjectTags(p);
                tags.forEach(tag => {
                    stats[tag] = (stats[tag] || 0) + 1;
                    total++;
                });
            });

            if (total === 0) return {};

            Object.keys(stats).forEach(key => {
                stats[key] = (stats[key] / total) * 100;
            });

            return stats;
        }

        function getPinnedProjects(projects) {
            return projects.slice(0, 3);
        }

        // ==========================================
        // 8. عرض المشاريع
        // ==========================================
        function renderUserProjects(projects, isOwner) {
            if (!projects || projects.length === 0) {
                return `
                    <div class="no-projects">
                        <i class="far fa-folder-open" style="font-size:2.5rem;color:var(--text-muted);display:block;margin-bottom:12px;"></i>
                        <p>لا توجد مشاريع منشورة بعد.</p>
                        ${isOwner ? '<p style="font-size:0.85rem;color:var(--text-muted);">اذهب إلى المحرر وابدأ مشروعك الأول!</p>' : ''}
                    </div>
                `;
            }

            return projects.map(project => {
                const projectLikes = Array.isArray(project.likes) ? project.likes.length : (Number(project.likes) || 0);
                const projectComments = Array.isArray(project.comments) ? project.comments.length : 0;
                const tags = detectProjectTags(project);

                return `
                    <div class="project-card" data-project-id="${project.id}">
                        <div class="project-preview">
                            <i class="fas fa-code" style="font-size:1.5rem;color:var(--text-muted);"></i>
                            <span style="position:absolute;font-size:0.6rem;color:var(--text-muted);margin-top:30px;">معاينة المشروع</span>
                        </div>
                        <div class="project-tags">
                            ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
                        </div>
                        <h4>${project.title}</h4>
                        <div class="project-description">${project.description || 'لا يوجد وصف لهذا المشروع.'}</div>
                        <div class="project-meta">
                            <span><i class="fas fa-eye"></i> ${project.views || 0}</span>
                            <span><i class="fas fa-heart" style="color:var(--danger);"></i> ${projectLikes}</span>
                            <span><i class="fas fa-comment"></i> ${projectComments}</span>
                        </div>
                        <div class="project-actions">
                            <a href="view.html?id=${project.id}" class="btn-action view"><i class="fas fa-eye"></i> عرض</a>
                            ${isOwner ? `
                                <a href="codes.html?edit=${project.id}" class="btn-action edit"><i class="fas fa-edit"></i> تعديل</a>

<button class="btn-action delete" onclick="deleteMyProject('${project.id || project._id}')">
    <i class="fas fa-trash"></i> حذف
</button>
                                <button class="btn-action pin" onclick="pinProject('${project.id}')"><i class="fas fa-thumbtack"></i> تثبيت</button>
                            ` : ''}
                            <button class="btn-action share" onclick="shareProject('${project.id}')"><i class="fas fa-share-alt"></i> مشاركة</button>
                            <button class="btn-action download" onclick="downloadProject('${project.id}')"><i class="fas fa-download"></i> تحميل</button>
                            <button class="btn-action duplicate" onclick="duplicateProject('${project.id}')"><i class="fas fa-copy"></i> نسخ</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==========================================
        // 9. دوال إدارة المشاريع
        // ==========================================
        // ==========================================
// دالة حذف المشروع - النسخة النهائية
// ==========================================
window.deleteMyProject = async function(projectId) {
    console.log('🗑️ بدء عملية الحذف للمشروع:', projectId);
    
    // 1. تأكيد الحذف
    if (!confirm('⚠️ هل أنت متأكد من حذف هذا المشروع نهائياً؟')) {
        console.log('❌ تم إلغاء الحذف من قبل المستخدم');
        return;
    }
    
    // 2. الحصول على المشروع من localStorage للتأكد من وجوده
    let allProjects = getCodeProjects();
    console.log('📦 عدد المشاريع قبل الحذف:', allProjects.length);
    
    // البحث عن المشروع باستخدام id أو _id
    const projectToDelete = allProjects.find(p => {
        return p.id === projectId || p._id === projectId;
    });
    
    if (!projectToDelete) {
        console.error('❌ المشروع غير موجود في localStorage');
        showToast('❌ المشروع غير موجود!', 'error');
        return;
    }
    
    console.log('✅ تم العثور على المشروع:', projectToDelete.title || projectToDelete.name);
    console.log('👤 مؤلف المشروع:', projectToDelete.author);
    console.log('👤 المستخدم الحالي:', getCurrentUser());
    
    // 3. التحقق من صلاحية الحذف (تأكد أن المستخدم هو صاحب المشروع)
    const currentUser = getCurrentUser();
    if (projectToDelete.author !== currentUser) {
        console.error('❌ لا تملك صلاحية حذف هذا المشروع');
        showToast('❌ ليس لديك صلاحية حذف هذا المشروع!', 'error');
        return;
    }
    
    // 4. عرض مؤشر تحميل على الزر
    const deleteBtn = document.querySelector(`[data-project-id="${projectId}"] .btn-action.delete`);
    if (deleteBtn) {
        deleteBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحذف...';
        deleteBtn.disabled = true;
        deleteBtn.style.opacity = '0.7';
    }
    
    try {
        // 5. محاولة الحذف من الخادم (مع التعامل مع احتمالية اختلاف الـ ID)
        const token = localStorage.getItem('token');
        let serverDeleted = false;
        let serverError = null;
        
        if (token) {
            console.log('📡 محاولة حذف المشروع من الخادم...');
            
            // استخدام الـ ID المناسب للخادم (قد يكون _id)
            const serverId = projectToDelete._id || projectToDelete.id || projectId;
            console.log('🔑 المعرف المرسل للخادم:', serverId);
            
            try {
                const response = await fetch(`https://my-backend-api-bntd.onrender.com/api/projects/${serverId}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                console.log('📊 استجابة الخادم:', response.status, response.statusText);
                
                if (response.ok) {
                    serverDeleted = true;
                    console.log('✅ تم حذف المشروع من الخادم بنجاح');
                } else {
                    // محاولة قراءة رسالة الخطأ
                    try {
                        const errorData = await response.json();
                        serverError = errorData.msg || errorData.message || errorData.error || `خطأ ${response.status}`;
                    } catch (e) {
                        serverError = `خطأ ${response.status}: ${response.statusText}`;
                    }
                    console.warn('⚠️ فشل حذف المشروع من الخادم:', serverError);
                }
            } catch (networkError) {
                console.warn('⚠️ مشكلة في الاتصال بالخادم:', networkError);
                serverError = 'تعذر الاتصال بالخادم';
            }
        } else {
            console.warn('⚠️ لا يوجد توكن، سيتم الحذف محلياً فقط');
        }
        
        // 6. حذف المشروع من localStorage (بغض النظر عن نجاح الخادم)
        // ولكن إذا فشل الخادم، نعطي المستخدم خيار الإبقاء على المشروع
        if (!serverDeleted && serverError && token) {
            // إذا فشل الخادم، نسأل المستخدم
            const keepLocal = confirm(`⚠️ فشل حذف المشروع من الخادم: ${serverError}\n\nهل تريد حذفه محلياً فقط؟ (قد يعود بعد تحديث الصفحة)`);
            if (!keepLocal) {
                console.log('❌ تم إلغاء الحذف');
                if (deleteBtn) {
                    deleteBtn.innerHTML = '<i class="fas fa-trash"></i> حذف';
                    deleteBtn.disabled = false;
                    deleteBtn.style.opacity = '1';
                }
                return;
            }
        }
        
        // 7. حذف المشروع من localStorage
        allProjects = allProjects.filter(p => {
            return p.id !== projectId && p._id !== projectId;
        });
        localStorage.setItem('codeProjects', JSON.stringify(allProjects));
        console.log('✅ تم حذف المشروع من localStorage');
        
        // 8. حذف من واجهة المستخدم
        const projectCard = document.querySelector(`[data-project-id="${projectId}"]`);
        if (projectCard) {
            projectCard.style.transition = 'all 0.4s ease';
            projectCard.style.opacity = '0';
            projectCard.style.transform = 'scale(0.8)';
            setTimeout(() => {
                projectCard.remove();
                updateUIAfterDelete(allProjects);
            }, 400);
        } else {
            // إذا لم يتم العثور على البطاقة، نحدّث الواجهة مباشرة
            updateUIAfterDelete(allProjects);
        }
        
        // 9. عرض رسالة نجاح
        const message = serverDeleted ?
            '✅ تم حذف المشروع من الخادم والمحلي بنجاح!' :
            '✅ تم حذف المشروع محلياً (سيتم مزامنته مع الخادم لاحقاً)';
        showToast(message, serverDeleted ? 'success' : 'warning');
        
    } catch (error) {
        console.error('❌ خطأ غير متوقع:', error);
        showToast('❌ حدث خطأ غير متوقع: ' + error.message, 'error');
        
        // إعادة زر الحذف إلى حالته الطبيعية
        if (deleteBtn) {
            deleteBtn.innerHTML = '<i class="fas fa-trash"></i> حذف';
            deleteBtn.disabled = false;
            deleteBtn.style.opacity = '1';
        }
    }
};

    const userProjects = allProjects.filter(p => p.author === profileUsername);

            sectionTitle.textContent = `المشاريع (${remainingCards.length})`;
        }

        if (remainingCards.length === 0) {

            projectsGrid.innerHTML = `

                </div>
            `;
        }
    }
    
    // تحديث الإحصائيات
    updateProfileStats();
    
    // تحديث مستوى المطور
    updateDeveloperLevel(userProjects);
}

// ==========================================
// دالة تحديث مستوى المطور
// ==========================================
function updateDeveloperLevel(userProjects) {
    let totalViews = 0;
    let totalLikes = 0;
    
    userProjects.forEach(p => {
        totalViews += Number(p.views) || 0;
        totalLikes += Array.isArray(p.likes) ? p.likes.length : (Number(p.likes) || 0);
    });
    
    const level = Math.min(20, Math.floor(userProjects.length / 2) + Math.floor(totalLikes / 10) + 1);
    const levelNumber = document.querySelector('.level-number');
    if (levelNumber) levelNumber.textContent = `المستوى ${level}`;
}

// ==========================================

// ==========================================
function showToast(message, type = 'info') {
    // إزالة أي توست موجود
    const existingToast = document.querySelector('.custom-toast');
    if (existingToast) existingToast.remove();
    
    const toast = document.createElement('div');
    toast.className = 'custom-toast';
    
    // ألوان حسب النوع
    const colors = {
        success: { bg: '#28a745', icon: '✅' },
        error: { bg: '#dc3545', icon: '❌' },
        warning: { bg: '#f5a623', icon: '⚠️' },
        info: { bg: '#17a2b8', icon: 'ℹ️' }
    };
    
    const colorSet = colors[type] || colors.info;
    
    toast.style.cssText = `
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 28px;
        background: ${colorSet.bg};
        color: #fff;
        border-radius: 12px;
        font-weight: 600;
        font-size: 0.95rem;
        z-index: 9999;
        box-shadow: 0 8px 30px rgba(0,0,0,0.25);
        animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        direction: rtl;
        text-align: center;
        max-width: 90%;
        border: 1px solid rgba(255,255,255,0.15);
        font-family: 'Segoe UI', Tahoma, sans-serif;
    `;
    
    toast.innerHTML = message;
    document.body.appendChild(toast);
    
    // إضافة حركة
    if (!document.getElementById('toastStyles')) {
        const style = document.createElement('style');
        style.id = 'toastStyles';
        style.textContent = `
            @keyframes slideUp {
                from { opacity: 0; transform: translateX(-50%) translateY(40px) scale(0.9); }
                to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
            }
        `;
        document.head.appendChild(style);
    }
    
    // إزالة بعد 4 ثواني
    setTimeout(() => {
        toast.style.transition = 'all 0.4s ease';
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translateY(-30px) scale(0.9)';
        setTimeout(() => toast.remove(), 400);
    }, 4000);
}

        let currentFilter = 'all';
        let currentSort = 'newest';

        function filterUserProjects(filter) {
            if (filter) {
                currentFilter = filter;
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.filter === filter) btn.classList.add('active');
                });
            }

            const sort = document.getElementById('sortProjects')?.value || 'newest';
            currentSort = sort;

            const searchQuery = document.getElementById('searchProjects')?.value.toLowerCase() || '';

            const urlParams = new URLSearchParams(window.location.search);
            const profileUsername = urlParams.get('username') || getCurrentUser();

            const allProjects = getCodeProjects();
            let userProjects = allProjects.filter(p => p.author === profileUsername);

            if (currentFilter !== 'all') {
                userProjects = userProjects.filter(p => {
                    const tags = detectProjectTags(p);
                    return tags.some(t => t.toLowerCase().includes(currentFilter.toLowerCase()));
                });
            }

            if (searchQuery) {
                userProjects = userProjects.filter(p =>
                    (p.title || '').toLowerCase().includes(searchQuery) ||
                    (p.description || '').toLowerCase().includes(searchQuery)
                );
            }

            switch (currentSort) {
                case 'newest':
                    userProjects.sort((a, b) => (b.timestamp || b.createdAt || 0) - (a.timestamp || a.createdAt || 0));
                    break;
                case 'oldest':
                    userProjects.sort((a, b) => (a.timestamp || a.createdAt || 0) - (b.timestamp || b.createdAt || 0));
                    break;
                case 'mostViewed':
                    userProjects.sort((a, b) => (b.views || 0) - (a.views || 0));
                    break;
                case 'mostLiked':
                    userProjects.sort((a, b) => {
                        const aLikes = Array.isArray(a.likes) ? a.likes.length : (Number(a.likes) || 0);
                        const bLikes = Array.isArray(b.likes) ? b.likes.length : (Number(b.likes) || 0);
                        return bLikes - aLikes;
                    });
                    break;
            }

            const isOwner = profileUsername === getCurrentUser();
            const container = document.getElementById('userProjectsContainer');
            if (container) {
                container.innerHTML = renderUserProjects(userProjects, isOwner);
            }
        }

                    <div class="stat-item" onclick="openFollowModal('المتابَعون', ${JSON.stringify(userObj.following || [])})">
                        <span class="stat-number">${followingCount}</span>
                        <span class="stat-label">يتبع</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">${totalProjects}</span>
                        <span class="stat-label">مشروع</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">${totalViews}</span>
                        <span class="stat-label">مشاهدة</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">${totalLikes}</span>
                        <span class="stat-label">إعجاب</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">${totalComments}</span>
                        <span class="stat-label">تعليق</span>
                    </div>
                </div>

                <!-- ===== مستوى المطور ===== -->
                <div class="level-section">
                    <div class="level-header">
                        <span class="level-title"><i class="fas fa-star" style="color:var(--warning);"></i> مستوى المطور</span>
                        <span class="level-number">المستوى ${level}</span>
                    </div>
                    <div class="level-bar">
                        <div class="level-progress" style="width:${progress}%;"></div>
                    </div>
                    <div class="level-xp">${xp.toFixed(0)} / 100 نقطة خبرة</div>
                </div>

                <!-- ===== تقويم النشاط ===== -->
                <div class="activity-chart">
                    <div class="chart-title"><i class="fas fa-calendar-alt"></i> نشاط آخر 30 يوماً</div>
                    <div class="chart-grid" id="activityGrid">
                        ${activityData.map(d => `
                            <div class="day-cell level-${d.level}" title="${d.date}: ${d.count} نشاط"></div>
                        `).join('')}
                    </div>
                </div>

                <!-- ===== أفضل مشروع ===== -->
                ${bestProject ? `
                <div class="best-project">
                    <div class="best-title"><i class="fas fa-fire"></i> أفضل مشروع</div>
                    <div class="best-project-name">${bestProject.title}</div>
                    <div class="best-stats">
                        <span><i class="fas fa-heart" style="color:var(--danger);"></i> ${Array.isArray(bestProject.likes) ? bestProject.likes.length : (Number(bestProject.likes) || 0)}</span>
                        <span><i class="fas fa-eye"></i> ${bestProject.views || 0}</span>
                        <span><i class="fas fa-comment"></i> ${Array.isArray(bestProject.comments) ? bestProject.comments.length : 0}</span>
                    </div>
                </div>
                ` : ''}

                <!-- ===== المثبتات ===== -->
                ${pinnedProjects.length > 0 ? `
                <div class="pinned-section">
                    <div class="pinned-title"><i class="fas fa-thumbtack" style="color:var(--warning);"></i> المشاريع المثبتة</div>
                    <div class="pinned-grid">
                        ${pinnedProjects.map(p => `
                            <div class="pinned-card">
                                <div class="pin-icon"><i class="fas fa-thumbtack"></i> مثبت</div>
                                <h4>${p.title}</h4>
                                <div class="pinned-meta">
                                    <span><i class="fas fa-heart" style="color:var(--danger);"></i> ${Array.isArray(p.likes) ? p.likes.length : (Number(p.likes) || 0)}</span>
                                    <span><i class="fas fa-eye"></i> ${p.views || 0}</span>
                                    <span><i class="fas fa-comment"></i> ${Array.isArray(p.comments) ? p.comments.length : 0}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}

                <!-- ===== نسبة اللغات ===== -->
                <div class="languages-section">
                    <div class="lang-title"><i class="fas fa-code"></i> توزيع اللغات</div>
                    ${Object.keys(langStats).length > 0 ? Object.entries(langStats).map(([lang, percent]) => `
                        <div class="lang-item">
                            <span class="lang-name">${lang}</span>
                            <div class="lang-bar">
                                <div class="lang-progress" style="width:${percent}%;background:${getLangColor(lang)};"></div>
                            </div>
                            <span class="lang-percent">${percent.toFixed(0)}%</span>
                        </div>
                    `).join('') : '<div style="color:var(--text-muted);font-size:0.85rem;">لا توجد بيانات كافية عن اللغات المستخدمة.</div>'}
                </div>

                <!-- ===== روابط التواصل ===== -->
                <div class="social-links">
                    ${userObj.website ? `<a href="${userObj.website}" target="_blank" class="social-link"><i class="fas fa-globe"></i> الموقع</a>` : ''}
                    ${userObj.github ? `<a href="${userObj.github}" target="_blank" class="social-link github"><i class="fab fa-github"></i> GitHub</a>` : ''}
                    ${userObj.twitter ? `<a href="${userObj.twitter}" target="_blank" class="social-link twitter"><i class="fab fa-twitter"></i> Twitter</a>` : ''}
                    ${userObj.linkedin ? `<a href="${userObj.linkedin}" target="_blank" class="social-link linkedin"><i class="fab fa-linkedin"></i> LinkedIn</a>` : ''}
                    ${userObj.facebook ? `<a href="${userObj.facebook}" target="_blank" class="social-link facebook"><i class="fab fa-facebook"></i> Facebook</a>` : ''}
                    ${userObj.telegram ? `<a href="${userObj.telegram}" target="_blank" class="social-link telegram"><i class="fab fa-telegram"></i> Telegram</a>` : ''}
                </div>

                <!-- ===== البحث والفلاتر ===== -->
                <div class="projects-controls">
                    <input class="search-input" id="searchProjects" placeholder="🔍 ابحث في مشاريعي..." oninput="filterUserProjects()">
                    <div style="display:flex;gap:4px;flex-wrap:wrap;">
                        <button class="filter-btn active" data-filter="all" onclick="filterUserProjects('all')">الكل</button>
                        <button class="filter-btn" data-filter="html" onclick="filterUserProjects('html')">HTML</button>
                        <button class="filter-btn" data-filter="css" onclick="filterUserProjects('css')">CSS</button>
                        <button class="filter-btn" data-filter="javascript" onclick="filterUserProjects('javascript')">JS</button>
                        <button class="filter-btn" data-filter="python" onclick="filterUserProjects('python')">Python</button>
                        <button class="filter-btn" data-filter="php" onclick="filterUserProjects('php')">PHP</button>
                    </div>
                    <select class="sort-select" id="sortProjects" onchange="filterUserProjects()">
                        <option value="newest">الأحدث</option>
                        <option value="oldest">الأقدم</option>
                        <option value="mostViewed">الأكثر مشاهدة</option>
                        <option value="mostLiked">الأكثر إعجاباً</option>
                    </select>
                </div>

                <!-- ===== المشاريع ===== -->
                <div class="section-title">
                    <span><i class="fas fa-code-branch"></i> المشاريع (${userProjects.length})</span>
                    ${isOwner ? `<a href="codes.html" class="btn-action view"><i class="fas fa-plus"></i> مشروع جديد</a>` : ''}
                </div>
                <div class="user-projects-grid" id="userProjectsContainer">
                    ${renderUserProjects(userProjects, isOwner)}
                </div>
            `;

            // إخفاء شاشة التحميل
            hideLoading();
        }

        // ==========================================
        // 14. إخفاء شاشة التحميل
        // ==========================================
        function hideLoading() {
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.classList.add('hidden');
            setTimeout(() => {
                loadingScreen.style.display = 'none';
            }, 500);
        }

        // ==========================================
        // 15. تشغيل الصفحة
        // ==========================================
        document.addEventListener('DOMContentLoaded', function() {
            // إظهار شاشة التحميل
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.classList.remove('hidden');
            loadingScreen.style.display = 'flex';

            // عرض الملف الشخصي
            renderProfilePage();

            console.log('🚀 But_Seven Profile loaded successfully!');
            console.log('💡 Tip: Add ?username=Name to view other profiles');
        });

        // إعادة التحميل عند تغيير المستخدم في localStorage
        window.addEventListener('storage', function(e) {
            if (e.key === 'currentUser' || e.key === 'users' || e.key === 'codeProjects') {
                renderProfilePage();
            }
        });
    </script>

</body>
</html>
