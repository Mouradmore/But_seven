<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>الملف الشخصي | لوحة تحكم المطور</title>
    <style>
        /* =============================================
                   الأنماط المحسنة
                   ============================================= */
        
        /* نظام الإشعارات (Toasts) */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 420px;
            direction: rtl;
        }

        .toast-message {
            padding: 14px 22px;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            animation: toastSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast-message .toast-icon {
            font-size: 1.3rem;
        }

        .toast-success { 
            background: linear-gradient(135deg, #28a745, #20c997); 
        }
        .toast-error { 
            background: linear-gradient(135deg, #dc3545, #e74c3c); 
        }
        .toast-warning { 
            background: linear-gradient(135deg, #ffc107, #f39c12); 
            color: #333;
        }
        .toast-info { 
            background: linear-gradient(135deg, #17a2b8, #0dcaf0); 
        }

        @keyframes toastSlideIn {
            from { transform: translateX(60px) scale(0.9); opacity: 0; }
            to { transform: translateX(0) scale(1); opacity: 1; }
        }

        .toast-message.hiding {
            animation: toastSlideOut 0.3s ease forwards;
        }

        @keyframes toastSlideOut {
            from { transform: translateX(0) scale(1); opacity: 1; }
            to { transform: translateX(60px) scale(0.9); opacity: 0; }
        }

        /* الأنماط الأساسية */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
            direction: rtl;
            text-align: right;
        }
        
        header {
            background: #fff;
            padding: 10px 24px;
            position: fixed;
            top: 0;
            height: 60px;
            width: 100%;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }
        
        header .logo {
            font-weight: bold;
            font-size: 1.3rem;
            color: #666;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header .logo a {
            color: #666;
            text-decoration: none;
        }

        header .logo a:hover {
            color: #007bff;
        }

        header .header-user {
            font-weight: 600;
            color: #555;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: 40px;
        }

        /* زر القائمة الجانبية */
        .menu-btn {
            font-size: 20px;
            background: none;
            color: #666;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn:hover {
            background: #f0f0f0;
        }

        /* القائمة الجانبية */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            top: 0;
            right: 0;
            background-color: #fff;
            overflow-x: hidden;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding-top: 60px;
            box-shadow: -4px 0 20px rgba(0,0,0,0.06);
            z-index: 1500;
        }

        .sidebar.open {
            width: 280px;
        }

        .sidebar a {
            padding: 12px 24px;
            text-decoration: none;
            font-size: 16px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            text-align: right;
        }

        .sidebar a:hover {
            color: #007bff;
            background-color: #f8f9fa;
        }

        .sidebar a.active {
            color: #007bff;
            background-color: #f0f7ff;
            border-right: 3px solid #007bff;
        }

        .sidebar .closebtn {
            position: absolute;
            top: 12px;
            left: 16px;
            font-size: 28px;
            cursor: pointer;
            color: #666;
            transition: 0.3s;
            background: none;
            border: none;
        }

        .sidebar .closebtn:hover {
            color: #007bff;
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1100px;
            margin: 80px auto 40px auto;
            padding: 0 20px 40px;
            box-sizing: border-box;
        }

        /* بطاقة الملف الشخصي */
        .profile-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 30px;
            border: 1px solid #f0f0f0;
            flex-wrap: wrap;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            box-shadow: 0 4px 15px rgba(0,123,255,0.2);
            overflow: hidden;
            flex-shrink: 0;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info {
            flex: 1;
            min-width: 200px;
        }

        .profile-info h2 {
            margin: 0 0 6px 0;
            color: #222;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-info .bio {
            margin: 0;
            color: #888;
            font-size: 0.9rem;
        }

        .profile-info .joined-date {
            margin: 4px 0 0;
            color: #aaa;
            font-size: 0.8rem;
        }

        /* إحصائيات المتابعة */
        .follow-stats {
            display: flex;
            gap: 20px;
            margin: 10px 0 5px;
        }

        .follow-stat-item {
            cursor: pointer;
            background: #f8f9fa;
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid #eee;
            text-align: center;
            transition: 0.3s;
            min-width: 70px;
        }

        .follow-stat-item:hover {
            border-color: #007bff;
            background: #f0f7ff;
        }

        .follow-stat-item .count {
            font-size: 18px;
            font-weight: bold;
        }

        .follow-stat-item .label {
            font-size: 12px;
            color: #888;
        }

        .follow-stat-item.followers .count { color: #28a745; }
        .follow-stat-item.following .count { color: #007bff; }

        /* الإحصائيات الرئيسية */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: white;
            padding: 18px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            text-align: center;
            border-top: 4px solid #007bff;
            transition: 0.3s;
        }

        .stat-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

        .stat-box.views { border-top-color: #17a2b8; }
        .stat-box.likes { border-top-color: #dc3545; }
        .stat-box.comments { border-top-color: #ffc107; }
        
        .stat-box h3 {
            margin: 0 0 4px 0;
            font-size: 1.6rem;
            color: #222;
        }
        
        .stat-box p {
            margin: 0;
            color: #888;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* عنوان المشاريع */
        .section-title {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-create-new {
            background: #f8f9fa;
            color: #666;
            padding: 8px 18px;
            text-decoration: none;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 2px solid #e9ecef;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-create-new:hover {
            border-color: #007bff;
            color: #007bff;
            background: #fff;
            transform: translateY(-2px);
        }

        /* شبكة المشاريع */
        .user-projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: white;
            border: 1px solid #f0f0f0;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            border-color: #e0e0e0;
        }

        .project-card h4 {
            margin: 0 0 8px 0;
            color: #007bff;
            font-size: 1.05rem;
        }

        .project-card .project-desc {
            font-size: 0.9rem;
            color: #666;
            margin: 0 0 15px 0;
            line-height: 1.5;
            flex-grow: 1;
        }

        .project-meta {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            color: #888;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
            margin-bottom: 15px;
        }

        .project-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .project-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-action {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
        }

        .btn-action:hover {
            transform: scale(1.05);
            filter: brightness(0.95);
        }

        .btn-action.btn-view { background-color: #007bff; }
        .btn-action.btn-view:hover { background-color: #0069d9; }

        .btn-action.btn-delete { background-color: #dc3545; }
        .btn-action.btn-delete:hover { background-color: #c82333; }

        .btn-action.btn-edit { background-color: #ffc107; color: #333; }
        .btn-action.btn-edit:hover { background-color: #f57f17; color: #fff; }

        /* حالة عدم وجود مشاريع */
        .no-projects {
            grid-column: 1 / -1;
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 12px;
            border: 2px dashed #e9ecef;
        }

        .no-projects .icon {
            font-size: 3rem;
            color: #ddd;
            margin-bottom: 15px;
        }

        .no-projects h3 {
            color: #666;
            margin: 0 0 8px;
        }

        .no-projects p {
            color: #999;
            font-size: 0.95rem;
            margin: 0;
        }

        /* نافذة المتابعين */
        .modal-overlay {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: #fff;
            margin: 20px;
            padding: 0;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from { transform: translateY(-20px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.1rem;
            color: #333;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #aaa;
            transition: 0.3s;
            line-height: 1;
        }

        .modal-close:hover {
            color: #dc3545;
        }

        .modal-body {
            padding: 16px 24px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-body .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .modal-body .user-item:last-child {
            border-bottom: none;
        }

        .modal-body .user-item .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-body .user-item .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #888;
            overflow: hidden;
        }

        .modal-body .user-item .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-body .user-item .user-name {
            font-weight: 600;
            color: #333;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .modal-body .user-item .user-name:hover {
            color: #007bff;
        }

        .modal-body .empty-users {
            text-align: center;
            color: #999;
            padding: 30px 0;
        }

        /* رسالة التحذير لغير المسجلين */
        .auth-alert-box {
            text-align: center;
            background: white;
            padding: 60px 30px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            margin-top: 50px;
            border: 1px solid #f0f0f0;
        }

        .auth-alert-box .icon {
            font-size: 4rem;
            color: #ffc107;
            margin-bottom: 15px;
        }

        .auth-alert-box h2 {
            color: #333;
            margin: 0 0 10px;
        }

        .auth-alert-box p {
            color: #888;
            font-size: 0.95rem;
            margin: 0 0 20px;
        }

        .auth-alert-box a {
            display: inline-block;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .auth-alert-box a:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,123,255,0.3);
        }

        /* استجابة للشاشات الصغيرة */
        @media (max-width: 768px) {
            .profile-card {
                flex-direction: column;
                text-align: center;
                padding: 24px;
            }

            .profile-info h2 {
                justify-content: center;
            }

            .follow-stats {
                justify-content: center;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .user-projects-grid {
                grid-template-columns: 1fr;
            }

            header .header-user {
                font-size: 0.85rem;
                margin-left: 10px;
            }

            .container {
                margin-top: 70px;
                padding: 0 12px 30px;
            }

            .sidebar.open {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .profile-avatar {
                width: 80px;
                height: 80px;
                font-size: 2.5rem;
            }

            .stat-box h3 {
                font-size: 1.3rem;
            }

            .project-actions {
                flex-wrap: wrap;
            }

            .project-actions .btn-action {
                flex: 1 1 45%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- نافذة المتابعين -->
    <div class="modal-overlay" id="followModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="followModalTitle">المتابعين</h3>
                <button class="modal-close" onclick="closeFollowModal()">✕</button>

    <div class="toast-container" id="toastContainer"></div>

    <!-- ============================================= -->
    <!-- جافا سكريبت محسن بالكامل -->
    <!-- ============================================= -->
    <script>
        // =============================================
        // 1. نظام الإشعارات (Toasts)
        // =============================================
        function showToast(message, type = 'info', duration = 3500) {
            const container = document.getElementById('toastContainer');
            const icons = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };
            
            const toast = document.createElement('div');
            toast.className = `toast-message toast-${type}`;
            toast.innerHTML = `
                <span class="toast-icon">${icons[type] || 'ℹ️'}</span>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('hiding');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // =============================================
        // 2. الأدوات الأساسية
        // =============================================
        function openSidebar() { 
            document.getElementById("mySidebar").classList.add('open'); 
        }
        
        function closeSidebar() { 
            document.getElementById("mySidebar").classList.remove('open'); 
        }

        function getUsers() { 
            return JSON.parse(localStorage.getItem('users')) || []; 
        }
        
        function getCurrentUser() { 
            return localStorage.getItem('currentUser'); 
        }
        
        function getCodeProjects() { 
            return JSON.parse(localStorage.getItem('codeProjects')) || []; 
        }
        
        function saveCodeProjects(projects) { 
            localStorage.setItem('codeProjects', JSON.stringify(projects)); 
        }

        function getUserAvatar(username) {
            if (username === getCurrentUser() && localStorage.getItem('profilePic')) {
                return localStorage.getItem('profilePic');
            }
            const users = getUsers();
            const user = users.find(u => u.username === username);
            if (user && user.profilePic) return user.profilePic;
            return "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ccc'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";
        }

        // =============================================
        // 3. نافذة المتابعين
        // =============================================
        function openFollowModal(title, usersList) {
            const modal = document.getElementById('followModal');
            const modalTitle = document.getElementById('followModalTitle');
            const modalBody = document.getElementById('followModalBody');
            
            modalTitle.textContent = title;
            modalBody.innerHTML = '';
            
            if (usersList.length === 0) {
                modalBody.innerHTML = `
                    <div class="empty-users">
                        <p style="color: #999;">لا يوجد مستخدمون في هذه القائمة</p>
                    </div>
                `;
            } else {
                usersList.forEach(username => {
                    const avatar = getUserAvatar(username);
                    const item = document.createElement('div');
                    item.className = 'user-item';
                    item.innerHTML = `
                        <div class="user-info">
                            <div class="user-avatar">
                                <img src="${avatar}" alt="${username}">
                            </div>
                            <a href="profile.html?username=${username}" class="user-name">${username}</a>
                        </div>
                        <span style="color: #ccc; font-size: 0.8rem;">👤</span>
                    `;
                    modalBody.appendChild(item);
                });
            }
            
            modal.classList.add('show');
        }

        function closeFollowModal() {
            document.getElementById('followModal').classList.remove('show');
        }

        // إغلاق النافذة بالضغط خارج المحتوى
        document.getElementById('followModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeFollowModal();
            }
        });

        // إغلاق النافذة بالضغط على Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeFollowModal();
            }
        });

        // =============================================
        // 4. عرض الصفحة الرئيسية
        // =============================================
        function renderProfilePage() {
            const currentUser = getCurrentUser();
            const mainWrapper = document.getElementById('mainContentWrapper');
            const headerGreeting = document.getElementById('headerUserGreeting');

            // إذا لم يكن المستخدم مسجلاً
            if (!currentUser) {
                headerGreeting.textContent = '👤 زائر';
                mainWrapper.innerHTML = `
                    <div class="auth-alert-box">
                        <div class="icon">🔒</div>
                        <h2>عذراً، يجب تسجيل الدخول أولاً!</h2>
                        <p>يرجى الذهاب إلى الصفحة الرئيسية لتسجيل الدخول أو إنشاء حساب لعرض ملفك الشخصي.</p>
                        <a href="index.html">🏠 العودة إلى الرئيسية</a>
                    </div>
                `;
                return;
            }

            headerGreeting.textContent = `👤 ${currentUser}`;

            // جلب البيانات
            const users = getUsers();
            const loggedInUser = users.find(u => u.username.toLowerCase() === currentUser.toLowerCase());
            const serverPic = localStorage.getItem('profilePic');
            const userProfilePic = serverPic || (loggedInUser ? loggedInUser.profilePic : null);

            const allProjects = getCodeProjects();
            const userProjects = allProjects.filter(p => p.author === currentUser);

            // حساب الإحصائيات
            const totalProjects = userProjects.length;
            let totalViews = 0;
            let totalLikes = 0;
            let totalComments = 0;

            userProjects.forEach(p => {
                totalViews += Number(p.views) || 0;
                totalLikes += Array.isArray(p.likes) ? p.likes.length : (Number(p.likes) || 0);
                totalComments += Array.isArray(p.comments) ? p.comments.length : 0;
            });

            // بيانات المتابعة
            const followers = loggedInUser?.followers || [];
            const following = loggedInUser?.following || [];
            const followersCount = followers.length;
            const followingCount = following.length;

            // بناء الصفحة
            mainWrapper.innerHTML = `
                <!-- بطاقة الملف الشخصي -->
                <div class="profile-card">
                    <div class="profile-avatar">
                        ${userProfilePic ? `<img src="${userProfilePic}" alt="${currentUser}">` : `<span>${currentUser.charAt(0).toUpperCase()}</span>`}
                    </div>
                    <div class="profile-info">
                        <h2>
                            ${currentUser}
                            ${loggedInUser?.isVerified ? '✅' : ''}
                        </h2>
                        <p class="bio">${loggedInUser?.bio || 'مطور ومبرمج في مجتمع But_Seven'}</p>
                        <p class="joined-date">📅 انضم في ${loggedInUser?.joinedDate || 'تاريخ غير معروف'}</p>
                        <div class="follow-stats">
                            <div class="follow-stat-item followers" onclick="openFollowModal('👥 المتابعون', ${JSON.stringify(followers)})">
                                <div class="count">${followersCount}</div>
                                <div class="label">متابعون</div>
                            </div>
                            <div class="follow-stat-item following" onclick="openFollowModal('👤 يتابعهم', ${JSON.stringify(following)})">
                                <div class="count">${followingCount}</div>
                                <div class="label">يتبع</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- الإحصائيات -->
                <div class="stats-grid">
                    <div class="stat-box">
                        <h3>${totalProjects}</h3>
                        <p>📁 إجمالي المشاريع</p>
                    </div>
                    <div class="stat-box views">
                        <h3>${totalViews}</h3>
                        <p>👁️ مشاهدات</p>
                    </div>
                    <div class="stat-box likes">
                        <h3>${totalLikes}</h3>
                        <p>❤️ إعجابات</p>
                    </div>
                    <div class="stat-box comments">
                        <h3>${totalComments}</h3>
                        <p>💬 تعليقات</p>
                    </div>
                </div>

                <!-- مشاريعي -->
                <div class="section-title">
                    <span>📂 مشاريعي (${totalProjects})</span>
                    <a href="codes.html" class="btn-create-new">
                        ✨ مشروع جديد
                    </a>
                </div>

                <div class="user-projects-grid" id="userProjectsContainer">
                    ${totalProjects === 0 ? `
                        <div class="no-projects">
                            <div class="icon">📭</div>
                            <h3>لا توجد مشاريع</h3>
                            <p>لم تنشر أي كود في المجتمع بعد.</p>
                            <p style="font-size: 0.85rem; color: #aaa; margin-top: 5px;">اذهب إلى المحرر، اكتب أفكارك واضغط زر النشر 📤</p>
                        </div>
                    ` : ''}
                </div>
            `;

            // عرض المشاريع إذا وجدت
            if (totalProjects > 0) {
                const projectsContainer = document.getElementById('userProjectsContainer');
                
                userProjects.forEach(project => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    
                    const safeDesc = project.description ? String(project.description) : "لا يوجد وصف لهذا المشروع.";
                    const shortDesc = safeDesc.length > 120 ? safeDesc.substring(0, 120) + '...' : safeDesc;
                    
                    const projectLikesCount = Array.isArray(project.likes) ? project.likes.length : (Number(project.likes) || 0);
                    const projectCommentsCount = Array.isArray(project.comments) ? project.comments.length : 0;
                    
                    card.innerHTML = `
                        <div>
                            <h4>${project.title || 'بدون عنوان'}</h4>
                            <div class="project-desc">${shortDesc}</div>
                        </div>
                        <div>
                            <div class="project-meta">
                                <span>👁️ ${project.views || 0}</span>
                                <span>❤️ ${projectLikesCount}</span>
                                <span>💬 ${projectCommentsCount}</span>
                                <span>📅 ${new Date(project.timestamp || Date.now()).toLocaleDateString('ar-EG')}</span>
                            </div>
                            <div class="project-actions">
                                <a href="view.html?id=${project.id}" class="btn-action btn-view">👁️ عرض</a>
                                <button class="btn-action btn-delete" onclick="deleteMyProject('${project.id}')">🗑️ حذف</button>
                            </div>
                        </div>
                    `;
                    projectsContainer.appendChild(card);
                });
            }
        }

        // =============================================
        // 5. حذف المشاريع
        // =============================================
        window.deleteMyProject = async function(projectId) {
            // نافذة تأكيد مخصصة
            if (!confirm('⚠️ هل أنت متأكد من حذف هذا المشروع نهائياً؟\nلا يمكن استعادة المشروع بعد الحذف.')) {
                return;
            }
            
            // حذف من localStorage أولاً
            let allProjects = getCodeProjects();
            const projectExists = allProjects.some(p => p.id === projectId);
            
            if (!projectExists) {
                showToast('⚠️ المشروع غير موجود', 'warning');
                return;
            }
            
            // حذف من السيرفر إذا كان معرفاً بمشروع سيرفر
            const token = localStorage.getItem('token');
            if (token && !String(projectId).startsWith('proj_')) {
                try {
                    const response = await fetch(`https://my-backend-api-bntd.onrender.com/api/projects/${projectId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.ok) {
                        showToast('✅ تم حذف المشروع من السيرفر', 'success');
                    } else {
                        const data = await response.json().catch(() => ({}));
                        if (data.msg === 'Project not found' || response.status === 404) {
                            showToast('⚠️ المشروع غير موجود في السيرفر، سيتم حذفه محلياً', 'warning');
                        } else {
                            showToast('⚠️ فشل الحذف من السيرفر: ' + (data.msg || 'خطأ غير معروف'), 'error');
                        }
                    }
                } catch (error) {
                    console.error('Delete Error:', error);
                    showToast('⚠️ فشل الاتصال بالسيرفر، سيتم حذفه محلياً فقط', 'warning');
                }
            }
            
            // حذف من localStorage
            allProjects = allProjects.filter(p => p.id !== projectId);
            saveCodeProjects(allProjects);
            
            // حذف المعرف المخزن إذا كان هذا هو المشروع المنشور
            const publishedId = localStorage.getItem('currentPublishedProjectId');
            if (publishedId === projectId) {
                localStorage.removeItem('currentPublishedProjectId');
            }
            
            showToast('🗑️ تم حذف المشروع بنجاح', 'success');
            renderProfilePage();
        };

        // =============================================
        // 6. تسجيل الخروج
        // =============================================
        function logoutUser() {
            if (confirm('👋 هل أنت متأكد من رغبتك في تسجيل الخروج؟')) {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('token');
                localStorage.removeItem('profilePic');
                localStorage.removeItem('currentPublishedProjectId');
                showToast('👋 تم تسجيل الخروج بنجاح', 'info');
                window.location.href = "index.html";
            }
        }

        // =============================================
        // 7. التهيئة
        // =============================================
        document.addEventListener('DOMContentLoaded', () => {
            renderProfilePage();
            
            // التحقق من وجود معامل username في URL (لمشاهدة ملف شخص آخر)
            const urlParams = new URLSearchParams(window.location.search);
            const usernameParam = urlParams.get('username');
            
            if (usernameParam && usernameParam !== getCurrentUser()) {
                // TODO: عرض ملف شخص آخر
                showToast(`👤 عرض ملف ${usernameParam}`, 'info');
            }
        });

        // =============================================
        // 8. اختصارات لوحة المفاتيح
        // =============================================
        document.addEventListener('keydown', function(e) {
            // Escape: إغلاق النوافذ
            if (e.key === 'Escape') {
                if (document.getElementById('followModal').classList.contains('show')) {
                    closeFollowModal();
                }
            }
        });

        console.log('👤 الملف الشخصي جاهز للاستخدام!');
        console.log('📖 اختصارات:');
        console.log('  Escape → إغلاق النوافذ');
    </script>
</body>
</html>
