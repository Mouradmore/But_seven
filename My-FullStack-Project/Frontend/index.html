<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Web Projects - Programming Community</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css"> 
    <link rel="stylesheet" href="style/all.min.css" type="text/css" media="all" />
    <link rel="stylesheet" href="style/codemirror.min.css" type="text/css" media="all" />
    <link rel="stylesheet" href="style/dracula.min.css" type="text/css" media="all" />
    
    <style>
        .skiptranslate iframe { display: none !important; }
        body { top: 0 !important; }
        #google_translate_element { display: none !important; }
        .goog-te-banner-frame { display: none !important; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
            direction: rtl;
            text-align: right;
            transition: margin-right .3s;
            top: 0 !important;
        }

        .skiptranslate iframe { display: none !important; }
        #google_translate_element { display: flex; justify-content: center; margin-bottom: 15px; }
        .goog-te-gadget { font-family: inherit !important; color: transparent !important; }
        .goog-te-gadget .goog-te-combo { padding: 5px; border-radius: 5px; border: 1px solid #ddd; font-family: inherit; font-weight: bold; color: #333; }

        header {
            background-color: #fff;
            color: #fff;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 { margin: 0; font-size: 24px; display: flex; align-items: center; gap: 10px; }
        header h1 i { cursor: pointer; }

        .auth-buttons button, .auth-buttons a {
            background-color: transparent;
            color: #666;
            border: none;
            padding: 2px 4px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin: 0 5px;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 14px;
            margin-left: -5px;
            display: inline-block;
        }

        .auth-buttons button:hover, .auth-buttons a:hover {
            background-color: #fff;
            color: #007bff;
        }

        #loggedInUserDisplay { display: none; align-items: center; gap: 10px; }
        #loggedInUserDisplay span { font-weight: bold; }

        .search-container {
            max-width: 500px;
            margin: 20px auto;
            padding: 0 15px;
            display: flex;
            gap: 10px;
        }

        .search-container input {
            width: 100%;
            background-color: #fff;
            color: #000;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            padding: 10px 20px;
            border: 2px solid #ddd;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-container input:focus { border-color: #007bff; }

        .search-container button {
            padding: 8px 15px;
            background-color: #fff;
            color: #333;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .search-container button:hover { background-color: #ddd; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; box-sizing: border-box; }

        #projects-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .project-card {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .trending-card {
            grid-column: 1 / -1;
            border: 2px solid #ffca28;
            background: linear-gradient(to bottom left, #fff, #fffde7);
            transform: scale(1.01);
        }

        .trending-badge {
            position: absolute;
            top: -12px;
            right: 20px;
            background-color: #ffca28;
            color: #333;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .project-card h4 { margin: 0 0 10px 0; color: #007bff; font-size: 18px; }
        .project-card p { color: #666; font-size: 14px; flex-grow: 1; line-height: 1.6; margin-bottom: 15px; }
        
        .project-card .author {
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .project-card .project-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #777;
            margin-bottom: 15px;
        }

        .project-card .actions { display: flex; gap: 10px; }
        
        .project-card .actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #fff;
            transition: background-color 0.2s;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 40px 0;
        }

        .pagination button {
            padding: 10px 20px;
            background-color: #fff;
            border: 2px solid #007bff;
            color: #007bff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .pagination button:disabled {
            border-color: #ddd;
            color: #ccc;
            cursor: not-allowed;
        }

        .pagination button:not(:disabled):hover {
            background-color: #007bff;
            color: #fff;
        }

        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 200;
            top: 0;
            right: 0;
            background-color: #ffffff;
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
            box-shadow: -2px 0 5px rgba(0,0,0,0.5);
        }

        .sidebar a {
            padding: 10px 15px;
            margin-top: 14px;
            text-decoration: none;
            font-size: 18px;
            color: #666;
            display: block;
            transition: 0.3s;
            text-align: right;
        }

        .sidebar a:hover { color: #0056b3; background-color: #fff; }
        .sidebar .closebtn { position: absolute; top: 20px; left: 15px; font-size: 36px; margin-left: 40px; cursor: pointer; color: #0056b3; }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 300;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-5px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content h3 { margin-top: 0; color: #007bff; margin-bottom: 20px; }
        .modal-content input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .modal-content button[type="submit"] { width: 100%; padding: 12px; background-color: #007bff; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .refresh-btn {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .refresh-btn:hover {
            background-color: #0056b3;
        }
        .refresh-btn i {
            font-size: 14px;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* مؤشر التحميل */
        .loading-spinner {
            text-align: center;
            padding: 40px;
            grid-column: 1 / -1;
        }
        .loading-spinner i {
            font-size: 40px;
            color: #007bff;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

        // دالة لحساب الوقت المنقضي (منذ كم دقيقة/ساعة/يوم)
function getTimeAgo(date) {
    const now = new Date();
    const diffMs = now - date;
    const diffSec = Math.floor(diffMs / 1000);
    const diffMin = Math.floor(diffSec / 60);
    const diffHour = Math.floor(diffMin / 60);
    const diffDay = Math.floor(diffHour / 24);
    const diffMonth = Math.floor(diffDay / 30);
    const diffYear = Math.floor(diffDay / 365);
    
    if (diffSec < 60) return 'الآن';
    if (diffMin < 60) return diffMin + ' دقيقة' + (diffMin > 1 ? 'ات' : '');
    if (diffHour < 24) return diffHour + ' ساعة' + (diffHour > 1 ? 'ات' : '');
    if (diffDay < 30) return diffDay + ' يوم' + (diffDay > 1 ? 'اً' : '');
    if (diffMonth < 12) return diffMonth + ' شهر' + (diffMonth > 1 ? 'اً' : '');
    return diffYear + ' سنة' + (diffYear > 1 ? 'ات' : '');
        }

            const cardClass = isTrending ? 'project-card trending-card' : 'project-card';

            const users = getUsers();

            const followersCount = authorObj && Array.isArray(authorObj.followers) ? authorObj.followers.length : 0;
            
            if (!currentUser || currentUser !== project.author) {

                const btnText = isFollowing ? 'Unfollow' : 'Follow ';
                const btnBg = isFollowing ? '#f4f4f4' : '#007bff';
                const btnColor = isFollowing ? '#333' : '#fff';

                followBtnHTML = `<button onclick="toggleFollow('${project.author}')" style="margin-right: auto; padding: 4px 10px; font-size: 12px; font-weight: bold; border-radius: 15px; border: 1px solid ${btnBorder}; background-color: ${btnBg}; color: ${btnColor}; cursor: pointer; transition: 0.3s;">${btnText}</button>`;

            let rawDescription = project.description ? String(project.description) : "لا يوجد وصف لهذا المشروع.";

            return `

                            <span style="font-size: 11px; color: #888; margin-top: 2px;">
                                <svg id="Layer_1" height="18" viewBox="0 0 24 24" width="18" xmlns="http://www.w3.org/2000/svg" data-name="Layer 1"><path d="m7.5 13a4.5 4.5 0 1 1 4.5-4.5 4.505 4.505 0 0 1 -4.5 4.5zm0-7a2.5 2.5 0 1 0 2.5 2.5 2.5 2.5 0 0 0 -2.5-2.5zm7.5 14a5.006 5.006 0 0 0 -5-5h-5a5.006 5.006 0 0 0 -5 5v4h2v-4a3 3 0 0 1 3-3h5a3 3 0 0 1 3 3v4h2zm2.5-11a4.5 4.5 0 1 1 4.5-4.5 4.505 4.505 0 0 1 -4.5 4.5zm0-7a2.5 2.5 0 1 0 2.5 2.5 2.5 2.5 0 0 0 -2.5-2.5zm6.5 14a5.006 5.006 0 0 0 -5-5h-4v2h4a3 3 0 0 1 3 3v4h2z"/></svg>

        function checkIsFollowing(followerUsername, targetUsername) {
            const users = getUsers();
            const follower = users.find(u => u.username === followerUsername);
            if (follower && follower.following) return follower.following.includes(targetUsername);
            return false;
        }

        window.shareProject = function(projectId, btnElement) {
            const baseUrl = window.location.href.split('/').slice(0, -1).join('/');
            const shareUrl = `${baseUrl}/view.html?id=${projectId}`;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(shareUrl).then(() => { showSuccessMessage(btnElement); }).catch(() => { fallbackCopyTextToClipboard(shareUrl, btnElement); });
            } else {
                fallbackCopyTextToClipboard(shareUrl, btnElement);
            }
            function showSuccessMessage(btn) {
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                btn.style.backgroundColor = '#20c997'; 
                setTimeout(() => { btn.innerHTML = originalText; btn.style.backgroundColor = '#28a745'; }, 2000);
            }
            function fallbackCopyTextToClipboard(text, btn) {
                let textArea = document.createElement("textarea");
                textArea.value = text; textArea.style.position = "fixed"; document.body.appendChild(textArea);
                textArea.focus(); textArea.select();
                try { document.execCommand('copy'); showSuccessMessage(btn); } catch (err) { prompt("Copy the following link to participate:", text); }
                document.body.removeChild(textArea);
            }
        };

        window.toggleFollow = function(targetUsername) {
            const currentUsername = getCurrentUser();
            
            if (!currentUsername) {
                alert("Please log in first to follow the developers!");
                openModal(document.getElementById('loginModal'));
                return;
            }
            
            if (currentUsername === targetUsername) {
                alert("You cannot follow yourself.");
                return;
            }
            
            let users = getUsers();
            
            let currentUserObj = users.find(u => u.username.toLowerCase() === currentUsername.toLowerCase());
            if (!currentUserObj) {
                currentUserObj = { username: currentUsername, following: [], followers: [] };
                users.push(currentUserObj);
            }

            let targetUserObj = users.find(u => u.username.toLowerCase() === targetUsername.toLowerCase());
            if (!targetUserObj) {
                targetUserObj = { username: targetUsername, following: [], followers: [] };
                users.push(targetUserObj);
            }
            
            if (!currentUserObj.following) currentUserObj.following = [];
            if (!targetUserObj.followers) targetUserObj.followers = [];
            
            const isFollowing = currentUserObj.following.includes(targetUsername);
            
            if (isFollowing) {
                currentUserObj.following = currentUserObj.following.filter(name => name !== targetUsername);
                targetUserObj.followers = targetUserObj.followers.filter(name => name !== currentUsername);
            } else {
                currentUserObj.following.push(targetUsername);
                targetUserObj.followers.push(currentUsername);
            }
            
            localStorage.setItem('users', JSON.stringify(users));
            displayCodeProjects(); 
        };

        // ==========================================
        // 🔥 الدالة المعدلة - عرض فوري + تحديث خلفي
        // ==========================================
        async function syncProjectsFromBackend() {
            // إخفاء مؤشر التحميل فوراً
            if (loadingSpinner) loadingSpinner.style.display = 'none';
            
            // أولاً: جلب المشاريع من localStorage (المشاريع المحلية)
            let localProjects = getCodeProjects();
            
            // ✅ عرض المشاريع المحلية فوراً (بدون انتظار السيرفر)
            displayCodeProjects();
            
            try {
                // محاولة جلب المشاريع من السيرفر في الخلفية
                const response = await fetch('https://my-backend-api-bntd.onrender.com/api/projects');
                if (response.ok) {
                    const data = await response.json();
                    let serverProjects = data.projects || (Array.isArray(data) ? data : []);
                    serverProjects = serverProjects.map(p => ({
                        ...p,
                        id: p._id || p.id,
                        timestamp: p.timestamp || new Date(p.createdAt).getTime() || Date.now()
                    }));
                    
                    // دمج المشاريع المحلية مع مشاريع السيرفر (تجنب التكرار)
                    const allProjectIds = new Set(serverProjects.map(p => p.id));
                    localProjects.forEach(p => {
                        if (!allProjectIds.has(p.id)) {
                            serverProjects.push(p);
                        }
                    });
                    
                    localStorage.setItem('codeProjects', JSON.stringify(serverProjects));
                    // ✅ تحديث العرض بعد جلب السيرفر (لإضافة المشاريع الجديدة)
                    displayCodeProjects();
                }
            } catch (error) {
                console.error("تعذر جلب المشاريع من السيرفر، سيتم استخدام البيانات المحلية.");
                // ✅ في حالة الخطأ، نضمن عرض المشاريع المحلية
                localStorage.setItem('codeProjects', JSON.stringify(localProjects));
                displayCodeProjects();
            }
        }

        // ==========================================
        // 🔥 دالة التحديث اليدوي (زر التحديث)
        // ==========================================
        function forceRefreshProjects() {
            // جلب المشاريع المحلية من localStorage
            let localProjects = getCodeProjects();
            
            // إذا كانت المشاريع المحلية فارغة، حاول جلبها من التخزين المحلي للمشروع المحفوظ
            if (localProjects.length === 0) {
                const savedProject = localStorage.getItem('savedProject');
                if (savedProject) {
                    try {
                        const fileSystem = JSON.parse(savedProject);
                        // استخراج محتوى HTML فقط كمشروع
                        const htmlFiles = [];
                        const extractHtml = (nodes) => {
                            nodes.forEach(node => {
                                if (node.type === 'file' && node.fileType === 'html') {
                                    htmlFiles.push({
                                        id: 'local_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                                        title: node.name || 'مشروع محلي',
                                        description: 'مشروع تم إنشاؤه في المحرر المحلي',
                                        author: localStorage.getItem('currentUser') || 'مستخدم',
                                        html: node.content || '',
                                        timestamp: Date.now(),
                                        views: 0,
                                        likes: 0,
                                        comments: []
                                    });
                                } else if (node.children) {
                                    extractHtml(node.children);
                                }
                            });
                        };
                        extractHtml(fileSystem);
                        if (htmlFiles.length > 0) {
                            localProjects = htmlFiles;
                            localStorage.setItem('codeProjects', JSON.stringify(localProjects));
                        }
                    } catch(e) {}
                }
            }
            
            // حفظ المشاريع في localStorage وعرضها
            localStorage.setItem('codeProjects', JSON.stringify(localProjects));
            displayCodeProjects();
            
            // محاولة جلب من السيرفر في الخلفية أيضاً
            syncProjectsFromBackend();
            
            alert("✅ تم تحديث المشاريع بنجاح!");
        }

        function displayCodeProjects() {
            // إخفاء مؤشر التحميل
            if (loadingSpinner) loadingSpinner.style.display = 'none';
            
            let projects = getCodeProjects();
            projects = projects.map(p => {
                if (!p.views) p.views = 0;
                if (!p.likes) p.likes = 0;
                if (!p.comments) p.comments = [];
                return p;
            });
            saveCodeProjects(projects);

            projectsListDiv.innerHTML = '';
            projectsListDiv.style.display = 'grid'; 

            if (projects.length === 0) {
                projectsListDiv.innerHTML = '<p style="text-align: center; margin-top: 50px; font-size: 1.1em; color: #555; grid-column: 1/-1;">There are no projects to display yet.<a href="#" onclick="checkAndGoToCodes()">Start your first business!</a></p>';
                if(prevPageBtn) prevPageBtn.disabled = true;
                if(nextPageBtn) nextPageBtn.disabled = true;
                if(currentPageDisplay) currentPageDisplay.textContent = 'page 0 Of 0';
                return;
            }

            let topProject = null;
            let otherProjects = projects;

            if (currentPage === 1 && projects.length > 0) {
                let sortedByViews = [...projects].sort((a, b) => b.views - a.views);
                topProject = sortedByViews[0];

                if (topProject.views > 0) { 
                    otherProjects = projects.filter(p => p.id !== topProject.id);
                } else {
                    topProject = null;
                }
            }

            otherProjects.sort((a, b) => b.timestamp - a.timestamp);

            const startIndex = (currentPage - 1) * projectsPerPage;
            const endIndex = startIndex + projectsPerPage;
            const projectsToDisplay = otherProjects.slice(startIndex, endIndex);

            if (topProject && currentPage === 1) {
                projectsListDiv.innerHTML += createCardHTML(topProject, true);
            }

            projectsToDisplay.forEach(project => {
                projectsListDiv.innerHTML += createCardHTML(project, false);
            });

            if (prevPageBtn) prevPageBtn.style.display = 'inline-block';
            if (nextPageBtn) nextPageBtn.style.display = 'inline-block';
            
            prevPageBtn.disabled = currentPage === 1;
            nextPageBtn.disabled = endIndex >= otherProjects.length;
            currentPageDisplay.innerHTML = `page ${currentPage} Of ${Math.ceil(otherProjects.length / projectsPerPage) || 1}`;

            document.querySelectorAll('.view-code-btn').forEach(button => {
                button.addEventListener('click', (event) => {
                    const projectId = event.target.dataset.projectId;
                    window.location.href = `view.html?id=${projectId}`;
                });
            });
            attachDeleteHandlers();
        }

        function searchProjects() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const allProjects = getCodeProjects();

            const filtered = allProjects.filter(p => {
                const basicMatch = (p.title && p.title.toLowerCase().includes(query)) || 
                                   (p.description && p.description.toLowerCase().includes(query)) || 
                                   (p.author && p.author.toLowerCase().includes(query));

                const htmlCode = p.html || p.htmlCode || '';
                let codeMatch = false;

                if (htmlCode) {
                    const titleMatch = htmlCode.match(/<title[^>]*>(.*?)<\/title>/i);
                    const codeTitle = titleMatch ? titleMatch[1].toLowerCase() : '';
                    const metaMatch1 = htmlCode.match(/<meta[^>]*property=['"]og:description['"][^>]*content=['"](.*?)['"]/i);
                    const metaMatch2 = htmlCode.match(/<meta[^>]*content=['"](.*?)['"][^>]*property=['"]og:description['"]/i);
                    const metaDesc = (metaMatch1 ? metaMatch1[1] : (metaMatch2 ? metaMatch2[1] : '')).toLowerCase();

                    if (codeTitle.includes(query) || metaDesc.includes(query)) {
                        codeMatch = true;
                    }
                }

                return basicMatch || codeMatch;
            });

            currentPage = 1;
            displayFilteredProjects(filtered);
        }

        function displayFilteredProjects(projects) {
            projectsListDiv.innerHTML = '';
            projectsListDiv.style.display = 'grid';
            if (projects.length === 0) {
                projectsListDiv.innerHTML = '<p style="text-align: center; margin-top: 50px; color: #555; grid-column: 1/-1;">No results matched search.</p>';
                return;
            }
            projects.forEach(project => { projectsListDiv.innerHTML += createCardHTML(project, false); });
            document.querySelectorAll('.view-code-btn').forEach(b => b.addEventListener('click', (e) => {
                window.location.href = `view.html?id=${e.target.dataset.projectId}`;
            }));
            attachDeleteHandlers();
        }

        // ==========================================
        // 5. مشغل الوسائط المباشر
        // ==========================================
                                                    mediaEls[currentIndex + 1].scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'start' });
      // ==========================================
// 🔥 دالة عرض الوسائط الذكية والمحسنة (بدون إغراق المتصفح بـ iframes)
// ==========================================
function displayMediaDirectly(keyword) {
    const existingBtn = document.getElementById('galleryCloseBtn');
    if (existingBtn) existingBtn.remove();
    
    // الحصول على جميع المشاريع
    let allProjects = getCodeProjects();
    let filtered = [];
    
    // فلاتر البحث المحسنة
    if (keyword === 'image') {
        filtered = allProjects.filter(p => {
            const html = (p.html || '').toLowerCase();
            return html.includes('<img') || html.includes('data:image/') || html.includes('.jpg') || html.includes('.png') || html.includes('صورة');
        });
    } else if (keyword === 'video') {
        filtered = allProjects.filter(p => {
            const html = (p.html || '').toLowerCase();
            return html.includes('<video') || html.includes('youtube.com/embed') || html.includes('youtu.be') || html.includes('.mp4') || html.includes('فيديو');
        });
    } else if (keyword === 'music') {
        filtered = allProjects.filter(p => {
            const html = (p.html || '').toLowerCase();
            return html.includes('<audio') || html.includes('soundcloud.com') || html.includes('.mp3') || html.includes('موسيقى');
        });
    }
    
    if (document.querySelector('.pagination')) {
        document.querySelector('.pagination').style.display = 'none';
    }
    projectsListDiv.innerHTML = '';
    
    if (filtered.length === 0) {
        let sectionName = keyword === 'image' ? 'صور' : keyword === 'video' ? 'فيديو' : 'موسيقى';
        let emoji = keyword === 'image' ? '🖼️' : keyword === 'video' ? '🎬' : '🎵';
        projectsListDiv.innerHTML = `
            <div style="text-align: center; margin-top: 50px; font-size: 1.1em; color: #555; grid-column: 1/-1; padding: 40px 20px;">
                <p style="font-size: 48px; margin-bottom: 10px;">${emoji}</p>
                <p style="font-size: 20px; font-weight: bold; color: #333;">لا توجد مشاريع تحتوي على (${sectionName})</p>
                <button onclick="resetToCodes()" style="margin-top:15px; background:#6c757d; color:#fff; border:none; padding:10px 25px; border-radius:8px; cursor:pointer; font-weight:bold;">العودة</button>
            </div>
        `;
        return;
    }
    
    // إنشاء الحاوية الرئيسية للمعرض الثابت
    const galleryWrapper = document.createElement('div');
    galleryWrapper.style.cssText = 'position:fixed; top:0; left:0; right:0; bottom:0; background-color:#000; z-index:999; overflow:hidden;';
    
    // زر الإغلاق
    const closeBtn = document.createElement('button');
    closeBtn.id = 'galleryCloseBtn';
    closeBtn.innerHTML = '✕';
    closeBtn.style.cssText = 'position:fixed; top:20px; right:20px; z-index:1000; background:rgba(255,255,255,0.2); border:none; color:#fff; width:44px; height:44px; border-radius:50%; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center;';
    closeBtn.onclick = resetToCodes;
    
    // حاوية التمرير العمودي (Full Screen Snap)
    const galleryGrid = document.createElement('div');
    galleryGrid.style.cssText = 'width:100vw; height:100vh; display:flex; flex-direction:column; overflow-y:auto; scroll-snap-type:y mandatory; background:#000;';
    
    // دالة مساعدة لاستخراج العنصر أو الرابط المناسب
    function extractMediaElement(htmlStr) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlStr, 'text/html');
        
        // 1. إذا كان يوتيوب أو ساوند كلاود (نحتاج iframe هنا فقط مجبرين)
        const iframe = doc.querySelector('iframe');
        if (iframe) {
            const newIframe = document.createElement('iframe');
            newIframe.src = iframe.src;
            newIframe.style.cssText = 'width:100vw; height:100vh; border:none; background:#000;';
            newIframe.allow = 'autoplay; encrypted-media';
            return newIframe;
        }
        
        // 2. إذا كانت صورة عادية
        const img = doc.querySelector('img');
        if (img) {
            const newImg = document.createElement('img');
            newImg.src = img.src;
            newImg.style.cssText = 'width:100vw; height:100vh; object-fit:contain; background:#000;';
            return newImg;
        }
        
        // 3. إذا كان فيديو مخصص
        const video = doc.querySelector('video');
        if (video) {
            const newVideo = document.createElement('video');
            newVideo.src = video.src || (video.querySelector('source') ? video.querySelector('source').src : '');
            newVideo.controls = true;
            newVideo.autoplay = true;
            newVideo.style.cssText = 'width:100vw; height:100vh; object-fit:contain; background:#000;';
            return newVideo;
        }
        
        // 4. إذا كان ملف صوتي
        const audio = doc.querySelector('audio');
        if (audio) {
            const newAudio = document.createElement('audio');
            newAudio.src = audio.src || (audio.querySelector('source') ? audio.querySelector('source').src : '');
            newAudio.controls = true;
            newAudio.autoplay = true;
            newAudio.style.cssText = 'width:90vw; max-width:500px; height:54px; margin:auto;';
            return newAudio;
        }
        
        // في حال لم يجد وسم مباشر (البحث عن روابط في النص المكتوب)
        return null;
    }

    // بناء الشرائح بشكل مباشر خفيف وسريع
    filtered.forEach((project) => {
        const slide = document.createElement('div');
        slide.style.cssText = 'height:100vh; width:100vw; scroll-snap-align:start; position:relative; flex:0 0 100vh; overflow:hidden; background:#000; display:flex; align-items:center; justify-content:center;';
        
        const mediaElement = extractMediaElement(project.html || project.htmlCode || '');
        
        if (mediaElement) {
            slide.appendChild(mediaElement);
        } else {
            // كود احتياطي في حال عدم العثور على الوسم مباشرة (يعرض نص توضيحي)
            const fallback = document.createElement('div');
            fallback.style.cssText = 'color:#fff; text-align:center; font-size:18px;';
            fallback.innerHTML = `⚠️ تعذر استخراج الوسائط المباشرة من مشروع: <br><strong>${project.title}</strong>`;
            slide.appendChild(fallback);
        }
        
        // شريط معلومات المشروع السفلي
        const info = document.createElement('div');
        info.style.cssText = 'position:absolute; bottom:30px; left:50%; transform:translateX(-50%); color:#fff; text-align:center; background:rgba(0,0,0,0.6); backdrop-filter:blur(10px); padding:10px 20px; border-radius:12px; font-size:14px; max-width:80%; z-index:10;';
        info.innerHTML = `<strong>${project.title || 'مشروع'}</strong> <span style="color:#888; margin:0 10px;">—</span> <span style="color:#ccc;">${project.author || 'مستخدم'}</span>`;
        slide.appendChild(info);
        
        galleryGrid.appendChild(slide);
    });
    
    galleryWrapper.appendChild(closeBtn);
    galleryWrapper.appendChild(galleryGrid);
    projectsListDiv.appendChild(galleryWrapper);
    document.body.style.overflow = 'hidden';
}      

                
    
    
        
    
    

        window.resetToCodes = function() {
            document.body.style.overflow = '';
            const closeBtn = document.getElementById('galleryCloseBtn');
            if (closeBtn) closeBtn.remove();
            if (document.querySelector('.pagination')) { document.querySelector('.pagination').style.display = 'flex'; }
            currentPage = 1;
            displayCodeProjects();
        };

        function attachDeleteHandlers() {
            document.querySelectorAll('.delete-project-btn').forEach(button => {
                button.onclick = (event) => {
                    const projectId = event.target.dataset.projectId;
                    const currentUser = getCurrentUser();
                    let projects = getCodeProjects();
                    const projectIndex = projects.findIndex(p => p.id === projectId);

                    if (projectIndex !== -1 && projects[projectIndex].author === currentUser) {
                        if (confirm('Are you sure you want to delete this project?')) {
                            projects.splice(projectIndex, 1);
                            saveCodeProjects(projects);
                            alert('The project has been successfully deleted.');
                            displayCodeProjects();
                        }
                    }
                };
            });
        }

        // ==========================================
        // 6. تشغيل الأحداث والربط مع السيرفر
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            if(loginBtnHeader) loginBtnHeader.addEventListener('click', (e) => { e.preventDefault(); openModal(loginModal); });
            if(registerBtnHeader) registerBtnHeader.addEventListener('click', (e) => { e.preventDefault(); window.location.href = "register.html"; });

            document.querySelectorAll('.close-button').forEach(button => {
                button.addEventListener('click', (event) => {
                    closeModal(document.getElementById(event.target.dataset.modal));
                });
            });

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;
                
                try {
                    const response = await fetch('https://my-backend-api-bntd.onrender.com/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) {
                        alert(data.msg || data.message || 'بيانات الدخول غير صحيحة');
                        return;
                    }
                    
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('currentUser', data.username);
                    if(data.profilePic) localStorage.setItem('profilePic', data.profilePic);
                    
                    alert(`أهلاً بك مجدداً، ${data.username}!`);
                    closeModal(loginModal);
                    loginForm.reset();
                    updateIndexAuthUI();
                    syncProjectsFromBackend();
                } catch (error) {
                    alert('حدث خطأ في الاتصال بالسيرفر');
                }
            });

            if(logoutBtnHeader) logoutBtnHeader.addEventListener('click', () => {
                clearCurrentUser();
                localStorage.removeItem('token');
                localStorage.removeItem('profilePic');
                alert('Successfully logged out.');
                updateIndexAuthUI();
                displayCodeProjects();
            });

            if(prevPageBtn) prevPageBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; displayCodeProjects(); } });
            if(nextPageBtn) nextPageBtn.addEventListener('click', () => { if (currentPage < Math.ceil(getCodeProjects().length / projectsPerPage)) { currentPage++; displayCodeProjects(); } });

            updateIndexAuthUI();
            syncProjectsFromBackend();
        });         
    </script>
    
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'ar',
                autoDisplay: false
            }, 'google_translate_element');
        }
        
        function changeLanguage(langCode) {
            document.cookie = "googtrans=/ar/" + langCode + "; path=/; domain=" + window.location.hostname;
            document.cookie = "googtrans=/ar/" + langCode + "; path=/;";
            window.location.reload();
        }
        
        window.addEventListener('DOMContentLoaded', (event) => {
            const hasTranslationCookie = document.cookie.includes('googtrans=');
            
            if (!hasTranslationCookie) {
                const userLangFull = navigator.language || navigator.userLanguage;
                const userLangCode = userLangFull.split('-')[0];
                const supportedLangs = ['ar', 'en', 'fr'];
                
                if (supportedLangs.includes(userLangCode) && userLangCode !== 'ar') {
                    changeLanguage(userLangCode);
                }
            } else {
                const match = document.cookie.match(/googtrans=\/ar\/([a-z]{2})/);
                if (match && match[1]) {
                    const selectElement = document.getElementById('langSelect');
                    if (selectElement) selectElement.value = match[1];
                }
            }
        });
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
