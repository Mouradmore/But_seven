<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a new account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-container { background-color: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; border-top: 5px solid #007bff; }
        .register-container h2 { text-align: center; color: #333; margin-top: 0; margin-bottom: 25px; font-size: 1.8rem; }
        .avatar-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .avatar-preview { width: 100px; height: 100px; border-radius: 50%; background-color: #e9ecef; border: 3px solid #007bff; display: flex; justify-content: center; align-items: center; overflow: hidden; margin-bottom: 10px; position: relative; }
        .avatar-preview img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .avatar-preview i { font-size: 2.5rem; color: #adb5bd; }
        .custom-file-upload { background-color: #e9ecef; color: #495057; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: background 0.3s; }
        .custom-file-upload:hover { background-color: #dee2e6; }
        input[type="file"] { display: none; }
        .form-group { margin-bottom: 18px; position: relative; }
        .form-group label { display: block; margin-bottom: 6px; color: #555; font-weight: 600; font-size: 0.9rem; }
        .form-group input:not([type="file"]) { width: 100%; padding: 12px 12px 12px 35px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #007bff; }
        .form-group i.field-icon { position: absolute; bottom: 14px; left: 12px; color: #adb5bd; }
        .submit-btn { width: 100%; background-color: #007bff; color: white; border: none; padding: 14px; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        .submit-btn:hover { background-color: #0056b3; }
        .login-link { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #666; }
        .login-link a { color: #007bff; text-decoration: none; font-weight: bold; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>Create a new account</h2>
        <form id="registerForm">
            <div class="avatar-section">
                <div class="avatar-preview" id="avatarPreviewBox">
                    <i class="fas fa-user" id="avatarIcon"></i>
                    <img id="avatarImage" src="" alt="Profile photo">
                </div>
                <label for="profilePicInput" class="custom-file-upload">
                    <i class="fas fa-camera"></i> Choose a selfie
                </label>
                <input type="file" id="profilePicInput" accept="image/*">
            </div>

            <div class="form-group">
                <label>User name</label>
                <input type="text" id="username" required placeholder="Enter your name">
                <i class="fas fa-user field-icon"></i>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="example@mail.com">
                <i class="fas fa-envelope field-icon"></i>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter a strong password">
                <i class="fas fa-lock field-icon"></i>
            </div>

            <button type="submit" class="submit-btn">Create an account</button>
        </form>

        <div class="login-link">
            Do you already have an account?<a href="indexs.html">Back to Home and Login</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('registerForm');
            const fileInput = document.getElementById('profilePicInput');
            const avatarImage = document.getElementById('avatarImage');
            const avatarIcon = document.getElementById('avatarIcon');
            
            let base64Image = "";

            fileInput.addEventListener('change', function(event) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        base64Image = e.target.result; 
                        avatarImage.src = base64Image;
                        avatarImage.style.display = 'block';
                        avatarIcon.style.display = 'none';
                    };
                    reader.readAsDataURL(file);
                }
            });

            form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    
    try {
        // إرسال البيانات إلى السيرفر
        const response = await fetch('http://localhost:5000/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: username,
                email: email,
                password: password,
                profilePic: base64Image // الصورة المحولة
            })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            alert(data.msg || "حدث خطأ أثناء التسجيل");
            return;
        }
        
        // حفظ التوكن واسم المستخدم في المتصفح
        localStorage.setItem('token', data.token);
        localStorage.setItem('currentUser', data.username);
        
        alert("🎉 " + data.msg);
        window.location.href = "indexs.html";
    } catch (error) {
        console.error("خطأ في الاتصال بالسيرفر:", error);
        alert("فشل الاتصال بالسيرفر. تأكد من تشغيله.");
    }
});
    </script>
</body>
</html>
