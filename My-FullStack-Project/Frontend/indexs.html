    <style>
        /* أنماط CSS العامة */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
            direction: rtl;
            text-align: right;
            transition: margin-right .3s;
            top: 0 !important; /* لحل مشكلة إزاحة شريط جوجل للترجمة */
        }

        /* إخفاء شريط جوجل للترجمة العلوي المزعج وجعله مدمجاً */
        .skiptranslate iframe { display: none !important; }
        #google_translate_element { display: flex; justify-content: center; margin-bottom: 15px; }
        .goog-te-gadget { font-family: inherit !important; color: transparent !important; }
        .goog-te-gadget .goog-te-combo { padding: 5px; border-radius: 5px; border: 1px solid #ddd; font-family: inherit; font-weight: bold; color: #333; }

        header {
            background-color: #fff;
            color: #fff;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 { margin: 0; font-size: 24px; display: flex; 
        align-items: center; gap: 10px; }
        header h1 i { cursor: pointer; }

        .auth-buttons button, .auth-buttons a {
            background-color: transparent;
            color: #666;
            border: none;
            padding: 2px 4px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin: 0 5px;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 14px;
            margin-left: -5px;
            display: inline-block;
        }

        .auth-buttons button:hover, .auth-buttons a:hover {
            background-color: #fff;
            color: #007bff;
        }

        #loggedInUserDisplay { display: none; align-items: center; gap: 10px; }
        #loggedInUserDisplay span { font-weight: bold; }

        .search-container {
            max-width: 500px;
            margin: 20px auto;
            padding: 0 15px;
            display: flex;
            gap: 10px;
        }

        .search-container input {
            width: 100%;  background-color: #fff; color: #000; border-radius: 10px; font-weight: bold; cursor: pointer;
            flex: 1;
            padding: 10px 20px;
            border: 2px solid #ddd;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-container input:focus { border-color: #007bff; }

        .search-container button {
            padding: 8px 15px;
            background-color: #fff;
            color: #333;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .search-container button:hover { background-color: #ddd; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; box-sizing: border-box; }

        #projects-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .project-card {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        /* تنسيق خاص للمشروع الأكثر تفاعلاً */
        .trending-card {
            grid-column: 1 / -1; /* يأخذ العرض بالكامل */
            border: 2px solid #ffca28;
            background: linear-gradient(to bottom left, #fff, #fffde7);
            transform: scale(1.01);
        }

        .trending-badge {
            position: absolute;
            top: -12px;
            right: 20px;
            background-color: #ffca28;
            color: #333;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .project-card h4 { margin: 0 0 10px 0; color: #007bff; font-size: 18px; }
        .project-card p { color: #666; font-size: 14px; flex-grow: 1; line-height: 1.6; margin-bottom: 15px; }
        
        .project-card .author {
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        .project-card .project-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #777;
            margin-bottom: 15px;
        }

        .project-card .actions { display: flex; gap: 10px; }
        
        .project-card .actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #fff;
            transition: background-color 0.2s;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 40px 0;
        }

        .pagination button {
            padding: 10px 20px;
            background-color: #fff;
            border: 2px solid #007bff;
            color: #007bff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .pagination button:disabled {
            border-color: #ddd;
            color: #ccc;
            cursor: not-allowed;
        }

        .pagination button:not(:disabled):hover {
            background-color: #007bff;
            color: #fff;
        }

        /* أنماط القائمة الجانبية */
        .sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 200;
            top: 0;
            right: 0;
            background-color: #ffffff;
            overflow-x: hidden;
            transition: 0.3s;
            padding-top: 60px;
            box-shadow: -2px 0 5px rgba(0,0,0,0.5);
        }

        .sidebar a {
            padding: 10px 15px;
            margin-top: 14px;
            text-decoration: none;
            font-size: 18px;
            color: #666;
            display: block;
            transition: 0.3s;
            text-align: right;
        }

        .sidebar a:hover { color: #0056b3; background-color: #222; }
        .sidebar .closebtn { position: absolute; top: 20px; left: 15px; font-size: 36px; margin-left: 40px; cursor: pointer; color: #0056b3; }
        
        /* أنماط النوافذ المنبثقة */
        .modal {
            display: none;
            position: fixed;
            z-index: 300;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-5px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content h3 { margin-top: 0; color: #007bff; margin-bottom: 20px; }
        .modal-content input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .modal-content button[type="submit"] { width: 100%; padding: 12px; background-color: #007bff; color: #fff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>

// دالة للتحقق مما إذا كان المستخدم الحالي يتابع كاتب المشروع
function checkIsFollowing(followerUsername, targetUsername) {
    const users = getUsers();
    const follower = users.find(u => u.username === followerUsername);
    if (follower && follower.following) {
        return follower.following.includes(targetUsername);
    }
    return false;
}

    const baseUrl = window.location.href.split('/').slice(0, -1).join('/');
    const shareUrl = `${baseUrl}/view.html?id=${projectId}`;
    
    // 2. استخدام واجهة الحافظة (Clipboard API) لنسخ الرابط
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(shareUrl).then(() => {
            showSuccessMessage(btnElement);
        }).catch(() => {
            fallbackCopyTextToClipboard(shareUrl, btnElement);
        });
    } else {
        fallbackCopyTextToClipboard(shareUrl, btnElement);
    }
    
    // دالة داخلية لتغيير شكل الزر عند النجاح
    function showSuccessMessage(btn) {
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        btn.style.backgroundColor = '#20c997'; // تغيير اللون للأخضر الفاتح للتأكيد
        
        // إعادة الزر لشكله الطبيعي بعد ثانيتين
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.style.backgroundColor = '#28a745';
        }, 2000);
    }
    
    // طريقة بديلة موثوقة في حال كان المتصفح لا يدعم النسخ المباشر أو كان الموقع يعمل محلياً (بدون خادم)
    function fallbackCopyTextToClipboard(text, btn) {
        let textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            showSuccessMessage(btn);
        } catch (err) {
            // في أسوأ الحالات، نعرض الرابط في نافذة منبثقة لينسخه المستخدم يدوياً
  prompt("Copy the following link to participate:", text);
        }
        document.body.removeChild(textArea);
    }
};

// دالة لتفعيل أو إلغاء المتابعة
window.toggleFollow = function(targetUsername) {
    const currentUsername = getCurrentUser();
    
    if (!currentUsername) {
alert("Please log in first to follow the developers!");
        openModal(document.getElementById('loginModal'));
        return;
    }
    
    if (currentUsername === targetUsername) {
alert("You cannot follow yourself.");
        return;
    }
    
    let users = getUsers();
    let currentUserObj = users.find(u => u.username === currentUsername);
    let targetUserObj = users.find(u => u.username === targetUsername);
    
    if (!currentUserObj || !targetUserObj) return;
    
    // تهيئة المصفوفات في حال لم تكن موجودة مسبقاً
    if (!currentUserObj.following) currentUserObj.following = [];
    if (!targetUserObj.followers) targetUserObj.followers = [];
    
    const isFollowing = currentUserObj.following.includes(targetUsername);
    
    if (isFollowing) {
        // إلغاء المتابعة
        currentUserObj.following = currentUserObj.following.filter(name => name !== targetUsername);
        targetUserObj.followers = targetUserObj.followers.filter(name => name !== currentUsername);
    } else {
        // متابعة
        currentUserObj.following.push(targetUsername);
        targetUserObj.followers.push(currentUsername);
    }
    
    // حفظ التحديثات وإعادة عرض المشاريع لتحديث شكل الزر
    localStorage.setItem('users', JSON.stringify(users));
    displayCodeProjects();
};

        if (currentPage === 1 && projects.length > 0) {
            let sortedByViews = [...projects].sort((a, b) => (b.views || 0) - (a.views || 0));
            topProject = sortedByViews[0];
            
            if (topProject && topProject.views > 0) { // فقط إذا كان هناك تفاعل مشاهدات حقيقي
                otherProjects = projects.filter(p => p.id !== topProject.id);

        const projectsToDisplay = otherProjects;
        
        // 4. طباعة المشروع الأكثر مشاهدة في الأعلى (Featured Card) إذا وُجد
        if (topProject && currentPage === 1) {
            projectsListDiv.innerHTML += createCardHTML(topProject, true);

        // 5. طباعة باقي المشاريع الخاصة بالصفحة الحالية
        projectsToDisplay.forEach(project => {
            projectsListDiv.innerHTML += createCardHTML(project, false);

        if (prevPageBtn) prevPageBtn.style.display = 'inline-block';
        if (nextPageBtn) nextPageBtn.style.display = 'inline-block';
        
        // 6. حساب وإدارة الصفحات بناءً على البيانات الحقيقية القادمة من السيرفر (data.totalPages)
        prevPageBtn.disabled = currentPage === 1;

        currentPageDisplay.innerHTML = `page ${currentPage} Of ${data.totalPages || 1}`;

            } else {
                currentProj.likes = (currentProj.likes || 0) + 1;
                likedProjects.push(project.id);
                heartIcon.style.color = '#dc3545';
            }
            likeCount.textContent = currentProj.likes;
            localStorage.setItem('likedProjects', JSON.stringify(likedProjects));
            saveCodeProjects(allProjects.map(p => p.id === currentProj.id ? currentProj : p));
        };
        
        // 3. زر التعليقات
        const commentBtn = document.createElement('button');
        commentBtn.style.cssText = 'background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center;';
        const commentIcon = document.createElement('i');
        commentIcon.className = 'fas fa-comment-dots';
        commentIcon.style.cssText = 'color: #ffffff; font-size: 30px; filter: drop-shadow(0px 0px 4px rgba(0,0,0,0.6));';
        const commentCountDisplay = document.createElement('span');
        let commentsArr = project.comments || [];
        commentCountDisplay.textContent = commentsArr.length;
        commentCountDisplay.style.cssText = 'color: #fff; font-size: 14px; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); margin-top: 5px;';
        commentBtn.appendChild(commentIcon);
        commentBtn.appendChild(commentCountDisplay);
        commentBtn.onclick = function(e) {
            e.stopPropagation(); 
            if (document.getElementById('mediaCommentPanel')) { document.getElementById('mediaCommentPanel').remove(); return; }
            const panelOverlay = document.createElement('div');
            panelOverlay.id = 'mediaCommentPanel';
            panelOverlay.style.cssText = 'position: absolute; bottom: 0; left: 0; right: 0; height: 60%; background: rgba(0, 0, 0, 0.95); z-index: 1001; display: flex; flex-direction: column; padding: 20px; border-top-left-radius: 25px; border-top-right-radius: 25px; transition: all 0.3s ease; backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.2); box-sizing: border-box;';
            const closePanelBtn = document.createElement('button');
            closePanelBtn.style.cssText = 'align-self: center; background: rgba(255,255,255,0.3); border: none; margin-bottom: 15px; width: 40px; height: 5px; border-radius: 10px; cursor: pointer;';
            closePanelBtn.onclick = (event) => { event.stopPropagation(); panelOverlay.remove(); };
            const panelTitle = document.createElement('h3');
            panelTitle.textContent = 'التعليقات';
            panelTitle.style.cssText = 'color: #fff; text-align: center; margin: 0 0 15px 0; font-family: sans-serif;';
            const commentsList = document.createElement('div');
            commentsList.style.cssText = 'flex: 1; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 12px; padding-right: 5px;';
            const renderComments = () => {
                let allProj = getCodeProjects();
                let currProj = allProj.find(p => p.id === project.id);
                commentsList.innerHTML = '';
                const currentComments = currProj.comments || [];
                if (currentComments.length === 0) {
                    commentsList.innerHTML = '<p style="text-align: center; color: #888; margin-top: 20px;">لا توجد تعليقات حتى الآن. كن أول من يعلق!</p>';
                } else {
                    currentComments.forEach(c => {
                        const cDiv = document.createElement('div');
                        cDiv.style.cssText = 'background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: right;';
                        cDiv.innerHTML = `<div style="display: flex; justify-content: space-between; margin-bottom: 5px; flex-direction: row-reverse;"><strong style="color: #4da3ff; font-size: 0.9em;">${c.author}</strong><span style="font-size: 0.7em; color: #888;">${new Date(c.date).toLocaleDateString()}</span></div><p style="margin: 0; color: #eee; font-size: 0.95em; line-height: 1.4;">${c.text}</p>`;
                        commentsList.appendChild(cDiv);
                    });
                    commentsList.scrollTop = commentsList.scrollHeight;
                }
                commentCountDisplay.textContent = currentComments.length;
            };
            renderComments();
            const inputArea = document.createElement('div');
            inputArea.style.cssText = 'display: flex; gap: 10px; align-items: center; background: rgba(255,255,255,0.1); padding: 5px; border-radius: 25px; flex-direction: row-reverse;';
            const cInput = document.createElement('input');
            cInput.type = 'text'; cInput.placeholder = 'اكتب تعليقاً...';
            cInput.style.cssText = 'flex: 1; padding: 12px 15px; border-radius: 20px; border: none; outline: none; background: transparent; color: #fff; font-size: 0.9em; text-align: right;';
            const cSubmit = document.createElement('button');
            cSubmit.innerHTML = '<i class="fas fa-paper-plane"></i>';
            cSubmit.style.cssText = 'background: #007bff; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: background 0.2s;';
            cSubmit.onclick = (event) => {
    event.stopPropagation();
    const text = cInput.value.trim();
    if (!text) return;
    
    const currentUser = getCurrentUser();
    if (!currentUser) { alert('عذراً، يجب عليك تسجيل الدخول أولاً لتتمكن من التعليق.'); return; }
    
    let allProj = getCodeProjects();
    let currProj = allProj.find(p => p.id === project.id);
    
    if (!currProj.comments) currProj.comments = [];
    currProj.comments.push({ author: currentUser, text: text, date: new Date().toISOString() });
    
    // تم الإصلاح هنا: استخدام currProj بدلاً من currentProj
    saveCodeProjects(allProj.map(p => p.id === currProj.id ? currProj : p));
    
    cInput.value = '';
    renderComments();
};
            cInput.addEventListener('keypress', function(event) { if (event.key === 'Enter') { event.preventDefault(); cSubmit.click(); } });
            inputArea.appendChild(cInput); inputArea.appendChild(cSubmit);
            panelOverlay.appendChild(closePanelBtn); panelOverlay.appendChild(panelTitle); panelOverlay.appendChild(commentsList); panelOverlay.appendChild(inputArea);
            card.appendChild(panelOverlay);
        };
        
        // 4. زر زيارة الموقع
        const viewSiteBtn = document.createElement('button');
        viewSiteBtn.title = "فتح صفحة المشروع";
        viewSiteBtn.style.cssText = 'background: rgba(0, 123, 255, 0.8); border: 2px solid #fff; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; justify-content: center; align-items: center; margin-top: 5px;';
        const linkIcon = document.createElement('i');
        linkIcon.className = 'fas fa-external-link-alt';
        linkIcon.style.cssText = 'color: #fff; font-size: 18px;';
        viewSiteBtn.appendChild(linkIcon);
        viewSiteBtn.onclick = function(e) { e.stopPropagation(); window.location.href = 'view.html?id=' + project.id; };
        
        overlayUI.appendChild(authorDiv);
        overlayUI.appendChild(likeBtn);
        overlayUI.appendChild(commentBtn);
        overlayUI.appendChild(viewSiteBtn);
        card.appendChild(overlayUI);
        galleryGrid.appendChild(card);
    });
    
    galleryWrapper.appendChild(closeBtn);
    galleryWrapper.appendChild(galleryGrid);
    projectsListDiv.appendChild(galleryWrapper);
}

window.resetToCodes = function() {
    document.body.style.overflow = '';
    const closeBtn = document.getElementById('galleryCloseBtn');
    if (closeBtn) closeBtn.remove();
    if (document.querySelector('.pagination')) { document.querySelector('.pagination').style.display = 'flex'; }
    currentPage = 1;
    displayCodeProjects();
};

        function attachDeleteHandlers() {
            document.querySelectorAll('.delete-project-btn').forEach(button => {
                button.onclick = (event) => {
                    const projectId = event.target.dataset.projectId;
                    const currentUser = getCurrentUser();
                    let projects = getCodeProjects();
                    const projectIndex = projects.findIndex(p => p.id === projectId);

                    if (projectIndex !== -1 && projects[projectIndex].author === currentUser) {
                        if (confirm('Are you sure you want to delete this project?')) {
                            projects.splice(projectIndex, 1);
                            saveCodeProjects(projects);
                            alert('The project has been successfully deleted.');
                            displayCodeProjects();
                        }
                    }
                };
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(loginBtnHeader) loginBtnHeader.addEventListener('click', (e) => { e.preventDefault(); openModal(loginModal); });
            if(registerBtnHeader) registerBtnHeader.addEventListener('click', (e) => { e.preventDefault(); window.location.href = "register.html"; });

            document.querySelectorAll('.close-button').forEach(button => {
                button.addEventListener('click', (event) => {
                    closeModal(document.getElementById(event.target.dataset.modal));
                });
            });

           loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    try {
        const response = await fetch('http://localhost:5000/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            alert(data.msg);
            return;
        }
        
        // نجاح تسجيل الدخول
        localStorage.setItem('token', data.token);
        localStorage.setItem('currentUser', data.username);
        
        alert(`أهلاً بك مجدداً، ${data.username}!`);
        closeModal(loginModal);
        loginForm.reset();
        updateIndexAuthUI();
        displayCodeProjects(); // تحديث المشاريع بعد الدخول
    } catch (error) {
        alert('حدث خطأ في الاتصال بالسيرفر');
    }
});
    </script>
