<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>But_Seven Player - الرئيسية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/home.css">
    <style>
      body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background-color: #0f0f0f;
    color: #fff;
}

.main-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 5%;
    background-color: #161616;
    position: sticky;
    top: 0;
    z-index: 100;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 1px;
}

.logo .badge {
    background: #007bff;
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 5px;
    vertical-align: middle;
}

.search-box {
    display: flex;
    background: #222;
    border-radius: 20px;
    overflow: hidden;
    width: 40%;
    max-width: 500px;
}

#search-input {
    flex: 1;
    border: none;
    background: none;
    padding: 10px 15px;
    color: #fff;
    outline: none;
}

#search-btn {
    background: #333;
    border: none;
    color: #aaa;
    padding: 0 15px;
    cursor: pointer;
    transition: 0.2s;
}

#search-btn:hover {
    color: #fff;
    background: #444;
}

/* تنسيق الأقسام والصفوف */
.content-wrapper {
    padding: 20px 5%;
}

.video-section {
    margin-bottom: 40px;
}

.section-title {
    font-size: 18px;
    margin-bottom: 15px;
    color: #e5e5e5;
    display: flex;
    align-items: center;
    gap: 8px;
}

.video-row {
    display: flex;
    gap: 15px;
    overflow-x: auto;
    padding-bottom: 15px;
    scrollbar-width: thin;
}

/* تخصيص كارت الفيديو */
.video-card {
    min-width: 240px;
    width: 240px;
    background: #1c1c1c;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
}

.video-card:hover {
    transform: translateY(-5px);
    background: #252525;
}

.thumbnail-wrapper {
    position: relative;
    width: 100%;
    padding-top: 56.25%; /* أبعاد 16:9 الافتراضية */
    background: #000;
}

.thumbnail-wrapper img {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover;
}

.video-info {
    padding: 12px;
}

.video-title {
    font-size: 14px;
    font-weight: bold;
    margin: 0 0 5px 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.video-stats {
    font-size: 11px;
    color: #aaa;
}

/* تحسين شريط التمرير */
.video-row::-webkit-scrollbar { height: 6px; }
.video-row::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
a{
    font-size: 11px;
color: #aaa;
text-decoration: none;
}
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo">But_Seven <span class="badge">Player</span>
        <a href="index.html"> home</a>
        </div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="ابحث عن فيديوهات، دورات...">
            <button id="search-btn"><i class="fas fa-search"></i></button>
        </div>
    </header>

    <main class="content-wrapper">
        
        <section class="video-section">
            <h2 class="section-title"><i class="fas fa-clock"></i> أحدث الفيديوهات</h2>
            <div class="video-row" id="latest-row">
                </div>
        </section>

        <section class="video-section">
            <h2 class="section-title"><i class="fas fa-fire"></i> الأكثر مشاهدة</h2>
            <div class="video-row" id="popular-row"></div>
        </section>

        <section class="video-section">
            <h2 class="section-title"><i class="fas fa-star"></i> فيديوهات مقترحة</h2>
            <div class="video-row" id="suggested-row"></div>
            
        </section>
        <section class="video-section" id="search-results-section" style="display: none;">
    <h2 class="section-title"><i class="fas fa-search"></i> نتائج البحث</h2>
    <div class="video-row" id="search-results-row" style="flex-wrap: wrap; justify-content: flex-start;">
    </div>
</section>

    </main>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
  fetchHomepageVideos();
});

async function fetchHomepageVideos() {
  try {
   // قم بتغيير هذا السطر
const response = await fetch('https://my-backend-api-bntd.onrender.com/api/videos/homepage');
    const data = await response.json();
    
    // رندر كل قسم بناءً على مصفوفة البيانات القادمة من السيرفر
    renderRow(data.latest, 'latest-row');
    renderRow(data.popular, 'popular-row');
    renderRow(data.suggested, 'suggested-row');
    
  } catch (error) {
    console.error('خطأ في تحميل فيديوهات الصفحة الرئيسية:', error);
  }
}

function renderRow(videos, rowId) {
  const rowElement = document.getElementById(rowId);
  rowElement.innerHTML = ''; // تفريغ الصف
  
  if (!videos || videos.length === 0) {
    rowElement.innerHTML = '<p class="empty-msg">لا توجد فيديوهات في هذا القسم حالياً.</p>';
    return;
  }
  
  videos.forEach(video => {
    const card = document.createElement('div');
    card.className = 'video-card';
    
    // عند الضغط على الكارت يتم فتح المشغل المستقل مع تمرير معرف الفيديو في الرابط
    card.addEventListener('click', () => {
      window.location.href = `player.html?v=${video.id}`;
    });
    
    card.innerHTML = `
            <div class="thumbnail-wrapper">
                <img src="${video.thumbnail || 'img/default-thumb.jpg'}" alt="${video.title}">
            </div>
            <div class="video-info">
                <h3 class="video-title">${video.title}</h3>
                <div class="video-stats">
                    <span><i class="fas fa-eye"></i> ${video.views || 0} مشاهدة</span>
                </div>
            </div>
        `;
    
    rowElement.appendChild(card);
  });
}
const searchInput = document.getElementById('search-input');
const mainSections = document.querySelectorAll('.video-section:not(#search-results-section)');
const searchResultsSection = document.getElementById('search-results-section');
const searchResultsRow = document.getElementById('search-results-row');

// متغير لحفظ المؤقت (Timer) الخاص بتقنية Debounce
let searchTimeout;

searchInput.addEventListener('input', (e) => {
    const query = e.target.value.trim();
    
    // إلغاء الطلب السابق إذا كان المستخدم لا يزال يكتب
    clearTimeout(searchTimeout);
    
    // إذا تم مسح مربع البحث، أعد عرض الصفحة الرئيسية الطبيعية
    if (query === '') {
        searchResultsSection.style.display = 'none';
        mainSections.forEach(section => section.style.display = 'block');
        return;
    }
    
    // تأخير إرسال الطلب للسيرفر لمدة 500 ملي ثانية (نصف ثانية)
    searchTimeout = setTimeout(() => {
        performSearch(query);
    }, 500);
});

async function performSearch(query) {
    try {
        // إخفاء الأقسام الرئيسية وإظهار قسم البحث
        mainSections.forEach(section => section.style.display = 'none');
        searchResultsSection.style.display = 'block';
        searchResultsRow.innerHTML = '<p style="color:#aaa; width:100%; text-align:center;">جاري البحث عن تفاصيل...</p>';
        
     // قم بتغيير هذا السطر
const response = await fetch('https://my-backend-api-bntd.onrender.com/api/videos/homepage');
        const data = await response.json();
        
        searchResultsRow.innerHTML = ''; // مسح رسالة التحميل
        
        if (data.videos.length === 0) {
            searchResultsRow.innerHTML = '<p style="color:#aaa; width:100%; text-align:center;">لم يتم العثور على نتائج مطابقة لكلمة البحث.</p>';
            return;
        }
        
        // بناء كروت الفيديوهات الناتجة من البحث
        data.videos.forEach(video => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.style.marginBottom = '20px'; // مسافة سفلية إضافية لترتيب الكروت المتعددة
            
            card.addEventListener('click', () => {
                window.location.href = `player.html?v=${video.id}`;
            });
            
            card.innerHTML = `
                <div class="thumbnail-wrapper">
                    <img src="${video.thumbnail || 'img/default-thumb.jpg'}" alt="${video.title}">
                </div>
                <div class="video-info">
                    <h3 class="video-title">${video.title}</h3>
                    <div class="video-stats">
                        <span><i class="fas fa-eye"></i> ${video.views || 0} مشاهدة</span>
                    </div>
                </div>
            `;
            searchResultsRow.appendChild(card);
        });
        
    } catch (error) {
        console.error('خطأ في عملية البحث:', error);
        searchResultsRow.innerHTML = '<p style="color:#ff3b30; width:100%; text-align:center;">حدث خطأ في الاتصال بالخادم. يرجى المحاولة لاحقاً.</p>';
    }
}
    </script>
</body>
</html>
