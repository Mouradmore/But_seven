<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>But_Seven - معاينة المشروع</title>
    <style>
        /* ===== متغيرات الوضع الليلي ===== */
        :root {
            --bg-primary: #f4f6f9;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #8888aa;
            --border-color: #e8ecf1;
            --shadow-color: rgba(0, 0, 0, 0.08);
            --shadow-hover: rgba(0, 0, 0, 0.15);
            --accent-color: #667eea;
            --accent-hover: #5a6fd6;
            --header-bg: #ffffff;
            --header-shadow: 0 2px 20px rgba(0,0,0,0.08);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-bg: #ffffff;
            --input-bg: #ffffff;
            --comment-bg: #f8f9fa;
            --reply-bg: #f0f2f5;
            --star-color: #e4e5e9;
            --star-active: #f5a623;
        }

        [data-theme="dark"] {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #1e1e36;
            --text-primary: #e8e8f0;
            --text-secondary: #b0b0cc;
            --text-muted: #6a6a8a;
            --border-color: #2a2a4a;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --shadow-hover: rgba(0, 0, 0, 0.5);
            --accent-color: #7c8cf5;
            --accent-hover: #6a7ae0;
            --header-bg: #12122a;
            --header-shadow: 0 2px 20px rgba(0,0,0,0.3);
            --sidebar-bg: #1a1a2e;
            --input-bg: #1a1a2e;
            --comment-bg: #252545;
            --reply-bg: #1f1f42;
            --star-color: #3a3a5a;
            --star-active: #f5a623;
        }

        /* ===== CSS العامة ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            direction: rtl;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background var(--transition), color var(--transition);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 3px; }

        /* ===== الهيدر ===== */
        header {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            position: relative;
            z-index: 100;
            box-sizing: border-box;
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--header-shadow);
            transition: all var(--transition);
        }

        header .left-side {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        header .logo {
            font-weight: 800;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header .logo i {
            -webkit-text-fill-color: var(--accent-color);
        }

        header .project-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            padding-right: 16px;
            border-right: 2px solid var(--border-color);
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        header .right-side {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid var(--border-color);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all var(--transition);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            text-decoration: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--shadow-color);
        }

        .btn-primary {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .btn-outline:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 1.1rem;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all var(--transition);
            color: var(--text-secondary);
        }

        .theme-toggle:hover {
            transform: rotate(20deg);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* ===== إطار عرض الصفحة ===== */
        .full-web-frame {
            width: 100%;
            height: calc(100vh - 64px);
            border: none;
            background: #ffffff;
            display: block;
            transition: all var(--transition);
        }

        /* ===== شاشة التحميل ===== */
        .loading-screen {
            position: fixed;
            top: 64px;
            right: 0;
            width: 100%;
            height: calc(100vh - 64px);
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .loading-screen .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-screen p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ===== اللوحة الجانبية ===== */
        .interaction-sidebar {
            position: fixed;
            top: 64px;
            left: -440px;
            width: 420px;
            height: calc(100vh - 64px);
            background: var(--sidebar-bg);
            box-shadow: -4px 0 30px rgba(0,0,0,0.15);
            z-index: 99;
            transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            border-left: 1px solid var(--border-color);
        }

        .interaction-sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .sidebar-header h4 {
            margin: 0;
            color: var(--text-primary);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header h4 i {
            color: var(--accent-color);
        }

        .close-sidebar {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition);
            padding: 4px 8px;
            border-radius: 8px;
        }

        .close-sidebar:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
            transform: rotate(90deg);
        }

        .sidebar-content {
            padding: 20px 24px;
            overflow-y: auto;
            flex-grow: 1;
        }

        /* ===== معلومات المشروع ===== */
        .meta-info-box {
            background: var(--bg-primary);
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .meta-info-box .author-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .meta-info-box .author-row img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-color);
        }

        .meta-info-box .author-row .author-name {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .meta-info-box .author-row .author-handle {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .stats-row {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .stats-row span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stats-row i {
            color: var(--accent-color);
            font-size: 1rem;
        }

        .stats-row .likes-count i {
            color: #dc3545;
        }

        /* ===== نظام تقييم النجوم ===== */
        .rating-section {
            margin-bottom: 20px;
            padding: 16px;
            background: var(--bg-primary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .rating-section .rating-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 8px;
        }

        .rating-section .rating-label .avg-rating {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        .stars-container {
            display: flex;
            justify-content: center;
            gap: 6px;
            direction: ltr;
        }

        .stars-container .star {
            font-size: 2rem;
            cursor: pointer;
            color: var(--star-color);
            transition: all 0.2s ease;
            user-select: none;
            line-height: 1;
        }

        .stars-container .star:hover,
        .stars-container .star.active {
            color: var(--star-active);
            transform: scale(1.15);
        }

        .stars-container .star.active {
            text-shadow: 0 0 20px rgba(245, 166, 35, 0.3);
        }

        .rating-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .rating-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ===== زر الإعجاب ===== */
        .like-action-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            background: var(--bg-secondary);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            transition: all var(--transition);
            color: var(--text-secondary);
        }

        .like-action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--shadow-color);
        }

        .like-action-btn.liked {
            background: rgba(220, 53, 69, 0.08);
            border-color: #dc3545;
            color: #dc3545;
        }

        .like-action-btn.liked svg {
            fill: #dc3545;
        }

        .like-action-btn svg {
            fill: var(--text-muted);
            transition: fill var(--transition);
        }

        /* ===== قسم التعليقات ===== */
        .comments-section-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .comments-section-title .count {
            background: var(--bg-primary);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .comments-list {
            margin-bottom: 16px;
            max-height: 320px;
            overflow-y: auto;
        }

        .comment-card {
            background: var(--comment-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 10px;
            transition: all var(--transition);
        }

        .comment-card:hover {
            border-color: var(--accent-color);
        }

        .comment-card .comment-user {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .comment-card .comment-user .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .comment-card .comment-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-top: 4px;
            padding-right: 36px;
        }

        .comment-card .comment-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: inline-block;
            margin-top: 4px;
            padding-right: 36px;
        }

        .comment-card .comment-actions {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            padding-right: 36px;
        }

        .comment-card .comment-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            cursor: pointer;
            transition: color var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .comment-card .comment-actions button:hover {
            color: var(--accent-color);
            background: var(--bg-primary);
        }

        /* ===== الردود ===== */
        .replies-container {
            padding-right: 36px;
            margin-top: 8px;
            border-right: 2px solid var(--border-color);
            padding-right: 12px;
        }

        .reply-card {
            background: var(--reply-bg);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
        }

        .reply-card .reply-user {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .reply-card .reply-user .user-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            object-fit: cover;
        }

        .reply-card .reply-text {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 2px;
            padding-right: 26px;
        }

        .reply-card .reply-time {
            font-size: 0.65rem;
            color: var(--text-muted);
            display: inline-block;
            margin-top: 2px;
            padding-right: 26px;
        }

        .reply-input-container {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            padding-right: 36px;
        }

        .reply-input-container input {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.8rem;
            background: var(--input-bg);
            color: var(--text-primary);
            outline: none;
            transition: all var(--transition);
        }

        .reply-input-container input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .reply-input-container input::placeholder {
            color: var(--text-muted);
        }

        .reply-input-container button {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            background: var(--accent-color);
            color: #fff;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
        }

        .reply-input-container button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .no-comments {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 20px 0;
        }

        /* ===== نموذج إضافة تعليق ===== */
        .comment-input-form {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-secondary);
            flex-shrink: 0;
            margin-bottom: 70px;
        }

        .comment-input-form .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .comment-input-form textarea {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            resize: none;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.9rem;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: all var(--transition);
            min-height: 44px;
            max-height: 100px;
        }

        .comment-input-form textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .comment-input-form textarea::placeholder {
            color: var(--text-muted);
        }

        .comment-input-form button {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            background: var(--accent-color);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            height: 44px;
            flex-shrink: 0;
        }

        .comment-input-form button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        /* ===== استجابة للشاشات الصغيرة ===== */
        @media (max-width: 768px) {
            .interaction-sidebar {
                width: 100%;
                left: -100%;
                top: 64px;
                height: calc(100vh - 64px);
            }

            .interaction-sidebar.open {
                left: 0;
            }

            header .project-title {
                max-width: 120px;
                font-size: 0.85rem;
                padding-right: 10px;
            }

            header .logo {
                font-size: 1rem;
            }

            .sidebar-content {
                padding: 16px;
            }

            .comment-input-form {
                padding: 12px 16px;
            }

            .meta-info-box {
                padding: 12px 16px;
            }

            .stars-container .star {
                font-size: 1.6rem;
            }

            .rating-stats {
                flex-wrap: wrap;
                gap: 10px;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 0 12px;
                height: 56px;
            }

            .full-web-frame {
                height: calc(100vh - 56px);
            }

            .interaction-sidebar {
                top: 56px;
                height: calc(100vh - 56px);
            }

            .loading-screen {
                top: 56px;
                height: calc(100vh - 56px);
            }

            header .project-title {
                max-width: 80px;
                font-size: 0.75rem;
            }

            .btn {
                padding: 6px 12px;
                font-size: 0.75rem;
            }

            .btn-icon {
                width: 34px;
                height: 34px;
                font-size: 0.9rem;
            }

            .theme-toggle {
                width: 34px;
                height: 34px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== الهيدر ===== -->
    <header>
        <div class="left-side">
            <a href="index.html" class="logo">
                <i class="fas fa-code"></i> But_Seven
            </a>
            <span class="project-title" id="topProjectTitle">جاري تحميل المشروع...</span>
        </div>

        <div class="right-side">
            <button class="theme-toggle" onclick="toggleTheme()" title="تبديل الوضع الليلي">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <button class="btn btn-primary btn-icon" onclick="toggleSidebar()" title="التفاعل والتعليقات">
                <i class="fas fa-comment-dots"></i>
                <span id="topCommentsCount" style="font-size:0.7rem;background:rgba(255,255,255,0.2);padding:0 6px;border-radius:10px;">0</span>
            </button>
           <button onclick="goBackSmoothly()" class="btn btn-outline">
    <i class="fas fa-arrow-right"></i> العودة
</button>
        </div>
    </header>

    <!-- ===== شاشة التحميل ===== -->
    <div id="loadingScreen" class="loading-screen">
        <div class="spinner"></div>
        <p>جاري تحميل المشروع...</p>
    </div>

    <!-- ===== إطار عرض الصفحة ===== -->
    <iframe id="webOutputFrame" class="full-web-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>

    <!-- ===== اللوحة الجانبية ===== -->
    <div id="interactionSidebar" class="interaction-sidebar">
      <div class="sidebar-header">
    <h4><i class="fas fa-heart" style="color:#dc3545;"></i> تفاعل مع المشروع</h4>
    <div style="display:flex;gap:8px;align-items:center;">
        <button onclick="goBackSmoothly()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem;transition:all 0.3s;padding:4px 8px;border-radius:8px;" title="العودة للرئيسية" onmouseover="this.style.background='var(--bg-primary)'" onmouseout="this.style.background='transparent'">
            <i class="fas fa-arrow-right"></i>
        </button>
        <button class="close-sidebar" onclick="toggleSidebar()">
            <i class="fas fa-times"></i>
        </button>
    </div>
</div>

        <div class="sidebar-content">
            <!-- معلومات المطور -->
            <div class="meta-info-box">

                        <div class="author-handle"><i class="fas fa-code"></i> مطور</div>

                <div class="stats-row">
                    <span><i class="fas fa-eye"></i> <span id="viewsCount">0</span></span>

                    <span><i class="fas fa-comment"></i> <span id="sidebarCommentsCount">0</span></span>

            <!-- ===== نظام تقييم النجوم ===== -->
            <div class="rating-section">

                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
                <div class="rating-stats">
                    <span><i class="fas fa-users"></i> <span id="ratingCount">0</span> تقييم</span>
                    <span><i class="fas fa-star" style="color:var(--star-active);"></i> <span id="ratingTotalDisplay">0.0</span></span>
                </div>
            </div>

            <!-- زر الإعجاب -->
            <button class="like-action-btn" id="likeActionBtn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22">
                    <path d="M17.75,1c-2.504,0-4.777,1.851-5.75,4.354-.973-2.504-3.246-4.354-5.75-4.354C2.804,1,0,3.804,0,7.25c0,6.76,9.754,14.07,11.709,15.466l.291,.208,.291-.208c1.956-1.396,11.709-8.707,11.709-15.466,0-3.446-2.804-6.25-6.25-6.25Zm-5.75,20.693C6.859,17.958,1,12.022,1,7.25,1,4.355,3.355,2,6.25,2c2.748,0,5.25,2.86,5.25,6h1c0-3.14,2.502-6,5.25-6,2.895,0,5.25,2.355,5.25,5.25,0,4.772-5.859,10.708-11,14.443Z"/>
                </svg>
                <span id="likeBtnText">إعجاب</span>
            </button>

            <!-- التعليقات -->
            <div class="comments-section-title">
                <i class="fas fa-comments"></i> التعليقات
                <span class="count" id="commentsCountBadge">0</span>
            </div>
            <div class="comments-list" id="commentsListZone">
                <div class="no-comments">لا توجد تعليقات على هذا المشروع حتى الآن.</div>
            </div>
        </div>

        <!-- نموذج إضافة تعليق -->
        <div class="comment-input-form">
            <form id="sidebarCommentForm">
                <div class="input-wrapper">
                    <textarea id="sidebarCommentInput" rows="1" placeholder="اكتب تعليقك هنا..." required></textarea>
                    <button type="submit">
                        <i class="fas fa-paper-plane"></i> إرسال
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ===== السكريبتات ===== -->
    <script>
        // ==========================================
        // 1. إدارة الوضع الليلي
        // ==========================================
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            if (theme === 'dark') {
                icon.className = 'fas fa-sun';
            } else {
                icon.className = 'fas fa-moon';
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        // ==========================================
        // 2. عناصر DOM
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        const webOutputFrame = document.getElementById('webOutputFrame');
        const topProjectTitle = document.getElementById('topProjectTitle');
        const topCommentsCount = document.getElementById('topCommentsCount');
        const authorName = document.getElementById('authorName');
        const authorAvatar = document.getElementById('authorAvatar');
        const viewsCount = document.getElementById('viewsCount');
        const likesCount = document.getElementById('likesCount');
        const sidebarCommentsCount = document.getElementById('sidebarCommentsCount');
        const commentsCountBadge = document.getElementById('commentsCountBadge');
        const likeActionBtn = document.getElementById('likeActionBtn');
        const likeBtnText = document.getElementById('likeBtnText');
        const commentsListZone = document.getElementById('commentsListZone');
        const sidebarCommentForm = document.getElementById('sidebarCommentForm');
        const sidebarCommentInput = document.getElementById('sidebarCommentInput');
        const loadingScreen = document.getElementById('loadingScreen');
        const interactionSidebar = document.getElementById('interactionSidebar');

        // عناصر التقييم
        const starsContainer = document.getElementById('starsContainer');
        const avgRatingDisplay = document.getElementById('avgRatingDisplay');
        const ratingDisplay = document.getElementById('ratingDisplay');
        const ratingCount = document.getElementById('ratingCount');
        const ratingTotalDisplay = document.getElementById('ratingTotalDisplay');

        let currentProject = null;
        let currentUser = localStorage.getItem('currentUser');
        let userRating = 0;

        // ==========================================
        // 3. دوال مساعدة
        // ==========================================
        function getUserAvatar(username) {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.username === username);
            if (user && user.profilePic) return user.profilePic;
            return "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23888'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";
        }

        function toggleSidebar() {
            interactionSidebar.classList.toggle('open');
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-EG', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
        }

        // ==========================================
        // 4. الحصول على التوكن
        // ==========================================
        function getToken() {
            return localStorage.getItem('token');
        }

        // ==========================================
        // 5. نظام التقييم - مع دعم التخزين المحلي
        // ==========================================
        function updateRatingDisplay(project) {
            const ratings = project.ratings || [];
            const totalRatings = ratings.length;

            if (totalRatings === 0) {
                avgRatingDisplay.textContent = '(0.0)';
                ratingDisplay.textContent = '0.0';
                ratingCount.textContent = '0';
                ratingTotalDisplay.textContent = '0.0';
                return;
            }

            const sum = ratings.reduce((acc, r) => acc + r.value, 0);
            const avg = (sum / totalRatings);
            const roundedAvg = avg.toFixed(1);

            avgRatingDisplay.textContent = `(${roundedAvg})`;
            ratingDisplay.textContent = roundedAvg;
            ratingCount.textContent = totalRatings;
            ratingTotalDisplay.textContent = roundedAvg;

            // تحديث النجوم
            const stars = starsContainer.querySelectorAll('.star');
            const fullStars = Math.round(avg);
            stars.forEach((star, index) => {
                if (index < fullStars) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        function updateUserRating(project) {
            const ratings = project.ratings || [];
            const userRatingObj = ratings.find(r => r.user === currentUser);

            if (userRatingObj) {
                userRating = userRatingObj.value;
                const stars = starsContainer.querySelectorAll('.star');
                stars.forEach((star, index) => {
                    if (index < userRating) {
                        star.classList.add('active');
                    } else {
                        star.classList.remove('active');
                    }
                });
            } else {
                userRating = 0;
                starsContainer.querySelectorAll('.star').forEach(star => star.classList.remove('active'));
            }
        }

        // حدث النقر على النجوم
        starsContainer.querySelectorAll('.star').forEach(star => {
            star.addEventListener('click', async function() {
                const value = parseInt(this.dataset.value);
                const token = getToken();

                if (!token) {
                    alert('يرجى تسجيل الدخول أولاً لتتمكن من التقييم.');
                    return;
                }

                try {
                    // محاولة إرسال التقييم للسيرفر
                    const response = await fetch(
                        `https://my-backend-api-bntd.onrender.com/api/projects/${projectId}/rating`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({ rating: value })
                        }
                    );

                    if (!response.ok) {
                        // إذا فشل السيرفر، نستخدم التخزين المحلي
                        console.warn('فشل الاتصال بالسيرفر، استخدام التخزين المحلي');
                        saveRatingLocally(value);
                        return;
                    }

                    const updatedProject = await response.json();
                    currentProject = updatedProject;
                    updateRatingDisplay(updatedProject);
                    updateUserRating(updatedProject);

                } catch (err) {
                    console.warn('خطأ في الاتصال بالسيرفر، استخدام التخزين المحلي:', err);
                    saveRatingLocally(value);
                }
            });

            // تأثير hover
            star.addEventListener('mouseenter', function() {
                const value = parseInt(this.dataset.value);
                const allStars = starsContainer.querySelectorAll('.star');
                allStars.forEach((s, index) => {
                    if (index < value) {
                        s.style.color = 'var(--star-active)';
                    } else {
                        s.style.color = 'var(--star-color)';
                    }
                });
            });

            star.addEventListener('mouseleave', function() {
                const allStars = starsContainer.querySelectorAll('.star');
                if (userRating > 0) {
                    allStars.forEach((s, index) => {
                        if (index < userRating) {
                            s.style.color = 'var(--star-active)';
                        } else {
                            s.style.color = 'var(--star-color)';
                        }
                    });
                } else {
                    allStars.forEach(s => {
                        s.style.color = 'var(--star-color)';
                    });
                }
            });
        });

        // حفظ التقييم محلياً
        function saveRatingLocally(value) {
            if (!currentProject) return;

            // تهيئة مصفوفة التقييمات
            if (!currentProject.ratings) currentProject.ratings = [];

            // حذف التقييم السابق للمستخدم
            currentProject.ratings = currentProject.ratings.filter(r => r.user !== currentUser);

            // إضافة التقييم الجديد
            currentProject.ratings.push({ user: currentUser, value: value });

            // تحديث التخزين المحلي
            const allProjects = JSON.parse(localStorage.getItem('codeProjects')) || [];
            const index = allProjects.findIndex(p => p.id === projectId);
            if (index !== -1) {
                allProjects[index] = currentProject;
                localStorage.setItem('codeProjects', JSON.stringify(allProjects));
            }

            // تحديث العرض
            updateRatingDisplay(currentProject);
            updateUserRating(currentProject);
        }

// ==========================================
// 6. عرض التعليقات والردود مع أزرار التعديل والحذف
// ==========================================
function renderComments(comments) {
            commentsListZone.innerHTML = '';

            if (!comments || comments.length === 0) {
                commentsListZone.innerHTML = '<div class="no-comments">لا توجد تعليقات على هذا المشروع حتى الآن.<br><span style="font-size:0.8rem;">كن أول من يعلق!</span></div>';
                return;
            }

            comments.forEach(comment => {
                const card = document.createElement('div');
                card.classList.add('comment-card');
                const commentId = comment._id || comment.id || 'c' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
                card.dataset.commentId = commentId;

                const userAvatar = getUserAvatar(comment.author);
                const formattedDate = formatDate(comment.createdAt || comment.date);

                // زر حذف التعليق للمالك
                const deleteCommentBtn = comment.author === currentUser ? `
                    <button onclick="deleteComment('${commentId}')" style="background:none;border:none;color:#dc3545;cursor:pointer;font-size:0.7rem;margin-right:auto;">
                        <i class="fas fa-trash"></i>
                    </button>
                ` : '';

                // زر تعديل التعليق للمالك
                const editCommentBtn = comment.author === currentUser ? `
                    <button onclick="editComment('${commentId}')" style="background:none;border:none;color:var(--accent-color);cursor:pointer;font-size:0.7rem;">
                        <i class="fas fa-edit"></i>
                    </button>
                ` : '';

                let repliesHTML = '';
                if (comment.replies && comment.replies.length > 0) {
                    repliesHTML = `<div class="replies-container">`;
                    comment.replies.forEach(reply => {
                        const replyAvatar = getUserAvatar(reply.author);
                        const replyDate = formatDate(reply.createdAt || reply.date);
                        const replyId = reply._id || reply.id || 'r' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
                        
                        // أزرار حذف وتعديل الرد للمالك
                        const replyActions = reply.author === currentUser ? `
                            <span style="margin-right:auto;">
                                <button onclick="editReply('${commentId}','${replyId}')" style="background:none;border:none;color:var(--accent-color);cursor:pointer;font-size:0.6rem;margin-left:5px;">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="deleteReply('${commentId}','${replyId}')" style="background:none;border:none;color:#dc3545;cursor:pointer;font-size:0.6rem;">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </span>
                        ` : '';

                        repliesHTML += `
                            <div class="reply-card" data-reply-id="${replyId}">
                                <div class="reply-user">
                                    <img src="${replyAvatar}" class="user-avatar" alt="${reply.author}">
                                    ${reply.author || 'زائر'}
                                    ${replyActions}
                                </div>
                                <div class="reply-text" id="replyText_${replyId}">${reply.text}</div>
                                <span class="reply-time"><i class="far fa-clock"></i> ${replyDate}</span>
                                <div class="reply-edit-container" id="replyEdit_${replyId}" style="display:none;margin-top:5px;">
                                    <input type="text" id="replyEditInput_${replyId}" value="${reply.text}" style="flex:1;padding:4px 8px;border:1px solid var(--border-color);border-radius:6px;background:var(--input-bg);color:var(--text-primary);font-size:0.8rem;width:100%;">
                                    <button onclick="saveReplyEdit('${commentId}','${replyId}')" style="margin-top:5px;padding:4px 12px;border:none;border-radius:6px;background:var(--accent-color);color:#fff;cursor:pointer;font-size:0.7rem;">
                                        حفظ
                                    </button>
                                    <button onclick="cancelReplyEdit('${replyId}')" style="margin-top:5px;padding:4px 12px;border:none;border-radius:6px;background:var(--text-muted);color:#fff;cursor:pointer;font-size:0.7rem;">
                                        إلغاء
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                    repliesHTML += `</div>`;
                }

                card.innerHTML = `
                    <div class="comment-user">
                        <img src="${userAvatar}" class="user-avatar" alt="${comment.author}">
                        ${comment.author || 'زائر'}
                        ${editCommentBtn}
                        ${deleteCommentBtn}
                    </div>
                    <div class="comment-text" id="commentText_${commentId}">${comment.text}</div>
                    <span class="comment-time"><i class="far fa-clock"></i> ${formattedDate}</span>
                    <div class="comment-edit-container" id="commentEdit_${commentId}" style="display:none;margin-top:5px;">
                        <input type="text" id="commentEditInput_${commentId}" value="${comment.text}" style="flex:1;padding:6px 12px;border:1px solid var(--border-color);border-radius:8px;background:var(--input-bg);color:var(--text-primary);font-size:0.9rem;width:100%;">
                        <button onclick="saveCommentEdit('${commentId}')" style="margin-top:5px;padding:6px 16px;border:none;border-radius:8px;background:var(--accent-color);color:#fff;cursor:pointer;font-size:0.8rem;">
                            حفظ
                        </button>
                        <button onclick="cancelCommentEdit('${commentId}')" style="margin-top:5px;padding:6px 16px;border:none;border-radius:8px;background:var(--text-muted);color:#fff;cursor:pointer;font-size:0.8rem;">
                            إلغاء
                        </button>
                    </div>
                    <div class="comment-actions">
                        <button class="reply-toggle-btn" onclick="toggleReplyInput('${commentId}')">
                            <i class="fas fa-reply"></i> رد (${comment.replies ? comment.replies.length : 0})
                        </button>
                    </div>
                    ${repliesHTML}
                    <div class="reply-input-container" id="replyInput_${commentId}" style="display:none;">
                        <input type="text" id="replyText_${commentId}" placeholder="اكتب ردك هنا..." maxlength="500">
                        <button onclick="submitReply('${commentId}')">
                            <i class="fas fa-paper-plane"></i> إرسال
                        </button>
                    </div>
                `;

                commentsListZone.appendChild(card);
            });

            // تحديث العداد
            const totalComments = comments.length;
            sidebarCommentsCount.textContent = totalComments;
            commentsCountBadge.textContent = totalComments;
            topCommentsCount.textContent = totalComments;

            // التمرير لأسفل
            commentsListZone.scrollTop = commentsListZone.scrollHeight;
        }


// ==========================================
// دوال إدارة الردود (إرسال، تعديل، حذف)
// ==========================================

// إرسال رد
// ==========================================
// دوال إدارة التعليقات (حذف وتعديل)
// ==========================================

// حذف تعليق
window.deleteComment = async function(commentId) {
    if (!confirm('هل أنت متأكد من حذف هذا التعليق؟')) return;
    
    const token = getToken();
    if (!token) {
        alert('يرجى تسجيل الدخول أولاً');
        return;
    }
    
    try {
        const response = await fetch(
            `https://my-backend-api-bntd.onrender.com/api/projects/${projectId}/comment/${commentId}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            }
        );
        
        if (!response.ok) {
            const errorData = await response.json();
            alert(errorData.msg || 'حدث خطأ أثناء حذف التعليق');
            return;
        }
        
        const updatedProject = await response.json();
        currentProject = updatedProject;
        renderComments(updatedProject.comments || []);
    } catch (err) {
        console.error('خطأ في حذف التعليق:', err);
        alert('حدث خطأ في الاتصال بالسيرفر');
    }
};

// تعديل تعليق
window.editComment = function(commentId) {
    const editContainer = document.getElementById(`commentEdit_${commentId}`);
    const textContainer = document.getElementById(`commentText_${commentId}`);
    if (editContainer) {
        editContainer.style.display = 'block';
        if (textContainer) textContainer.style.display = 'none';
        const input = document.getElementById(`commentEditInput_${commentId}`);
        if (input) input.focus();
    }
};

window.saveCommentEdit = async function(commentId) {
    const input = document.getElementById(`commentEditInput_${commentId}`);
    const newText = input ? input.value.trim() : '';
    
    if (!newText) {
        alert('لا يمكن أن يكون التعليق فارغاً');
        return;
    }
    
    const token = getToken();
    if (!token) {
        alert('يرجى تسجيل الدخول أولاً');
        return;
    }
    
    try {
        const response = await fetch(
            `https://my-backend-api-bntd.onrender.com/api/projects/${projectId}/comment/${commentId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ text: newText })
            }
        );
        
        if (!response.ok) {
            const errorData = await response.json();
            alert(errorData.msg || 'حدث خطأ أثناء تعديل التعليق');
            return;
        }
        
        const updatedProject = await response.json();
        currentProject = updatedProject;
        renderComments(updatedProject.comments || []);
    } catch (err) {
        console.error('خطأ في تعديل التعليق:', err);
        alert('حدث خطأ في الاتصال بالسيرفر');
    }
};

window.cancelCommentEdit = function(commentId) {
    const editContainer = document.getElementById(`commentEdit_${commentId}`);
    const textContainer = document.getElementById(`commentText_${commentId}`);
    if (editContainer) editContainer.style.display = 'none';
    if (textContainer) textContainer.style.display = 'block';
};

// ==========================================
// دوال إدارة الردود (مكتملة)
// ==========================================

// إرسال رد (محدث)
window.submitReply = async function(commentId) {
    const input = document.getElementById(`replyText_${commentId}`);
    const replyText = input ? input.value.trim() : '';
    
    if (!replyText) {
        alert('يرجى كتابة الرد أولاً.');
        return;
    }
    
    const token = getToken();
    if (!token) {
        alert('يرجى تسجيل الدخول أولاً لتتمكن من الرد.');
        return;
    }
    
    try {
        const response = await fetch(
            `https://my-backend-api-bntd.onrender.com/api/projects/${projectId}/comment/${commentId}/reply`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ text: replyText })
            }
        );
        
        if (!response.ok) {
            const errorData = await response.json();
            alert(errorData.msg || 'حدث خطأ أثناء إرسال الرد');
            return;
        }
        
        const updatedProject = await response.json();
        currentProject = updatedProject;
        renderComments(updatedProject.comments || []);
        if (input) input.value = '';
    } catch (err) {
        console.error('خطأ في إرسال الرد:', err);
        alert('حدث خطأ في الاتصال بالسيرفر');
    }
};

// حذف رد (محدث)
window.deleteReply = async function(commentId, replyId) {
    if (!confirm('هل أنت متأكد من حذف هذا الرد؟')) return;
    
    const token = getToken();
    if (!token) {
        alert('يرجى تسجيل الدخول أولاً');
        return;
    }
    
    try {
        const response = await fetch(
            `https://my-backend-api-bntd.onrender.com/api/projects/${projectId}/comment/${commentId}/reply/${replyId}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            }
        );
        
        if (!response.ok) {
            const errorData = await response.json();
            alert(errorData.msg || 'حدث خطأ أثناء حذف الرد');
            return;
        }
        
        const updatedProject = await response.json();
        currentProject = updatedProject;
        renderComments(updatedProject.comments || []);
    } catch (err) {
        console.error('خطأ في حذف الرد:', err);
        alert('حدث خطأ في الاتصال بالسيرفر');
    }
};

// تعديل رد (محدث)
window.editReply = function(commentId, replyId) {
    const editContainer = document.getElementById(`replyEdit_${replyId}`);
    const textContainer = document.getElementById(`replyText_${replyId}`);
    if (editContainer) {
        editContainer.style.display = 'block';
        if (textContainer) textContainer.style.display = 'none';
        const input = document.getElementById(`replyEditInput_${replyId}`);
        if (input) input.focus();
    }
};

window.saveReplyEdit = async function(commentId, replyId) {
    const input = document.getElementById(`replyEditInput_${replyId}`);
    const newText = input ? input.value.trim() : '';
    
    if (!newText) {
        alert('لا يمكن أن يكون الرد فارغاً');
        return;
    }
    
    const token = getToken();
    if (!token) {
        alert('يرجى تسجيل الدخول أولاً');
        return;
    }
    
    try {
        const response = await fetch(
            `https://my-backend-api-bntd.onrender.com/api/projects/${projectId}/comment/${commentId}/reply/${replyId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ text: newText })
            }
        );
        
        if (!response.ok) {
            const errorData = await response.json();
            alert(errorData.msg || 'حدث خطأ أثناء تعديل الرد');
            return;
        }
        
        const updatedProject = await response.json();
        currentProject = updatedProject;
        renderComments(updatedProject.comments || []);
    } catch (err) {
        console.error('خطأ في تعديل الرد:', err);
        alert('حدث خطأ في الاتصال بالسيرفر');
    }
};

window.cancelReplyEdit = function(replyId) {
    const editContainer = document.getElementById(`replyEdit_${replyId}`);
    const textContainer = document.getElementById(`replyText_${replyId}`);
    if (editContainer) editContainer.style.display = 'none';
    if (textContainer) textContainer.style.display = 'block';
};


        // ==========================================
        // 7. إظهار/إخفاء حقل الرد
        // ==========================================
        window.toggleReplyInput = function(commentId) {
            const container = document.getElementById(`replyInput_${commentId}`);
            if (container) {
                if (container.style.display === 'none' || container.style.display === '') {
                    container.style.display = 'flex';
                    const input = document.getElementById(`replyText_${commentId}`);
                    if (input) input.focus();
                } else {
                    container.style.display = 'none';
                }
            }
        };

        // ==========================================
        // 8. إرسال الرد - مع دعم التخزين المحلي
        // ==========================================
        window.submitReply = async function(commentId) {
            const input = document.getElementById(`replyText_${commentId}`);
            const replyText = input ? input.value.trim() : '';

            if (!replyText) {
                alert('يرجى كتابة الرد أولاً.');
                return;
            }

            const token = getToken();
            if (!token) {
                alert('يرجى تسجيل الدخول أولاً لتتمكن من الرد.');
                return;
            }

            try {
                // محاولة إرسال الرد للسيرفر
                const response = await fetch(
                    `https://my-backend-api-bntd.onrender.com/api/projects/${projectId}/comment/${commentId}/reply`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ text: replyText })
                    }
                );

                if (!response.ok) {
                    console.warn('فشل الاتصال بالسيرفر، استخدام التخزين المحلي');
                    saveReplyLocally(commentId, replyText);
                    return;
                }

                const updatedProject = await response.json();
                currentProject = updatedProject;
                renderComments(updatedProject.comments || []);

            } catch (err) {
                console.warn('خطأ في الاتصال بالسيرفر، استخدام التخزين المحلي:', err);
                saveReplyLocally(commentId, replyText);
            }
        };

        // حفظ الرد محلياً
        function saveReplyLocally(commentId, replyText) {
            if (!currentProject) return;

            // تهيئة التعليقات
            if (!currentProject.comments) currentProject.comments = [];

            // البحث عن التعليق
            let comment = currentProject.comments.find(c => (c._id || c.id) === commentId);

            if (!comment) {
                // إذا لم يتم العثور على التعليق، نضيفه مؤقتاً
                comment = {
                    _id: commentId,
                    author: 'مستخدم',
                    text: 'تعليق',
                    date: new Date().toISOString(),
                    replies: []
                };
                currentProject.comments.push(comment);
            }

            // تهيئة الردود
            if (!comment.replies) comment.replies = [];

            // إضافة الرد
            comment.replies.push({
                author: currentUser,
                text: replyText,
                date: new Date().toISOString()
            });

            // تحديث التخزين المحلي
            const allProjects = JSON.parse(localStorage.getItem('codeProjects')) || [];
            const index = allProjects.findIndex(p => p.id === projectId);
            if (index !== -1) {
                allProjects[index] = currentProject;
                localStorage.setItem('codeProjects', JSON.stringify(allProjects));
            }

            // تحديث العرض
            renderComments(currentProject.comments);
        }

        // ==========================================
        // 9. جلب بيانات المشروع
        // ==========================================
        async function fetchProjectData() {
            if (!projectId) {
                loadingScreen.innerHTML = `
                    <div style="text-align:center;color:var(--text-muted);">
                        <i class="fas fa-exclamation-circle" style="font-size:2rem;display:block;margin-bottom:12px;"></i>
                        <p>لم يتم تحديد مشروع لعرضه.</p>
                        <a href="index.html" class="btn btn-primary" style="margin-top:16px;">العودة للرئيسية</a>
                    </div>
                `;
                return;
            }

            try {
                // محاولة جلب البيانات من السيرفر
                const response = await fetch(`https://my-backend-api-bntd.onrender.com/api/projects/${projectId}`);

                if (!response.ok) {
                    // إذا فشل السيرفر، نستخدم التخزين المحلي
                    console.warn('فشل جلب البيانات من السيرفر، استخدام التخزين المحلي');
                    loadFromLocalStorage();
                    return;
                }

                currentProject = await response.json();

                // تحديث الواجهة
                updateUI(currentProject);

                // حفظ في التخزين المحلي كمخبأ
                const allProjects = JSON.parse(localStorage.getItem('codeProjects')) || [];
                const index = allProjects.findIndex(p => p.id === projectId);
                if (index !== -1) {
                    allProjects[index] = currentProject;
                } else {
                    allProjects.push(currentProject);
                }
                localStorage.setItem('codeProjects', JSON.stringify(allProjects));

            } catch (error) {
                console.warn('خطأ في الاتصال بالسيرفر، استخدام التخزين المحلي:', error);
                loadFromLocalStorage();
            }
        }

        function loadFromLocalStorage() {
            const allProjects = JSON.parse(localStorage.getItem('codeProjects')) || [];
            const project = allProjects.find(p => p.id === projectId);

            if (!project) {
                loadingScreen.innerHTML = `
                    <div style="text-align:center;color:var(--text-muted);">
                        <i class="fas fa-exclamation-triangle" style="font-size:2rem;display:block;margin-bottom:12px;color:#dc3545;"></i>
                        <p style="color:var(--text-secondary);">المشروع غير موجود في التخزين المحلي</p>
                        <a href="index.html" class="btn btn-primary" style="margin-top:16px;">العودة للرئيسية</a>
                    </div>
                `;
                return;
            }

            currentProject = project;
            updateUI(project);
        }

        function updateUI(project) {
            topProjectTitle.textContent = project.title || "بدون عنوان";
            authorName.textContent = project.author || "زائر";
            authorAvatar.src = getUserAvatar(project.author);
            viewsCount.textContent = project.views || 0;
            likesCount.textContent = project.likes ? project.likes.length : 0;

            // عرض التقييم
            updateRatingDisplay(project);
            if (currentUser) {
                updateUserRating(project);
            }

            // عرض الكود في الإطار
            const htmlContent = project.htmlCode || project.html || '';
            const cssContent = project.cssCode || project.css || '';
            const jsContent = project.jsCode || project.js || '';

            if (htmlContent.includes('<html')) {
                webOutputFrame.srcdoc = htmlContent;
            } else {
                webOutputFrame.srcdoc = `
                    <!DOCTYPE html>
                    <html>
                    <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>${cssContent}</style></head>
                    <body>${htmlContent}<script>${jsContent}<\/script></body>
                    </html>
                `;
            }

            webOutputFrame.onload = () => {
                loadingScreen.classList.add('hidden');
                setTimeout(() => { loadingScreen.style.display = 'none'; }, 500);
            };

            // تحديث حالة زر الإعجاب
            if (currentUser && project.likes && project.likes.includes(currentUser)) {
                likeActionBtn.classList.add('liked');
                likeBtnText.textContent = 'إلغاء الإعجاب';
            } else {
                likeActionBtn.classList.remove('liked');
                likeBtnText.textContent = 'إعجاب';
            }

            // عرض التعليقات
            renderComments(project.comments || []);
        }

        // ==========================================
        // 10. الإعجاب
        // ==========================================
        likeActionBtn.addEventListener('click', async () => {
            const token = getToken();
            if (!token) {
                alert('يرجى تسجيل الدخول أولاً لتتمكن من الإعجاب.');
                return;
            }

            try {
                const response = await fetch(`https://my-backend-api-bntd.onrender.com/api/projects/${projectId}/like`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    console.warn('فشل الإعجاب، استخدام التخزين المحلي');
                    toggleLikeLocally();
                    return;
                }

                const data = await response.json();
                likesCount.textContent = data.likesCount;

                if (data.liked) {
                    likeActionBtn.classList.add('liked');
                    likeBtnText.textContent = 'إلغاء الإعجاب';
                } else {
                    likeActionBtn.classList.remove('liked');
                    likeBtnText.textContent = 'إعجاب';
                }

            } catch (err) {
                console.warn('خطأ في الإعجاب، استخدام التخزين المحلي:', err);
                toggleLikeLocally();
            }
        });

        function toggleLikeLocally() {
            if (!currentProject) return;

            if (!currentProject.likes) currentProject.likes = [];

            const userIndex = currentProject.likes.indexOf(currentUser);
            if (userIndex !== -1) {
                currentProject.likes.splice(userIndex, 1);
                likeActionBtn.classList.remove('liked');
                likeBtnText.textContent = 'إعجاب';
            } else {
                currentProject.likes.push(currentUser);
                likeActionBtn.classList.add('liked');
                likeBtnText.textContent = 'إلغاء الإعجاب';
            }

            likesCount.textContent = currentProject.likes.length;

            // تحديث التخزين المحلي
            const allProjects = JSON.parse(localStorage.getItem('codeProjects')) || [];
            const index = allProjects.findIndex(p => p.id === projectId);
            if (index !== -1) {
                allProjects[index] = currentProject;
                localStorage.setItem('codeProjects', JSON.stringify(allProjects));
            }
        }

        // ==========================================
        // 11. إضافة تعليق
        // ==========================================
        sidebarCommentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const commentText = sidebarCommentInput.value.trim();
            if (!commentText) return;

            const token = getToken();
            if (!token) {
                alert('يرجى تسجيل الدخول أولاً لتتمكن من التعليق.');
                return;
            }

            try {
                const response = await fetch(`https://my-backend-api-bntd.onrender.com/api/projects/${projectId}/comment`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ text: commentText })
                });

                if (!response.ok) {
                    console.warn('فشل إضافة التعليق، استخدام التخزين المحلي');
                    addCommentLocally(commentText);
                    return;
                }

                const updatedProject = await response.json();
                currentProject = updatedProject;
                renderComments(updatedProject.comments || []);
                sidebarCommentInput.value = '';

            } catch (err) {
                console.warn('خطأ في إضافة التعليق، استخدام التخزين المحلي:', err);
                addCommentLocally(commentText);
            }
        });

        function addCommentLocally(text) {
            if (!currentProject) return;

            if (!currentProject.comments) currentProject.comments = [];

            currentProject.comments.push({
                _id: 'c' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
                author: currentUser,
                text: text,
                date: new Date().toISOString(),
                replies: []
            });

            // تحديث التخزين المحلي
            const allProjects = JSON.parse(localStorage.getItem('codeProjects')) || [];
            const index = allProjects.findIndex(p => p.id === projectId);
            if (index !== -1) {
                allProjects[index] = currentProject;
                localStorage.setItem('codeProjects', JSON.stringify(allProjects));
            }

            renderComments(currentProject.comments);
            sidebarCommentInput.value = '';
        }

        // ==========================================
        // 12. إغلاق اللوحة عند النقر خارجها (للجوال)
        // ==========================================
        document.addEventListener('click', function(e) {
            if (window.innerWidth <= 768) {
                const sidebar = document.getElementById('interactionSidebar');
                const sidebarBtn = document.querySelector('.btn-primary.btn-icon');
                if (sidebar.classList.contains('open') &&
                    !sidebar.contains(e.target) &&
                    !sidebarBtn.contains(e.target)) {
                    sidebar.classList.remove('open');
                }
            }
        });

        // ==========================================
        // 13. تشغيل جلب البيانات
        // ==========================================
        fetchProjectData();

        // ==========================================
        // 14. مراقبة تغير المستخدم
        // ==========================================
        window.addEventListener('storage', function(e) {
            if (e.key === 'currentUser') {
                currentUser = e.newValue;
                if (projectId) fetchProjectData();
            }
        });
        // ==========================================
// 15. حفظ المشروع في localStorage
// ==========================================
function saveProjectToLocalStorage(project) {
    const allProjects = JSON.parse(localStorage.getItem('codeProjects')) || [];
    const index = allProjects.findIndex(p => p.id === project.id);
    if (index !== -1) {
        allProjects[index] = project;
    } else {
        allProjects.push(project);
    }
    localStorage.setItem('codeProjects', JSON.stringify(allProjects));
}

// تحديث دالة updateUI
function updateUI(project) {
    // ... الكود الموجود ...
    
    // حفظ المشروع في localStorage
    saveProjectToLocalStorage(project);
    
    // ... باقي الكود ...
}
