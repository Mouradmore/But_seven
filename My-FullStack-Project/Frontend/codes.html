    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; height: 100vh; margin: 0; overflow: hidden;
            position: relative; background-color: #1e1e1e; color: #fff;
        }

        /* إصلاح ظهور النوافذ المنبثقة والبحث */
        .CodeMirror-hints {
            z-index: 9999999 !important;
            background-color: #2d2d2d !important;
            border: 1px solid #007bff !important;
            box-shadow: 0 8px 16px rgba(0,0,0,0.8) !important;
        }
        .CodeMirror-hint { color: #b5cea8 !important; padding: 6px 12px !important; font-size: 14px; }
        li.CodeMirror-hint-active { background-color: #094771 !important; color: #fff !important; }

        .CodeMirror-dialog { 
            z-index: 9999999 !important; 
            background: #2d2d2d; 
            color: #fff; 
            border-bottom: 1px solid #444; 
            padding: 8px 15px; 
        }
        .CodeMirror-dialog input { background: #1e1e1e; color: #fff; border: 1px solid #555; padding: 5px; border-radius: 3px; outline: none; }
        .CodeMirror-dialog button { background: #007bff; color: #fff; border: none; padding: 5px 12px; margin: 0 3px; border-radius: 3px; cursor: pointer; }
        .CodeMirror-dialog button:hover { background: #0056b3; }

        .main-layout { display: flex; flex: 1; width: 100%; transition: margin-right 0.3s ease; margin-right: 0; }
        body.sidebar-open .main-layout { margin-right: 250px;}

        .sidebar {
            width: 300px; background-color: #252526; color: #f4f4f4; display: flex;
            flex-direction: column; border-left: 1px solid #3c3c3c; position: fixed;
            height: 100%; right: -300px; top: 0; transition: right 0.3s ease; z-index: 1000;
        }
        body.sidebar-open .sidebar { right: 0; }

        .sidebar-header {
            padding: 15px; font-size: 1.1em; font-weight: bold; background-color: #2d2d2d;
            border-bottom: 1px solid #3c3c3c; text-align: center;
        }

        .file-explorer { flex: 1; overflow-y: auto; padding: 10px 0; }
        .tree-node-wrapper { width: 100%; }
        .file-item, .folder-item {
            padding: 4px 8px; cursor: pointer; display: flex; align-items: center; justify-content: space-between;
            gap: 8px; transition: background-color 0.2s ease; user-select: none; border-radius: 4px;
        }
        .file-item:hover, .folder-item:hover { background-color: rgba(255, 255, 255, 0.05); }
        .file-item.selected, .folder-item.selected { background-color: #094771; color: white; }

        .folder-content { margin-right: 15px; border-right: 1px dashed #555; padding-right: 5px; }

        .icon::before { font-family: "Font Awesome 5 Free"; font-weight: 900; margin-left: 5px; transition: 0.2s; }
        .icon-folder::before { content: "\f07b"; color: #ffca28; }
        .folder-item.open .icon-folder::before { content: "\f07c"; }
        .icon-file::before { content: "\f15b"; color: #fff; }
        
        .icon-html::before { content: "\f13b"; color: #e44d26; }
        .icon-css::before { content: "\f38b"; color: #264de4; }
        .icon-js::before { content: "\f3b8"; color: #f7df1e; }
        .icon-ts::before { content: "\f3b8"; color: #3178c6; }
        .icon-json::before { content: "\f1c9"; color: #e3e3e3; }
        .icon-php::before { content: "\f457"; color: #777bb4; }
        .icon-py::before { content: "\f3e2"; color: #3776ab; }
        .icon-md::before { content: "\f48a"; color: #fff; }
        .icon-sql::before { content: "\f1c6"; color: #f29111; }
        .icon-xml::before { content: "\f121"; color: #f0662b; }
        .icon-java::before { content: "\f4e4"; color: #b07219; }
        .icon-c::before, .icon-cpp::before, .icon-cs::before { content: "\f121"; color: #00599c; }
        .icon-go::before { content: "\f121"; color: #00add8; }
        .icon-rs::before { content: "\f121"; color: #dea584; }
        
        .icon-image::before { content: "\f03e"; color: #4CAF50; }
        .icon-video::before { content: "\f03d"; color: #9c27b0; }
        .icon-audio::before { content: "\f1c7"; color: #00bcd4; }

        .sidebar-actions {
            padding: 10px; border-top: 1px solid #3c3c3c; display: grid;
            grid-template-columns: repeat(2, 1fr); gap: 8px; background-color: #2d2d2d;
        }

        .editor-section { flex: 1; display: flex; flex-direction: column; width: 100%; height: 100vh; }
        .editor-title {
            background-color: #2d2d2d; padding: 10px 20px; font-weight: bold;
            border-bottom: 1px solid #3c3c3c; display: flex; justify-content: space-between; align-items: center;
        }
        .current-file-name { font-size: 0.9em; color: #aaa; }

        .editor-toolbar {
            background-color: #333333; padding: 8px; border-bottom: 1px solid #3c3c3c;
            display: flex; gap: 5px; flex-wrap: wrap;
        }
        .shortcut-btn {
            padding: 4px 8px; border: none; background-color: #444; color: #fff;
            border-radius: 3px; cursor: pointer; font-size: 0.8em; display: flex; align-items: center; gap: 5px;
        }
        .shortcut-btn:hover { background-color: #555; }

        .editor-wrapper { 
    flex: 1; 
    height: calc(100vh - 90px); 
    position: relative; 
    overflow: hidden; /* إضافة هذه الخاصية هامة جداً */
}
.CodeMirror { 
    position: absolute; /* جعل المحرر يملأ الحاوية برمجياً */
    top: 0; bottom: 0; left: 0; right: 0;
    height: 100% !important; 
    font-family: 'Cascadia Code', 'Fira Code', monospace; 
    font-size: 15px; 
}

        .media-preview-panel { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #1e1e1e; gap: 20px; }
        .media-preview-panel img, .media-preview-panel video { max-width: 90%; max-height: 90%; object-fit: contain; border: 2px solid #3c3c3c; }
        .media-preview-panel audio { width: 80%; max-width: 500px; }

        .fullscreen-preview {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; z-index: 2000; display: none; flex-direction: column;
        }
        .fullscreen-preview.active { display: flex; }
        .fullscreen-preview iframe { width: 100%; flex: 1; border: none; }
        .fullscreen-preview-controls { background-color: #f0f0f0; padding: 10px; text-align: left; }
        .fullscreen-preview-controls button { padding: 8px 15px; background-color: #2d2d2d; color: white; border: none; border-radius: 4px; cursor: pointer; }
        
        .custom-dropdown { position: relative; display: inline-block; }
        .dropdown-btn { background-color: #444; color: #fff; border: 1px solid #555; padding: 6px 10px; border-radius: 4px; font-size: 0.85em; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .dropdown-btn:hover { background-color: #555; }
        .dropdown-content { display: none; position: absolute; background-color: #2d2d2d; min-width: 180px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5); z-index: 1002; border: 1px solid #444; border-radius: 4px; top: 100%; right: 0; max-height: 250px; overflow-y: auto; }
        .dropdown-content.show { display: block; }
        .dropdown-content span { color: #ccc; padding: 10px 15px; text-decoration: none; display: block; cursor: pointer; font-size: 0.85em; border-bottom: 1px solid #3c3c3c; }
        .dropdown-content span:hover { background-color: #007bff; color: #fff; }
        
        .tree-actions { margin-right: auto; position: relative; display: flex; align-items: center; }
        .more-options-btn { background: none; border: none; color: #adb5bd; cursor: pointer; padding: 0 5px; font-size: 1.2em; font-weight: bold; display: flex; justify-content: center; align-items: center; }
        .more-options-btn:hover { color: #fff; }
        .tree-action-menu { display: none; position: absolute; right: 15px; top: 100%; background-color: #252526; border: 1px solid #444; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 1005; min-width: 140px; flex-direction: column; padding: 5px 0; }
        .tree-action-menu.show { display: flex; }
        .tree-action-menu button { background: none; border: none; color: #ccc; padding: 8px 12px; text-align: right; width: 100%; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.85em; font-family: inherit; }
        .tree-action-menu button:hover { background-color: #094771; color: #fff; }
        
        .terminal-panel {
            height: 200px; background-color: #1e1e1e; border-top: 3px solid #007bff;
            display: none; flex-direction: column; position: relative; z-index: 10;
        }
        .terminal-header { background-color: #2d2d2d; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3c3c3c; font-size: 0.85em; color: #ccc; }
        .terminal-header button { background: none; border: none; color: #ff6b6b; cursor: pointer; font-size: 1.2em; }
        .terminal-output { flex: 1; padding: 10px 15px; color: #00ff00; font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 14px; overflow-y: auto; white-space: pre-wrap; direction: ltr; text-align: left; }
    </style>
</head>

        document.addEventListener('DOMContentLoaded', async () => {
            // إعداد المحرر بشكل صحيح
            editor = CodeMirror.fromTextArea(document.getElementById("codeTextArea"), {
                mode: "htmlmixed",
                theme: "dracula",
                lineWrapping: true,
                lineNumbers: true,
                autoCloseTags: true,       
                autoCloseBrackets: true,   
                matchTags: {bothTags: true},
                extraKeys: {
                    "Ctrl-Space": "autocomplete",
                    "Ctrl-F": "find",

editor.on("inputRead", function(cm, change) {
    // التأكد من أن التغيير ناتج عن إدخال نصي حقيقي وليس حذقاً أو أمراً داخلياً
    if (change.origin !== "+input") return;
    
    // دمج النص المدخل للتحقق من طوله ومحتواه (يتضمن الأقواس والنقاط وعلامات التنصيص)
    let text = change.text.join("");
    if (!text || text === " ") return; // تجاهل المسافات الفارغة والأسطر الجديدة
    
    // استخدام requestAnimationFrame لضمان تزامن العرض مع تحديث واجهة CodeMirror
    requestAnimationFrame(() => {
        // منع فتح نافذة تلميحات جديدة إذا كانت هناك نافذة نشطة بالفعل وتعمل
        if (cm.state.completionActive) return;
        
        let currentMode = cm.getOption("mode");
        let hintOptions = { completeSingle: false };
        
        // استدعاء آلية showHint بشكل مباشر وصحيح حسب لغة المحرر الحالية
        if (currentMode === "css") {
            cm.showHint({ hint: CodeMirror.hint.css, ...hintOptions });
        } else if (currentMode === "javascript" || currentMode === "text/typescript") {
            cm.showHint({ hint: CodeMirror.hint.javascript, ...hintOptions });
        } else if (currentMode === "htmlmixed" || currentMode === "xml") {
            cm.showHint({ hint: CodeMirror.hint.html, ...hintOptions });
        } else {
            // تشغيل محرك anyword كخيار احتياطي ممتاز لباقي اللغات المدعومة لديك (مثل Python, PHP, SQL...)
            if (CodeMirror.hint.anyword) {
                cm.showHint({ hint: CodeMirror.hint.anyword, ...hintOptions });
            }
        }
    });
});

            editor.on("change", () => {
                if (currentOpenFile && currentOpenFile.fileType !== 'image' && currentOpenFile.fileType !== 'video' && currentOpenFile.fileType !== 'audio') {
                    currentOpenFile.content = editor.getValue();
                }
            });

            const savedData = localStorage.getItem('savedProject');
            if (savedData) {
                try { fileSystem = JSON.parse(savedData); } catch(e) { fileSystem = getDefaultFileSystem(); }

                fileSystem = getDefaultFileSystem();

            renderFileExplorer();
            openDefaultFirstFile();
            setupSnippets();

        function formatCurrentCode() {
            if (!editor) return;
            const code = editor.getValue();
            const mode = editor.getOption("mode");
            let formattedCode = code;

            try {
                if (mode === "htmlmixed" || mode === "xml" || (typeof mode === "object" && mode.name === "htmlmixed")) {
                    formattedCode = html_beautify(code, { indent_size: 4, wrap_line_length: 0 });
                } else if (mode === "css") {
                    formattedCode = css_beautify(code, { indent_size: 4 });
                } else if (mode === "javascript" || mode === "application/json" || mode === "text/typescript") {
                    formattedCode = js_beautify(code, { indent_size: 4 });
                } else {
                    editor.operation(() => {
                        for (let i = 0; i < editor.lineCount(); i++) {
                            editor.indentLine(i, "smart");
                        }
                    });
                    return;
                }
                editor.setValue(formattedCode);
            } catch (e) {
                console.error("Code format error:", e);
            }
        }

        function toggleDropdown(id) {
            document.querySelectorAll('.dropdown-content').forEach(el => {
                if(el.id !== id) el.classList.remove('show');
            });
            document.getElementById(id).classList.toggle('show');
        }

        window.onclick = function(event) {
            if (!event.target.matches('.dropdown-btn') && !event.target.closest('.dropdown-btn')) {
                document.querySelectorAll('.dropdown-content').forEach(el => el.classList.remove('show'));
            }
            if (!event.target.matches('.more-options-btn') && !event.target.closest('.more-options-btn')) {
                document.querySelectorAll('.tree-action-menu').forEach(menu => menu.classList.remove('show'));
            }
        }

        function setupSnippets() {
            document.querySelectorAll('.snippet-item').forEach(item => {
                item.addEventListener('click', function() {
                    const code = this.getAttribute('data-code').replace(/\\n/g, '\n');
                    if (editor) {
                        const doc = editor.getDoc();
                        const cursor = doc.getCursor();
                        doc.replaceRange(code, cursor);
                        editor.focus();
                    }
                });
            });
        }

        function getDefaultFileSystem() {
            return [
                {
                    id: 'folder_1', name: "Project folder", type: "folder", isOpen: true, children: [
                        { id: 'file_1', name: "index.html", type: "file", fileType: "html", content: `<h1>welcome!</h1>` },
                        { id: 'file_2', name: "style.css", type: "file", fileType: "css", content: `body { background-color: #222; color: #fff; }` }
                    ]
                }
            ];
        }

        function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }

        function renderFileExplorer() {
            const container = document.getElementById('fileExplorer');
            container.innerHTML = '';
            buildTree(fileSystem, container);
        }

        function buildTree(nodes, parentElement) {
            nodes.forEach(node => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tree-node-wrapper';

                const item = document.createElement('div');
                item.className = node.type === 'folder' ? 'folder-item' : 'file-item';
                if (currentOpenFile && currentOpenFile.id === node.id) item.classList.add('selected');
                if (node.type === 'folder' && node.isOpen) item.classList.add('open');

                const icon = document.createElement('span');
                icon.className = `icon icon-${node.fileType || 'folder'}`;
                item.appendChild(icon);

                const text = document.createElement('span');
                text.textContent = node.name;
                item.appendChild(text);

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'tree-actions';

                const moreBtn = document.createElement('button');
                moreBtn.className = 'more-options-btn';
                moreBtn.innerHTML = '⋮'; 
                actionsDiv.appendChild(moreBtn);

                const actionMenu = document.createElement('div');
                actionMenu.className = 'tree-action-menu';

                moreBtn.onclick = (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.tree-action-menu').forEach(menu => {
                        if (menu !== actionMenu) menu.classList.remove('show');
                    });
                    actionMenu.classList.toggle('show');
                };

                if (node.type === 'folder') {
                    const addFileBtn = document.createElement('button');
                    addFileBtn.innerHTML = '<i class="fas fa-file-code"></i> <span>new file</span>';
                    addFileBtn.onclick = (e) => { e.stopPropagation(); actionMenu.classList.remove('show'); addFileToFolder(node); };
                    actionMenu.appendChild(addFileBtn);

                    const addFolderBtn = document.createElement('button');
                    addFolderBtn.innerHTML = '<i class="fas fa-folder-plus"></i> <span>new folder</span>';
                    addFolderBtn.onclick = (e) => { e.stopPropagation(); actionMenu.classList.remove('show'); addFolderToFolder(node); };
                    actionMenu.appendChild(addFolderBtn);

                    const uploadFileHereBtn = document.createElement('button');
                    uploadFileHereBtn.innerHTML = '<i class="fas fa-upload"></i> <span>Upload</span>';
                    uploadFileHereBtn.onclick = (e) => {
                        e.stopPropagation(); actionMenu.classList.remove('show');
                        currentTargetFolderId = node.id;
                        document.getElementById('globalFileInput').click();
                    };
                    actionMenu.appendChild(uploadFileHereBtn);
                    
                    const divider = document.createElement('div');
                    divider.style.borderBottom = '1px solid #444'; divider.style.margin = '4px 0';
                    actionMenu.appendChild(divider);
                }

                const renameBtn = document.createElement('button');
                renameBtn.innerHTML = '<i class="fas fa-edit"></i> <span>rename</span>';
                renameBtn.onclick = (e) => { e.stopPropagation(); actionMenu.classList.remove('show'); renameNode(node); };
                actionMenu.appendChild(renameBtn);

                const copyBtn = document.createElement('button');
                copyBtn.innerHTML = '<i class="fas fa-copy"></i> <span>Copy</span>';
                copyBtn.onclick = (e) => { e.stopPropagation(); actionMenu.classList.remove('show'); copyNode(node.id); };
                actionMenu.appendChild(copyBtn);

                const delBtn = document.createElement('button');
                delBtn.style.color = '#ff6b6b';
                delBtn.innerHTML = '<i class="fas fa-trash"></i> <span style="color:#ff6b6b;">Delete</span>';
                delBtn.onclick = (e) => {
                    e.stopPropagation(); actionMenu.classList.remove('show');
                    if(confirm(`Are you sure to delete ${node.name}؟`)) {
                        deleteNode(fileSystem, node.id);
                        saveProject(); renderFileExplorer();
                        if (currentOpenFile && currentOpenFile.id === node.id) {
                            currentOpenFile = null;
                            editor.setValue("");
                            document.getElementById('currentFileNameDisplay').textContent = "Deleted";
                        }
                    }
                };
                actionMenu.appendChild(delBtn);

                actionsDiv.appendChild(actionMenu);
                item.appendChild(actionsDiv);
                wrapper.appendChild(item);

                if (node.type === 'folder') {
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'folder-content';
                    contentDiv.style.display = node.isOpen ? 'block' : 'none';
                    item.onclick = (e) => { e.stopPropagation(); node.isOpen = !node.isOpen; saveProject(); renderFileExplorer(); };
                    if (node.children) buildTree(node.children, contentDiv);
                    wrapper.appendChild(contentDiv);
                } else {
                    item.onclick = (e) => { e.stopPropagation(); openFile(node); };
                }
                
                parentElement.appendChild(wrapper);
            });
        }

        function renameNode(node) {
            const newName = prompt("Enter the new name with the extension if any:", node.name);
            if (newName && newName.trim() !== "") {
                node.name = newName.trim();
                if(node.type === 'file') {
                    let ext = node.name.split('.').pop().toLowerCase();
                    const allowedExts = ['html','css','js','ts','py','php','txt','image','video','audio','json','md','sql','xml','java','c','cpp','cs','go','rs'];
                    if(!allowedExts.includes(ext)) ext = 'txt';
                    node.fileType = ext;
                }
                saveProject(); renderFileExplorer();
                if (currentOpenFile && currentOpenFile.id === node.id) {
                    document.getElementById('currentFileNameDisplay').textContent = node.name;
                    openFile(node);
                }
            }
        }

        function copyNode(nodeId) {
            const node = findNodeById(fileSystem, nodeId);
            if (!node) return alert("Item does not exist!");
            
            const nodeCopy = JSON.parse(JSON.stringify(node));
            
            function generateNewIds(item) {
                item.id = (item.type === 'folder' ? 'folder_' : 'file_') + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                if (item.children) item.children.forEach(generateNewIds);
            }
            
            generateNewIds(nodeCopy);
            let ext = "";
            if (nodeCopy.type === 'file') {
                let parts = node.name.split('.');
                if(parts.length > 1) ext = "." + parts.pop();
                nodeCopy.name = parts.join('.') + " - Copy" + ext;
            } else {
                nodeCopy.name = node.name + " - Copy";
            }
            
            const parent = findParentNode(fileSystem, nodeId);
            if (parent) parent.children.push(nodeCopy);
            else fileSystem.push(nodeCopy);
            
            saveProject(); renderFileExplorer();
        }
function createNewProjectWorkspace() {

        if (currentOpenFile) {

    }
}
        function findNodeById(nodes, id) {
            for (let n of nodes) {
                if (n.id === id) return n;
                if (n.children) {
                    const found = findNodeById(n.children, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function findParentNode(nodes, id, parent = null) {
            for (let n of nodes) {
                if (n.id === id) return parent;
                if (n.children) {
                    const found = findParentNode(n.children, id, n);
                    if (found) return found;
                }
            }
            return null;
        }

        function openFile(fileNode) {
            currentOpenFile = fileNode;
            document.getElementById('currentFileNameDisplay').textContent = fileNode.name;
            const mediaPanel = document.getElementById('mediaPreviewPanel');
            const wrapper = document.querySelector('.CodeMirror');

            let mode = "text/plain"; 
            const ext = fileNode.fileType;

            if (ext === "html") mode = "htmlmixed";
            else if (ext === "css") mode = "css";
            else if (ext === "js") mode = "javascript";
            else if (ext === "json") mode = "application/json";
            else if (ext === "ts") mode = "text/typescript";
            else if (ext === "py") mode = "python";
            else if (ext === "php") mode = "application/x-httpd-php";
            else if (ext === "md") mode = "markdown";
            else if (ext === "sql") mode = "sql";
            else if (ext === "xml") mode = "xml";
            else if (ext === "java") mode = "text/x-java";
            else if (ext === "c") mode = "text/x-csrc";
            else if (ext === "cpp") mode = "text/x-c++src";
            else if (ext === "cs") mode = "text/x-csharp";
            else if (ext === "go") mode = "text/x-go";
            else if (ext === "rs") mode = "text/x-rustsrc";

            document.getElementById('editorLanguageLabel').textContent = `Editor (${fileNode.fileType.toUpperCase()})`;

            if (ext === 'image' || ext === 'video' || ext === 'audio') {
                if(wrapper) wrapper.style.display = 'none';
                mediaPanel.style.display = 'flex';
                if (ext === 'image') {
                    mediaPanel.innerHTML = `<img src="${fileNode.content}">`;
                } else if (ext === 'video') {
                    mediaPanel.innerHTML = `<video controls src="${fileNode.content}"></video>`;
                } else if (ext === 'audio') {
                    mediaPanel.innerHTML = `<h3><i class="fas fa-music"></i> audio browser: ${fileNode.name}</h3><audio controls src="${fileNode.content}"></audio>`;
                }
            } else {
            mediaPanel.style.display = 'none';
            if(wrapper) wrapper.style.display = 'block';
            editor.setValue(fileNode.content || "");
            editor.setOption("mode", mode);
            
            // استخدام setTimeout لضمان اكتمال تحميل الواجهة قبل رسم الأسطر
            setTimeout(() => {
                editor.refresh();
            }, 50);
        }
        renderFileExplorer();

        function openDefaultFirstFile() {
            if (fileSystem.length > 0 && fileSystem[0].children && fileSystem[0].children.length > 0) {
                openFile(fileSystem[0].children[0]);
            }
        }

        function addFile() {
            const name = prompt("Enter the file name with the extension (example: script.ts):");
            if (!name) return;
            let ext = name.split('.').pop().toLowerCase();
            const allowedExts = ['html','css','js','ts','py','php','txt','json','md','sql','xml','java','c','cpp','cs','go','rs'];
            if(!allowedExts.includes(ext)) ext = 'txt';
            const newFile = { id: 'file_' + Date.now(), name, type: 'file', fileType: ext, content: "" };
            fileSystem.push(newFile);
            saveProject(); renderFileExplorer(); openFile(newFile);
        }

        function addFolder() {
            const name = prompt("Enter the folder name:");
            if (!name) return;
            fileSystem.push({ id: 'folder_' + Date.now(), name, type: 'folder', isOpen: true, children: [] });
            saveProject(); renderFileExplorer();
        }

        function addFileToFolder(folderNode) {
            const name = prompt(`Enter the name of the new file inside (${folderNode.name}):`);
            if (!name) return;
            let ext = name.split('.').pop().toLowerCase();
            const allowedExts = ['html','css','js','ts','py','php','txt','json','md','sql','xml','java','c','cpp','cs','go','rs'];
            if(!allowedExts.includes(ext)) ext = 'txt';
            const newFile = { id: 'file_' + Date.now(), name, type: 'file', fileType: ext, content: "" };
            if(!folderNode.children) folderNode.children = [];
            folderNode.children.push(newFile);
            folderNode.isOpen = true;
            saveProject(); renderFileExplorer(); openFile(newFile);
        }

        function addFolderToFolder(folderNode) {
            const name = prompt(`Enter the name of the new folder inside (${folderNode.name}):`);
            if (!name) return;
            if(!folderNode.children) folderNode.children = [];
            folderNode.children.push({ id: 'folder_' + Date.now(), name, type: 'folder', isOpen: true, children: [] });
            folderNode.isOpen = true;
            saveProject(); renderFileExplorer();
        }

   function handleGlobalFileUpload(event) {
    const files = event.target.files;
    if (!files || files.length === 0) return;
    
    // نحتفظ بمعرف المجلد المستهدف حتى لا نفقده أثناء قراءة الملفات المتعددة
    const targetFolderId = currentTargetFolderId;
    
    // نمر على كل الملفات المرفوعة
    for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const ext = file.name.split('.').pop().toLowerCase();
        let fileType = 'txt';
        let isBinaryMedia = false;
        
        if (file.type.startsWith('image/')) {
            fileType = 'image';
            isBinaryMedia = true;
        } else if (file.type.startsWith('video/')) {
            fileType = 'video';
            isBinaryMedia = true;
        } else if (file.type.startsWith('audio/')) {
            fileType = 'audio';
            isBinaryMedia = true;
        } else {
            const allowedExts = ['html', 'css', 'js', 'ts', 'py', 'php', 'txt', 'json', 'md', 'sql', 'xml', 'java', 'c', 'cpp', 'cs', 'go', 'rs'];
            if (allowedExts.includes(ext)) {
                fileType = ext;
            } else {
                fileType = 'txt';
            }
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const newFile = {
                // إضافة سلسلة عشوائية لتجنب تطابق الـ ID عند رفع عدة ملفات في نفس اللحظة
                id: (isBinaryMedia ? 'media_' : 'file_') + Date.now() + '_' + Math.random().toString(36).substring(2, 8),
                name: file.name,
                type: 'file',
                fileType: fileType,
                content: e.target.result
            };
            
            if (targetFolderId) {
                let insertSuccess = findAndAddMediaToFolder(fileSystem, targetFolderId, newFile);
                if (!insertSuccess) fileSystem.push(newFile);
            } else {
                fileSystem.push(newFile);
            }
            
            saveProject();
            renderFileExplorer();
            
            // فتح الملف الأخير فقط في المحرر لتجنب التداخل
            if (i === files.length - 1) {
                openFile(newFile);
            }
        };
        
        if (isBinaryMedia) {
            reader.readAsDataURL(file);
        } else {
            reader.readAsText(file);
        }
    }
    
    // إعادة تعيين المتغيرات بعد الانتهاء من حلقة التكرار
    currentTargetFolderId = null;
    event.target.value = '';
}

        function findAndAddMediaToFolder(nodes, folderId, newFile) {
            for (let i = 0; i < nodes.length; i++) {
                if (nodes[i].id === folderId && nodes[i].type === 'folder') {
                    if (!nodes[i].children) nodes[i].children = [];
                    nodes[i].children.push(newFile); nodes[i].isOpen = true; return true;
                }
                if (nodes[i].children) {
                    let found = findAndAddMediaToFolder(nodes[i].children, folderId, newFile);
                    if(found) { nodes[i].isOpen = true; return true; }
                }
            }
            return false;
        }

        function deleteNode(nodes, id) {
            for (let i = 0; i < nodes.length; i++) {
                if (nodes[i].id === id) { nodes.splice(i, 1); return true; }
                if (nodes[i].children && deleteNode(nodes[i].children, id)) return true;
            }
            return false;
        }

        function saveProject() { localStorage.setItem('savedProject', JSON.stringify(fileSystem)); }

        function getAllFilesFlat(nodes, map = {}) {
            nodes.forEach(node => {
                if (node.type === 'file') map[node.name] = node;
                else if (node.children) getAllFilesFlat(node.children, map);
            });
            return map;
        }

// 1. الدالة الذكية والمطورة لتجميع المشروع (تحل مشاكل JS والروابط)
function compileSpecificHtml(htmlFileNode, allFilesMap, processedFiles = new Set()) {
    // حماية من التكرار اللانهائي
    if (processedFiles.has(htmlFileNode.name)) return "#";
    processedFiles.add(htmlFileNode.name);
    
    let compiledHtml = htmlFileNode.content;
    
    // أولاً: دمج ملفات الجافاسكريبت مباشرة (Inline) لتفادي أخطاء الـ Base64
    compiledHtml = compiledHtml.replace(/<script\s+[^>]*src=["']([^"']+)["'][^>]*>[\s\S]*?<\/script>/gi, (match, p1) => {
        const filename = p1.split('/').pop();
        if (allFilesMap[filename] && (allFilesMap[filename].fileType === 'js' || allFilesMap[filename].fileType === 'ts')) {
            return `<script>\n${allFilesMap[filename].content}\n<\/script>`;
        }
        return match;
    });

    // ثانياً: دمج ملفات CSS مباشرة (Inline)
    compiledHtml = compiledHtml.replace(/<link\s+[^>]*href=["']([^"']+)["'][^>]*>/gi, (match, p1) => {
        const filename = p1.split('/').pop();
        if (allFilesMap[filename] && allFilesMap[filename].fileType === 'css') {
            return `<style>\n${allFilesMap[filename].content}\n<\/style>`;
        }
        return match;
    });
    
    // ثالثاً: معالجة الصور والوسائط المتعددة (Base64 كما هي)
    compiledHtml = compiledHtml.replace(/src=["']([^"']+)["']/gi, (match, p1) => {
        const filename = p1.split('/').pop();
        if (allFilesMap[filename]) {
            const file = allFilesMap[filename];
            if (file.fileType === 'image' || file.fileType === 'video' || file.fileType === 'audio') {
                return `src="${file.content}"`;
            }
        }
        return match;
    });
    
    // رابعاً: معالجة الروابط لصفحات HTML الأخرى (تجاوز حظر المتصفحات)
    compiledHtml = compiledHtml.replace(/href=["']([^"']+)["']/gi, (match, p1) => {
        const filename = p1.split('/').pop();
        
        // تجاهل روابط CSS لأننا عالجناها سابقاً
        if (match.toLowerCase().includes('rel="stylesheet"')) return match; 
        
        if (allFilesMap[filename]) {
            const file = allFilesMap[filename];
            if (file.fileType === 'html' && file !== htmlFileNode) {
                let linkedCompiled = compileSpecificHtml(file, allFilesMap, new Set(processedFiles));
                if (linkedCompiled !== "#") {
                    const b64 = btoa(unescape(encodeURIComponent(linkedCompiled)));
                    // خدعة ذكية: استبدال الرابط بدالة جافاسكريبت تقوم بفتح الصفحة الجديدة فوراً 
                    return `href="javascript:void(0);" onclick="document.open(); document.write(decodeURIComponent(escape(atob('${b64}')))); document.close();"`;
                }
            }
        }
        return match;
    });
    
    return compiledHtml;
}

// 2. تحديث الدالة الرئيسية التي يتم استدعاؤها عند النشر أو المعاينة
function compileVirtualProject() {
    const allFilesMap = getAllFilesFlat(fileSystem);
    let activeHtmlFile = null;

    // تحديد الصفحة المفتوحة حالياً، أو الصفحة الرئيسية كخيار افتراضي
    if (currentOpenFile && currentOpenFile.fileType === 'html') {
        activeHtmlFile = currentOpenFile;
    } else {
        activeHtmlFile = allFilesMap['index.html'] || Object.values(allFilesMap).find(f => f.fileType === 'html');
    }

    if (!activeHtmlFile) return null;

    // تمرير الصفحة لدالة التجميع الذكية
    return compileSpecificHtml(activeHtmlFile, allFilesMap);
}

        function showTerminal(initialText = "") {
            const terminal = document.getElementById('terminalPanel');
            const output = document.getElementById('terminalOutput');
            terminal.style.display = 'flex';
            output.textContent = initialText;
        }

        function appendTerminal(text) {
            const output = document.getElementById('terminalOutput');
            output.textContent += text;
            output.scrollTop = output.scrollHeight; 
        }

        function closeTerminal() {
            document.getElementById('terminalPanel').style.display = 'none';
        }

        async function runCode() {
            if (!currentOpenFile) return;

            const code = editor.getValue();
            const ext = currentOpenFile.fileType;
            const frontendLangs = ['html', 'css', 'js', 'json', 'ts', 'txt'];

            if (frontendLangs.includes(ext)) {
                const completeOutput = compileVirtualProject();
                if (!completeOutput) {
                    alert("Any active HTML file could not be found. Please create an HTML file first.");
                    return;
                }
                const previewFrame = document.getElementById('previewFrameFullscreen');
                document.getElementById('fullscreenPreview').classList.add('active');
                const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
                doc.open(); doc.write(completeOutput); doc.close();
                return;
            }

            const judge0LangMap = {
                'py': 71,    
                'php': 68,   
                'java': 62,  
                'c': 50,     
                'cpp': 54,   
                'cs': 51,    
                'go': 60,    
                'rs': 73     
            };

            const langId = judge0LangMap[ext];

            if (langId) {
                showTerminal(`The code is being executed via the server... Please wait.\n----------------------------------------\n`);
                
                try {
                    const apiKey = "Put your Rapidapi key here"; 
                    
                    const response = await fetch("https://judge0-ce.p.rapidapi.com/submissions?base64_encoded=false&wait=true", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "X-RapidAPI-Key": apiKey, 
                            "X-RapidAPI-Host": "judge0-ce.p.rapidapi.com"
                        },
                        body: JSON.stringify({
                            source_code: code,
                            language_id: langId
                        })
                    });
                    
                    const result = await response.json();
                    
                    if (result.stdout) {
                        appendTerminal(result.stdout);
                    } else if (result.stderr || result.compile_output) {
                        appendTerminal("[code error]:\n" + (result.stderr || result.compile_output));
                    } else if (result.message) {
                        appendTerminal("[server message]:\n" + result.message);
                    } else {
                        appendTerminal("\Implemented successfully (without Text outputs).");
                    }
                } catch(error) {
                    appendTerminal("\n[Connection error]: Server access failed.");
                }
            } else {
                alert("Sorry, this extension is not currently supported to run through the server.");
            }
        }

async function exportToCommunityProjects() {
    const token = localStorage.getItem('token');
    const author = localStorage.getItem('currentUser');
    if (!token || !author) { 
        alert("Error: You must first log in to publish projects."); 
        return; 
    }
    
    const finalBundle = compileVirtualProject();
    if (!finalBundle) {
        alert("Error: There is no valid HTML file to package and publish..");
        return;
    }

    const publishedProjectId = localStorage.getItem('currentPublishedProjectId');
    let isUpdate = false;

    if (publishedProjectId) {
        // رسالة أوضح للمستخدم
        const userChoice = confirm("هذا المشروع مرتبط بمشروع قمت بنشره مسبقاً.\n\n- اضغط 'موافق' (OK) لتحديث المشروع الحالي في المجتمع.\n- اضغط 'إلغاء' (Cancel) لنشره كمشروع جديد منفصل تماماً.");
        
        if (userChoice) {
            isUpdate = true;
        } else {
            // توكيد إضافي لمنع الخطأ
            const confirmNew = confirm("سيتم فك الارتباط بالمشروع القديم ونشر هذا الكود كمشروع جديد. هل أنت متأكد؟");
            if (!confirmNew) return; // الخروج إذا تراجع المستخدم
            
            isUpdate = false;
        }
    }

    let title = "", description = "";
    if (!isUpdate) {
        title = prompt("أدخل عنواناً للمشروع لنشره في المجتمع:");
        if (!title || title.trim() === "") return; // التوقف إذا لم يدخل عنواناً، دون حذف الـ ID القديم

        description = prompt("أدخل وصفاً مبسطاً للمشروع:");
        if (!description || description.trim() === "") {
            description = "لا يوجد وصف متوفر لهذا المشروع.";
        }
        
        // نقوم بحذف المعرف القديم هنا فقط بعد تأكدنا من أنه سيدخل بيانات المشروع الجديد
        if (publishedProjectId) {
            localStorage.removeItem('currentPublishedProjectId');
        }
    }
    
    try {
        let url = 'https://my-backend-api-bntd.onrender.com/api/projects';
        let method = 'POST'; 
        
        let payload = {
            html: finalBundle,
            css: "", 
            js: ""
        };

        if (isUpdate) {
            url = `https://my-backend-api-bntd.onrender.com/api/projects/${publishedProjectId}`;
            method = 'PUT'; 
        } else {
            payload.title = title.trim();
            payload.description = description.trim();
            payload.author = author;
        }

        const response = await fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(payload)
        });
        
        const data = await response.json().catch(() => ({}));

        if (response.ok) {
            if (!isUpdate) {
                const newId = (data.project && data.project._id) || data._id || (data.project && data.project.id) || data.id;
                if (newId) {
                    localStorage.setItem('currentPublishedProjectId', newId);
                }
            }

            alert(isUpdate ? "✅ تم تحديث مشروعك بنجاح!" : "🎉 تهانينا! تم نشر مشروعك المتكامل بنجاح.");
            window.location.href = "index.html"; 
        } else {
            if (response.status === 404 || data.msg === "The project does not exist.") {
                localStorage.removeItem('currentPublishedProjectId');
                alert("⚠️ هذا المشروع لم يعد موجوداً في السيرفر (ربما تم حذفه). يرجى الضغط على النشر مرة أخرى ليتم رفعه كجديد.");
            } else {
                alert("حدث خطأ في السيرفر: " + (data.msg || data.message || "فشل العملية"));
            }
        }
    } catch (error) {
        console.error(error);
        alert("فشل الاتصال بالسيرفر. يرجى التأكد من اتصالك بالإنترنت.");
    }
}

        function downloadProjectAsZip() {
            const zip = new JSZip();
            function addToZip(nodes, currentFolder) {
                nodes.forEach(node => {
                    if (node.type === 'file') {
                        if (node.content.startsWith('data:')) {
                            const data = node.content.split(',')[1];
                            currentFolder.file(node.name, data, {base64: true});
                        } else {
                            currentFolder.file(node.name, node.content);
                        }
                    } else {
                        const folder = currentFolder.folder(node.name);
                        addToZip(node.children || [], folder);
                    }
                });
            }
            addToZip(fileSystem, zip);
            zip.generateAsync({type:"blob"}).then(function(content) { saveAs(content, "MyWebProject.zip"); });
        }
