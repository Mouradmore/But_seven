    <style>
        /* ===== متغيرات الوضع الليلي ===== */
        :root {
            --bg-primary: #1e1e1e;
            --bg-secondary: #252526;
            --bg-card: #2d2d30;
            --bg-hover: #3a3a3d;
            --text-primary: #d4d4d4;
            --text-secondary: #cccccc;
            --text-muted: #6a6a6a;
            --border-color: #3c3c3c;
            --accent-color: #007acc;
            --accent-hover: #0098ff;
            --shadow-color: rgba(0,0,0,0.5);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 280px;
            --terminal-height: 200px;
        }

        [data-theme="light"] {
            --bg-primary: #f3f3f3;
            --bg-secondary: #ffffff;
            --bg-card: #f0f0f0;
            --bg-hover: #e8e8e8;
            --text-primary: #333333;
            --text-secondary: #555555;
            --text-muted: #999999;
            --border-color: #d0d0d0;
            --accent-color: #0066b8;
            --accent-hover: #007acc;
            --shadow-color: rgba(0,0,0,0.1);
        }

        /* ===== Reset & Base ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color var(--transition), color var(--transition);
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-hover); }

        /* ===== الشريط الجانبي ===== */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            flex-shrink: 0;
            position: relative;
            z-index: 100;
            transition: margin-right 0.3s ease, width 0.3s ease;
            overflow: hidden;
        }

        .sidebar.collapsed {
            width: 0;
            margin-right: -280px;
        }

        .sidebar-header {
            padding: 10px 14px;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .sidebar-header h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header h3 i {
            color: var(--accent-color);
        }

        .sidebar-actions-top {
            display: flex;
            gap: 4px;
        }

        .sidebar-actions-top button {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            padding: 3px 7px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all var(--transition);
        }

        .sidebar-actions-top button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--accent-color);
        }

        .file-explorer {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        .file-item, .folder-item {
            padding: 3px 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            transition: background-color 0.15s ease;
            user-select: none;
            border-radius: 4px;
            margin: 1px 4px;
            font-size: 0.82rem;
            color: var(--text-secondary);
            position: relative;
        }

        .file-item:hover, .folder-item:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }

        .file-item.selected, .folder-item.selected {
            background-color: var(--accent-color);
            color: #fff;
        }

        .file-item .file-icon, .folder-item .folder-icon {
            font-size: 0.85rem;
            width: 18px;
            text-align: center;
        }

        .file-item .file-name, .folder-item .folder-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .folder-content {
            margin-right: 16px;
            border-right: 1px solid var(--border-color);
            padding-right: 4px;
        }

        .tree-actions {
            display: flex;
            align-items: center;
           /*gap: 2px;
            opacity: 0;*/
            transition: opacity 0.2s;
        }

        .file-item:hover .tree-actions,
        .folder-item:hover .tree-actions {
            opacity: 1;
        }

        .tree-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 0px 4px;
            border-radius: 3px;
        }

        .tree-actions button:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .tree-action-menu {
            display: none;
            position: fixed;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 8px 30px var(--shadow-color);
            z-index: 1005;
            min-width: 180px;
            max-width: 220px;
            padding: 6px 0;
            overflow: hidden;
        }

        .tree-action-menu.show {
            display: block;
        }

        .tree-action-menu button {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 7px 16px;
            width: 100%;
            text-align: right;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .tree-action-menu button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .tree-action-menu button.danger { color: #e74c3c; }
        .tree-action-menu button.danger:hover { background: rgba(231, 76, 60, 0.15); }
        .tree-action-menu button.upload-btn { color: #2ecc71; }
        .tree-action-menu button.upload-btn:hover { background: rgba(46, 204, 113, 0.15); }
        .tree-action-menu button i { width: 18px; text-align: center; }

        .sidebar-footer {
            padding: 6px 10px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .sidebar-footer button {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            padding: 3px 8px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .sidebar-footer button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--accent-color);
        }

        /* ===== منطقة المحرر ===== */
        .editor-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-width: 0;
        }

        .editor-title {
            background: var(--bg-secondary);
            padding: 4px 14px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            height: 36px;
        }

        .editor-title .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .editor-title .current-file-name {
            font-size: 0.82rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .editor-title .editor-actions {
            display: flex;
            gap: 4px;
        }

        .editor-title .editor-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 3px 6px;
            border-radius: 4px;
            transition: all var(--transition);
        }

        .editor-title .editor-actions button:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        /* ===== شريط الأدوات ===== */
        .editor-toolbar {
            background: var(--bg-secondary);
            padding: 3px 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
            flex-shrink: 0;
            min-height: 32px;
            align-items: center;
        }

        .shortcut-btn {
            padding: 3px 8px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.72rem;
            display: flex;
            align-items: center;
            gap: 3px;
            transition: all var(--transition);
            font-family: inherit;
        }

        .shortcut-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .shortcut-btn.primary {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .shortcut-btn.primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .shortcut-btn.success {
            background: #28a745;
            color: #fff;
            border-color: #28a745;
        }

        .shortcut-btn.success:hover {
            background: #218838;
            border-color: #218838;
        }

        .shortcut-btn i { font-size: 0.75rem; }

        /* ===== حاوية المحرر ===== */
        .editor-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg-primary);
            display: flex;
        }

        .CodeMirror {
            height: 100% !important;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            background: var(--bg-primary) !important;
            flex: 1;
        }

        .CodeMirror-gutters {
            background: var(--bg-secondary) !important;
            border-right: 1px solid var(--border-color) !important;
        }

        .CodeMirror-linenumber {
            color: var(--text-muted) !important;
        }

        .CodeMirror-foldgutter-open, .CodeMirror-foldgutter-folded {
            color: var(--text-muted) !important;
        }

        /* ===== لوحة المعاينة ===== */
        .preview-panel {
            display: none;
            flex-direction: column;
            flex: 1;
            background: #fff;
            min-width: 200px;
            border-right: 1px solid var(--border-color);
        }

        .preview-panel.active {
            display: flex;
        }

        .preview-panel .preview-toolbar {
            background: var(--bg-secondary);
            padding: 3px 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
            min-height: 30px;
            flex-wrap: wrap;
        }

        .preview-panel .preview-toolbar .device-btn {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            padding: 2px 8px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all var(--transition);
        }

        .preview-panel .preview-toolbar .device-btn:hover,
        .preview-panel .preview-toolbar .device-btn.active {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .preview-panel .preview-frame {
            flex: 1;
            border: none;
            background: #fff;
            width: 100%;
        }

        .preview-panel .preview-frame.device-mobile {
            width: 375px;
            margin: 0 auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .preview-panel .preview-frame.device-tablet {
            width: 768px;
            margin: 0 auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        /* ===== الطرفية ===== */
        .terminal-panel {
            height: var(--terminal-height);
            background: var(--bg-primary);
            border-top: 2px solid var(--accent-color);
            display: none;
            flex-direction: column;
            flex-shrink: 0;
        }

        .terminal-panel.active {
            display: flex;
        }

        .terminal-header {
            background: var(--bg-secondary);
            padding: 3px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .terminal-header span {
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        .terminal-header button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            transition: all var(--transition);
        }

        .terminal-header button:hover { color: #e74c3c; }

        .terminal-output {
            flex: 1;
            padding: 6px 14px;
            color: #00ff00;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 13px;
            overflow-y: auto;
            white-space: pre-wrap;
            direction: ltr;
            text-align: left;
            background: #0a0a0a;
        }

        /* ===== Minimap ===== */
        .minimap-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 50px;
            height: 100%;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 10;
        }

        .minimap-container.active {
            opacity: 1;
            pointer-events: auto;
        }

        .minimap-container canvas {
            width: 100%;
            height: 100%;
        }

        /* ===== Breadcrumb ===== */
        .breadcrumb {
            padding: 1px 14px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
            min-height: 22px;
        }

        .breadcrumb span { cursor: pointer; transition: color var(--transition); }
        .breadcrumb span:hover { color: var(--accent-color); }
        .breadcrumb .separator { color: var(--text-muted); cursor: default; }

        /* ===== النوافذ المنبثقة ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal-box {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px 24px;
            max-width: 450px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal-box h3 {
            margin-bottom: 14px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
        }

        .modal-box .close-modal {
            float: left;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.3rem;
            cursor: pointer;
        }

        .modal-box .close-modal:hover {
            color: var(--text-primary);
            transform: rotate(90deg);
        }

        .modal-box input, .modal-box select {
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
        }

        .modal-box input:focus, .modal-box select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 122, 204, 0.15);
        }

        .modal-box .btn-group {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 6px;
        }

        .modal-box .btn-group button {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.82rem;
            transition: all var(--transition);
        }

        .modal-box .btn-group .btn-confirm {
            background: var(--accent-color);
            color: #fff;
        }

        .modal-box .btn-group .btn-confirm:hover {
            background: var(--accent-hover);
        }

        .modal-box .btn-group .btn-cancel {
            background: var(--bg-hover);
            color: var(--text-secondary);
        }

        .modal-box .btn-group .btn-cancel:hover {
            background: var(--border-color);
        }

        /* ===== القوائم المنسدلة ===== */
        .dropdown-content {
            display: none;
            position: absolute;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-shadow: 0 8px 24px var(--shadow-color);
            z-index: 1002;
            min-width: 160px;
            max-height: 250px;
            overflow-y: auto;
            top: 100%;
            right: 0;
        }

        .dropdown-content.show { display: block; }

        .dropdown-content span {
            color: var(--text-secondary);
            padding: 6px 12px;
            display: block;
            cursor: pointer;
            font-size: 0.78rem;
            border-bottom: 1px solid var(--border-color);
            transition: all 0.15s;
        }

        .dropdown-content span:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .dropdown-content span:last-child { border-bottom: none; }

        .custom-dropdown { position: relative; display: inline-block; }

        /* ===== لوحة الأخطاء ===== */
        .errors-panel {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 150px;
            background: var(--bg-secondary);
            border-top: 2px solid #e74c3c;
            z-index: 500;
            overflow-y: auto;
            padding: 4px 14px;
        }

        .errors-panel.active { display: block; }

        .errors-panel .error-item {
            padding: 3px 8px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }

        .errors-panel .error-item .error-icon { color: #e74c3c; }
        .errors-panel .error-item .error-line { color: var(--text-muted); font-size: 0.7rem; }

        /* ===== استجابة للشاشات ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: fixed;
                top: 0;
                right: -100%;
                height: 100vh;
                z-index: 999;
                transition: right 0.3s ease;
            }
            .sidebar.open { right: 0; }
            .sidebar.collapsed { width: 100%; margin-right: 0; }
            
            .preview-panel .preview-frame.device-mobile,
            .preview-panel .preview-frame.device-tablet { width: 100%; }
            
            .editor-toolbar { gap: 2px; }
            .shortcut-btn { font-size: 0.65rem; padding: 2px 5px; }
            .modal-box { max-width: 95%; padding: 14px; }
            
            .tree-action-menu {
                min-width: 160px;
                max-width: 200px;
            }
        }

        /* ===== تحسينات CodeMirror ===== */
        .CodeMirror-hints {
            z-index: 999999 !important;
            background: var(--bg-secondary) !important;
            border: 1px solid var(--accent-color) !important;
            box-shadow: 0 8px 24px var(--shadow-color) !important;
            border-radius: 6px !important;
        }

        .CodeMirror-hint {
            color: var(--text-secondary) !important;
            padding: 5px 12px !important;
            font-size: 13px !important;
        }

        li.CodeMirror-hint-active {
            background: var(--accent-color) !important;
            color: #fff !important;
        }

        .CodeMirror-dialog {
            z-index: 999999 !important;
            background: var(--bg-secondary) !important;
            color: var(--text-primary) !important;
            border-bottom: 1px solid var(--border-color) !important;
            padding: 6px 14px !important;
        }

        .CodeMirror-dialog input {
            background: var(--bg-primary) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border-color) !important;
            padding: 3px 8px !important;
            border-radius: 4px !important;
            outline: none !important;
        }

        .CodeMirror-dialog input:focus { border-color: var(--accent-color) !important; }

        .CodeMirror-dialog button {
            background: var(--accent-color) !important;
            color: #fff !important;
            border: none !important;
            padding: 3px 12px !important;
            border-radius: 4px !important;
            cursor: pointer !important;
            margin: 0 3px !important;
        }

        .CodeMirror-dialog button:hover { background: var(--accent-hover) !important; }

        /* ===== تقسيم الشاشة ===== */
        .split-view {
            display: none;
            flex: 1;
            height: 100%;
        }

        .split-view.active { display: flex; }

        .split-view .split-editor {
            flex: 1;
            height: 100%;
            border-right: 1px solid var(--border-color);
            overflow: hidden;
        }

        .split-view .split-editor:last-child { border-right: none; }

        .split-view .split-editor .CodeMirror {
            height: 100% !important;
        }

        /* ===== شاشة التحميل ===== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .loading-screen .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-screen p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- ===== شاشة التحميل ===== -->
    <div id="loadingScreen" class="loading-screen">
        <div class="spinner"></div>
        <p>جاري تهيئة المحرر المتكامل...</p>
    </div>

    <!-- ===== الشريط الجانبي ===== -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-folder-open"></i> المستكشف</h3>
            <div class="sidebar-actions-top">
                <button onclick="showModal('newFile')" title="ملف جديد"><i class="fas fa-file"></i></button>

        <div class="sidebar-footer">

    <!-- ===== منطقة المحرر ===== -->
    <div class="editor-section">
        <!-- شريط العنوان -->
        <div class="editor-title">
            <div class="left">
                <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:1rem;">
                    <i class="fas fa-bars"></i>
                </button>
                <span class="current-file-name" id="currentFileNameDisplay">لا يوجد ملف مفتوح</span>
                <span style="font-size:0.65rem;color:var(--text-muted);" id="fileLanguageDisplay"></span>
            </div>
            <div class="editor-actions">
                <button onclick="toggleTheme()" title="تبديل الوضع الليلي"><i class="fas fa-moon" id="themeIcon"></i></button>
                <button onclick="togglePreview()" title="المعاينة"><i class="fas fa-eye" id="previewToggleIcon"></i></button>
                <button onclick="toggleTerminal()" title="الطرفية"><i class="fas fa-terminal"></i></button>
                <button onclick="toggleMinimap()" title="Minimap"><i class="fas fa-map"></i></button>
                <button onclick="toggleSplitView()" title="تقسيم الشاشة"><i class="fas fa-columns"></i></button>
            </div>
        </div>

        <!-- ===== Breadcrumb ===== -->
        <div class="breadcrumb" id="breadcrumb">
            <span onclick="openDefaultFirstFile()"><i class="fas fa-folder"></i> المشروع</span>
            <span class="separator">/</span>
            <span id="breadcrumbCurrent">index.html</span>
        </div>

        <!-- ===== شريط الأدوات ===== -->
        <div class="editor-toolbar">
            <button class="shortcut-btn" onclick="editor.undo()"><i class="fas fa-undo"></i> تراجع</button>
            <button class="shortcut-btn" onclick="editor.redo()"><i class="fas fa-redo"></i> إعادة</button>
            <button class="shortcut-btn" onclick="formatCurrentCode()"><i class="fas fa-magic"></i> تنسيق</button>
            <button class="shortcut-btn" onclick="editor.execCommand('find')"><i class="fas fa-search"></i> بحث</button>
            <button class="shortcut-btn" onclick="editor.execCommand('replace')"><i class="fas fa-exchange-alt"></i> استبدال</button>
            <button class="shortcut-btn primary" onclick="runCode()"><i class="fas fa-play"></i> تشغيل</button>
            <button class="shortcut-btn success" onclick="exportToCommunityProjects()"><i class="fas fa-cloud-upload-alt"></i> نشر</button>
            
            <!-- اختصارات المكونات -->
            <div class="custom-dropdown">
                <button class="shortcut-btn" onclick="toggleDropdown('drop-components')"><i class="fas fa-puzzle-piece"></i> مكونات</button>
                <div id="drop-components" class="dropdown-content">
                    <span class="snippet-item" data-code='<button class="btn btn-primary">زر</button>'>زر</span>
                    <span class="snippet-item" data-code='<div class="card"><div class="card-body"><h5>بطاقة</h5><p>نص</p></div></div>'>بطاقة</span>
                    <span class="snippet-item" data-code='<nav class="navbar"><div>الشعار</div><ul><li><a href="#">رابط</a></li></ul></nav>'>شريط تنقل</span>
                    <span class="snippet-item" data-code='<form><input type="email" placeholder="البريد"><button>إرسال</button></form>'>نموذج</span>
                    <span class="snippet-item" data-code='<div class="alert alert-success">رسالة نجاح!</div>'>تنبيه</span>
                    <span class="snippet-item" data-code='<div class="progress"><div style="width:75%"></div></div>'>شريط تقدم</span>
                </div>
            </div>

            <!-- اختصارات المكتبات -->
            <div class="custom-dropdown">

                    <span onclick="addLibrary('tailwind')"><i class="fas fa-wind"></i> Tailwind</span>
                    <span onclick="addLibrary('fontawesome')"><i class="fab fa-font-awesome"></i> Font Awesome</span>
                    <span onclick="addLibrary('jquery')"><i class="fab fa-js"></i> jQuery</span>
                    <span onclick="addLibrary('chartjs')"><i class="fas fa-chart-pie"></i> Chart.js</span>
                    <span onclick="addLibrary('threejs')"><i class="fas fa-cube"></i> Three.js</span>

        <!-- ===== محرر + معاينة ===== -->
        <div class="editor-wrapper" id="editorWrapper">
            <textarea id="codeTextArea" hidden></textarea>
            
            <!-- المعاينة -->
            <div class="preview-panel" id="previewPanel">
                <div class="preview-toolbar">
                    <button class="device-btn active" data-device="desktop" onclick="setDevice('desktop')"><i class="fas fa-desktop"></i></button>
                    <button class="device-btn" data-device="tablet" onclick="setDevice('tablet')"><i class="fas fa-tablet-alt"></i></button>
                    <button class="device-btn" data-device="mobile" onclick="setDevice('mobile')"><i class="fas fa-mobile-alt"></i></button>
                    <button class="device-btn" onclick="openFullscreenPreview()"><i class="fas fa-expand"></i> ملء الشاشة</button>
                    <button class="device-btn" onclick="closePreview()"><i class="fas fa-times"></i> إغلاق</button>
                </div>
                <iframe class="preview-frame" id="previewFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>

            <!-- Minimap -->

                <canvas id="minimapCanvas"></canvas>
            </div>

        <!-- ===== الطرفية ===== -->
        <div class="terminal-panel" id="terminalPanel">
            <div class="terminal-header">
                <span><i class="fas fa-terminal"></i> المخرجات (Console)</span>

    <!-- ===== النوافذ المنبثقة ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box" id="modalBox">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- ===== السكريبتات ===== -->
    <script>
        // ==========================================
        // 1. تهيئة المحرر والمتغيرات
        // ==========================================
        let editor;
        let fileSystem = [];
        let currentOpenFile = null;
        let currentTargetFolderId = null;
        let isPreviewOpen = false;
        let isSplitView = false;
        let isMinimapOpen = false;
        let splitEditor1, splitEditor2;
        let autoSaveInterval;
        let previewTimeout;

        // ==========================================
        // 2. تحميل المحرر
        // ==========================================
        document.addEventListener('DOMContentLoaded', async () => {
            // تهيئة المحرر
            editor = CodeMirror.fromTextArea(document.getElementById("codeTextArea"), {
                mode: "htmlmixed",
                theme: localStorage.getItem('theme') === 'light' ? "default" : "dracula",
                lineWrapping: true,
                lineNumbers: true,
                autoCloseTags: true,
                autoCloseBrackets: true,
                matchTags: { bothTags: true },
                foldGutter: true,
                gutters: ["CodeMirror-linenumbers", "CodeMirror-foldgutter"],
                extraKeys: {
                    "Ctrl-Space": "autocomplete",
                    "Ctrl-F": "find",
                    "Cmd-F": "find",
                    "Ctrl-S": function() { saveProject(); },
                    "Cmd-S": function() { saveProject(); },
                    "Ctrl-Alt-F": function() { formatCurrentCode(); },
                    "Ctrl-/": function(cm) { cm.toggleComment(); },
                    "F11": function() { openFullscreenPreview(); }
                }
            });

            // الإكمال التلقائي
            editor.on("inputRead", function(cm, change) {
                if (change.origin !== "+input") return;
                let text = change.text.join("");
                if (!text || text === " ") return;
                requestAnimationFrame(() => {
                    if (cm.state.completionActive) return;
                    let currentMode = cm.getOption("mode");
                    let hintOptions = { completeSingle: false };
                    if (currentMode === "css") {
                        cm.showHint({ hint: CodeMirror.hint.css, ...hintOptions });
                    } else if (currentMode === "javascript" || currentMode === "text/typescript") {
                        cm.showHint({ hint: CodeMirror.hint.javascript, ...hintOptions });
                    } else if (currentMode === "htmlmixed" || currentMode === "xml") {
                        cm.showHint({ hint: CodeMirror.hint.html, ...hintOptions });
                    } else {
                        if (CodeMirror.hint.anyword) {
                            cm.showHint({ hint: CodeMirror.hint.anyword, ...hintOptions });
                        }
                    }
                });
            });

            // حفظ التغييرات
            editor.on("change", () => {
                if (currentOpenFile && currentOpenFile.fileType !== 'image' &&
                    currentOpenFile.fileType !== 'video' && currentOpenFile.fileType !== 'audio') {
                    currentOpenFile.content = editor.getValue();
                }
            });

            // تحميل البيانات
            const savedData = localStorage.getItem('savedProject');
            if (savedData) {
                try { fileSystem = JSON.parse(savedData); } catch(e) { fileSystem = getDefaultFileSystem(); }
            } else {
                fileSystem = getDefaultFileSystem();
            }

            renderFileExplorer();
            openDefaultFirstFile();
            setupSnippets();

            // الحفظ التلقائي كل 5 ثوانٍ
            autoSaveInterval = setInterval(saveProject, 5000);

            // إخفاء شاشة التحميل
            document.getElementById('loadingScreen').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('loadingScreen').style.display = 'none';
            }, 500);

            // استعادة الوضع الليلي
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
            editor.setOption('theme', savedTheme === 'dark' ? 'dracula' : 'default');

            console.log('🚀 But_Seven Editor loaded successfully!');
        });

        // ==========================================
        // 3. نظام الملفات الافتراضي
        // ==========================================
        function getDefaultFileSystem() {
            return [{
                id: 'folder_1',
                name: 'مشروعي',
                type: 'folder',
                isOpen: true,
                children: [
                    { id: 'file_1', name: 'index.html', type: 'file', fileType: 'html',
                        content: `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً في But_Seven</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            direction: rtl;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; opacity: 0.9; }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #fff;
            color: #667eea;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
            transition: transform 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 But_Seven</h1>
        <p>المحرر المتكامل لتطوير الويب</p>
        <a href="#" class="btn">ابدأ البرمجة</a>
    </div>
</body>
</html>` },
                    { id: 'file_2', name: 'style.css', type: 'file', fileType: 'css',
                        content: `/* أنماط المشروع */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
}
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.card {
    background: #fff;
    border-radius: 12px;

    transition: transform 0.3s;
}
.card:hover { transform: translateY(-5px); }` },
                    { id: 'file_3', name: 'script.js', type: 'file', fileType: 'js',
                        content: `// جافاسكريبت المشروع
console.log("مرحباً في But_Seven!");
document.addEventListener('DOMContentLoaded', function() {
    console.log('الصفحة جاهزة!');
});` }
                ]
            }];
        }

        // ==========================================
        // 4. دوال المستكشف والملفات
        // ==========================================
        function renderFileExplorer() {
            const container = document.getElementById('fileExplorer');
            container.innerHTML = '';
            buildTree(fileSystem, container);
        }

        function buildTree(nodes, parentElement) {
            nodes.forEach(node => {
                const wrapper = document.createElement('div');
                wrapper.className = 'tree-node-wrapper';

                const item = document.createElement('div');
                item.className = node.type === 'folder' ? 'folder-item' : 'file-item';
                if (currentOpenFile && currentOpenFile.id === node.id) item.classList.add('selected');
                if (node.type === 'folder' && node.isOpen) item.classList.add('open');

                const icon = document.createElement('span');
                icon.className = 'file-icon';
                if (node.type === 'folder') {
                    icon.innerHTML = `<i class="fas fa-folder${node.isOpen ? '-open' : ''}" style="color:#ffca28;"></i>`;
                } else {
                    const icons = {
                        html: '<i class="fab fa-html5" style="color:#e44d26;"></i>',
                        css: '<i class="fab fa-css3-alt" style="color:#264de4;"></i>',
                        js: '<i class="fab fa-js" style="color:#f7df1e;"></i>',
                        ts: '<i class="fab fa-js" style="color:#3178c6;"></i>',
                        py: '<i class="fab fa-python" style="color:#3776ab;"></i>',
                        php: '<i class="fab fa-php" style="color:#777bb4;"></i>',
                        json: '<i class="fas fa-file-code"></i>',
                        image: '<i class="fas fa-image" style="color:#4CAF50;"></i>',
                        video: '<i class="fas fa-video" style="color:#9c27b0;"></i>',
                        audio: '<i class="fas fa-music" style="color:#00bcd4;"></i>',
                        txt: '<i class="fas fa-file-alt"></i>'
                    };
                    icon.innerHTML = icons[node.fileType] || '<i class="fas fa-file"></i>';
                }
                item.appendChild(icon);

                const name = document.createElement('span');
                name.className = 'file-name';
                name.textContent = node.name;
                item.appendChild(name);

                const actions = document.createElement('div');
                actions.className = 'tree-actions';

                const moreBtn = document.createElement('button');
                moreBtn.innerHTML = '<i class="fas fa-ellipsis-v"></i>';
                moreBtn.className = 'more-options-btn';
                actions.appendChild(moreBtn);

                const actionMenu = document.createElement('div');
                actionMenu.className = 'tree-action-menu';
                actionMenu.id = 'menu_' + node.id;

                // زر رفع ملف
                const uploadBtn = document.createElement('button');
                uploadBtn.className = 'upload-btn';
                uploadBtn.innerHTML = '<i class="fas fa-upload"></i> رفع ملف';
                uploadBtn.onclick = (e) => {
                    e.stopPropagation();
                    hideAllMenus();
                    if (node.type === 'folder') {
                        currentTargetFolderId = node.id;
                    } else {
                        const parent = findParentNode(fileSystem, node.id);
                        if (parent) {
                            currentTargetFolderId = parent.id;
                        } else {
                            currentTargetFolderId = null;
                        }
                    }
                    document.getElementById('globalFileInput').click();
                };
                actionMenu.appendChild(uploadBtn);

                // زر رفع مجلد (للمجلدات فقط)
                if (node.type === 'folder') {
                    const uploadFolderBtn = document.createElement('button');
                    uploadFolderBtn.className = 'upload-btn';
                    uploadFolderBtn.innerHTML = '<i class="fas fa-folder-open"></i> رفع مجلد';
                    uploadFolderBtn.onclick = (e) => {
                        e.stopPropagation();
                        hideAllMenus();
                        currentTargetFolderId = node.id;
                        const input = document.createElement('input');
                        input.type = 'file';
                        input.webkitdirectory = true;
                        input.multiple = true;
                        input.style.display = 'none';
                        input.onchange = (ev) => {
                            const files = ev.target.files;
                            if (!files || files.length === 0) return;
                            handleFolderUpload(files, node.id);
                            input.remove();
                        };
                        document.body.appendChild(input);
                        input.click();
                    };
                    actionMenu.appendChild(uploadFolderBtn);
                }

                if (node.type === 'folder') {
                    const addFileBtn = document.createElement('button');
                    addFileBtn.innerHTML = '<i class="fas fa-file"></i> ملف جديد';
                    addFileBtn.onclick = (e) => { e.stopPropagation();
                        hideAllMenus();
                        addFileToFolder(node); };
                    actionMenu.appendChild(addFileBtn);

                    const addFolderBtn = document.createElement('button');
                    addFolderBtn.innerHTML = '<i class="fas fa-folder-plus"></i> مجلد جديد';

                            currentOpenFile = null;
                            editor.setValue("");
                            document.getElementById('currentFileNameDisplay').textContent = 'لا يوجد ملف مفتوح';
                            document.getElementById('fileLanguageDisplay').textContent = '';
                            document.getElementById('breadcrumbCurrent').textContent = '';

                    }
                };
                actionMenu.appendChild(delBtn);

                // حدث إظهار القائمة
                moreBtn.onclick = function(e) {
                    e.stopPropagation();
                    e.preventDefault();
                    
                    // إخفاء جميع القوائم المفتوحة

                    // تحديد موقع القائمة بشكل ذكي
                    const rect = this.getBoundingClientRect();
                    const menuWidth = 200;
                    const menuHeight = actionMenu.children.length * 35 + 12;
                    
                    let left = rect.left - menuWidth + 20;
                    let top = rect.top + 20;
                    
                    // التأكد من أن القائمة لا تخرج عن يمين الشاشة
                    if (left < 10) {
                        left = rect.left + 10;
                    }
                    
                    // التأكد من أن القائمة لا تخرج عن يسار الشاشة
                    if (left + menuWidth > window.innerWidth - 10) {
                        left = window.innerWidth - menuWidth - 10;
                    }
                    
                    // التأكد من أن القائمة لا تخرج من أسفل الشاشة
                    if (top + menuHeight > window.innerHeight - 10) {
                        top = window.innerHeight - menuHeight - 10;
                    }
                    
                    // التأكد من أن القائمة لا تخرج من أعلى الشاشة
                    if (top < 10) {
                        top = 10;
                    }

                    actionMenu.style.top = top + 'px';
                    
                    // تبديل إظهار القائمة
                    actionMenu.classList.toggle('show');

                actions.appendChild(actionMenu);
                item.appendChild(actions);

                if (node.type === 'folder') {

                        renderFileExplorer();
                    };

                    wrapper.appendChild(contentDiv);
                } else {
                    item.onclick = (e) => {
                        if (e.target.closest('.tree-actions')) return;

                parentElement.appendChild(wrapper);

        // دالة لإخفاء جميع القوائم
        function hideAllMenus() {
            document.querySelectorAll('.tree-action-menu').forEach(menu => {
                menu.classList.remove('show');
            });
        }

        // دالة جديدة لرفع مجلد كامل
        function handleFolderUpload(files, targetFolderId) {
            const rootFolder = findNodeById(fileSystem, targetFolderId);
            if (!rootFolder) {
                alert("المجلد المستهدف غير موجود!");
                return;
            }

            // نقوم بترتيب الملفات حسب مسارها
            const filePaths = {};
            for (let file of files) {
                const relativePath = file.webkitRelativePath || file.name;
                const parts = relativePath.split('/');
                const fileName = parts.pop();
                const folderPath = parts.join('/');
                if (!filePaths[folderPath]) filePaths[folderPath] = [];
                filePaths[folderPath].push({ file, fileName });
            }

            // نقوم بإنشاء الهيكل
            const createFolderStructure = (path, parentNode) => {
                if (!path || path === '') return parentNode;
                const parts = path.split('/');
                let current = parentNode;
                for (let part of parts) {
                    if (!part) continue;
                    let found = current.children ? current.children.find(c => c.name === part && c.type === 'folder') : null;
                    if (!found) {
                        const newFolder = {
                            id: 'folder_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                            name: part,
                            type: 'folder',
                            isOpen: true,
                            children: []
                        };
                        if (!current.children) current.children = [];
                        current.children.push(newFolder);
                        found = newFolder;
                    }
                    current = found;
                }
                return current;
            };

            // معالجة الملفات
            for (let folderPath in filePaths) {
                const targetNode = createFolderStructure(folderPath, rootFolder);
                const filesList = filePaths[folderPath];
                for (let item of filesList) {
                    const file = item.file;
                    const fileName = item.fileName;
                    const ext = fileName.split('.').pop().toLowerCase();
                    let fileType = 'txt';
                    let isBinaryMedia = false;

                    if (file.type.startsWith('image/')) {
                        fileType = 'image';
                        isBinaryMedia = true;
                    } else if (file.type.startsWith('video/')) {
                        fileType = 'video';
                        isBinaryMedia = true;
                    } else if (file.type.startsWith('audio/')) {
                        fileType = 'audio';
                        isBinaryMedia = true;
                    } else {
                        const allowedExts = ['html', 'css', 'js', 'ts', 'py', 'php', 'txt', 'json', 'md', 'sql', 'xml', 'java', 'c', 'cpp', 'cs', 'go', 'rs'];
                        if (allowedExts.includes(ext)) {
                            fileType = ext;
                        } else {
                            fileType = 'txt';
                        }
                    }

                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const newFile = {
                            id: (isBinaryMedia ? 'media_' : 'file_') + Date.now() + '_' + Math.random().toString(36).substring(2, 8),
                            name: fileName,
                            type: 'file',
                            fileType: fileType,
                            content: e.target.result
                        };
                        if (!targetNode.children) targetNode.children = [];
                        // تجنب التكرار
                        const existing = targetNode.children.find(c => c.name === fileName && c.type === 'file');
                        if (existing) {
                            existing.content = newFile.content;
                            existing.fileType = newFile.fileType;
                        } else {
                            targetNode.children.push(newFile);
                        }
                        saveProject();
                        renderFileExplorer();
                    };

                    if (isBinaryMedia) {
                        reader.readAsDataURL(file);
                    } else {
                        reader.readAsText(file);
                    }
                }
            }

            alert(`✅ تم رفع ${files.length} ملف(ات) بنجاح!`);
            currentTargetFolderId = null;
        }

        function findNodeById(nodes, id) {
            for (let n of nodes) {
                if (n.id === id) return n;
                if (n.children) {
                    const found = findNodeById(n.children, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function findParentNode(nodes, id, parent = null) {
            for (let n of nodes) {
                if (n.id === id) return parent;
                if (n.children) {
                    const found = findParentNode(n.children, id, n);
                    if (found) return found;
                }
            }
            return null;
        }

        function deleteNode(nodes, id) {
            for (let i = 0; i < nodes.length; i++) {
                if (nodes[i].id === id) { nodes.splice(i, 1); return true; }
                if (nodes[i].children && deleteNode(nodes[i].children, id)) return true;
            }
            return false;
        }

        function renameNode(node) {
            const newName = prompt("أدخل الاسم الجديد (مع الامتداد):", node.name);
            if (newName && newName.trim() !== "") {
                node.name = newName.trim();
                if (node.type === 'file') {
                    let ext = node.name.split('.').pop().toLowerCase();
                    const allowedExts = ['html', 'css', 'js', 'ts', 'py', 'php', 'txt', 'json', 'md', 'sql', 'xml', 'java',
                        'c', 'cpp', 'cs', 'go', 'rs', 'image', 'video', 'audio'
                    ];
                    if (!allowedExts.includes(ext)) ext = 'txt';
                    node.fileType = ext;
                }
                saveProject();
                renderFileExplorer();
                if (currentOpenFile && currentOpenFile.id === node.id) {
                    document.getElementById('currentFileNameDisplay').textContent = node.name;
                    document.getElementById('breadcrumbCurrent').textContent = node.name;
                    openFile(node);
                }
            }
        }

        function copyNode(nodeId) {
            const node = findNodeById(fileSystem, nodeId);
            if (!node) return alert("العنصر غير موجود!");

            const nodeCopy = JSON.parse(JSON.stringify(node));

            function generateNewIds(item) {
                item.id = (item.type === 'folder' ? 'folder_' : 'file_') + Date.now() + '_' + Math.random().toString(36)
                    .substr(2, 5);
                if (item.children) item.children.forEach(generateNewIds);
            }
            generateNewIds(nodeCopy);

            let ext = "";
            if (nodeCopy.type === 'file') {
                let parts = node.name.split('.');
                if (parts.length > 1) ext = "." + parts.pop();
                nodeCopy.name = parts.join('.') + " - نسخة" + ext;
            } else {
                nodeCopy.name = node.name + " - نسخة";
            }

            const parent = findParentNode(fileSystem, nodeId);
            if (parent) parent.children.push(nodeCopy);
            else fileSystem.push(nodeCopy);

            saveProject();
            renderFileExplorer();
        }

        function addFileToFolder(folderNode) {
            const name = prompt(`أدخل اسم الملف الجديد داخل "${folderNode.name}":`);
            if (!name) return;
            let ext = name.split('.').pop().toLowerCase();
            const allowedExts = ['html', 'css', 'js', 'ts', 'py', 'php', 'txt', 'json', 'md', 'sql', 'xml', 'java', 'c',
                'cpp', 'cs', 'go', 'rs'
            ];
            if (!allowedExts.includes(ext)) ext = 'txt';
            const newFile = { id: 'file_' + Date.now(), name, type: 'file', fileType: ext, content: "" };
            if (!folderNode.children) folderNode.children = [];
            folderNode.children.push(newFile);
            folderNode.isOpen = true;
            saveProject();
            renderFileExplorer();
            openFile(newFile);
        }

        function addFolderToFolder(folderNode) {
            const name = prompt(`أدخل اسم المجلد الجديد داخل "${folderNode.name}":`);
            if (!name) return;
            if (!folderNode.children) folderNode.children = [];
            folderNode.children.push({ id: 'folder_' + Date.now(), name, type: 'folder', isOpen: true, children: [] });
            folderNode.isOpen = true;
            saveProject();
            renderFileExplorer();
        }

        // ==========================================
        // 5. فتح وإدارة الملفات
        // ==========================================
        function openFile(fileNode) {

            document.getElementById('currentFileNameDisplay').textContent = fileNode.name;

                js: "javascript",
                ts: "text/typescript",
                json: "application/json",
                py: "python",
                php: "application/x-httpd-php",
                md: "markdown",
                sql: "sql",
                xml: "xml",
                java: "text/x-java",
                c: "text/x-csrc",

        function openDefaultFirstFile() {
            if (fileSystem.length > 0 && fileSystem[0].children && fileSystem[0].children.length > 0) {
                openFile(fileSystem[0].children[0]);

        // ==========================================
        // 6. رفع الملفات
        // ==========================================
        function handleGlobalFileUpload(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            const targetFolderId = currentTargetFolderId;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const ext = file.name.split('.').pop().toLowerCase();
                let fileType = 'txt';
                let isBinaryMedia = false;

                if (file.type.startsWith('image/')) {
                    fileType = 'image';
                    isBinaryMedia = true;
                } else if (file.type.startsWith('video/')) {
                    fileType = 'video';
                    isBinaryMedia = true;
                } else if (file.type.startsWith('audio/')) {
                    fileType = 'audio';
                    isBinaryMedia = true;
                } else {
                    const allowedExts = ['html', 'css', 'js', 'ts', 'py', 'php', 'txt', 'json', 'md', 'sql', 'xml', 'java',
                        'c', 'cpp', 'cs', 'go', 'rs'
                    ];
                    if (allowedExts.includes(ext)) {
                        fileType = ext;
                    } else {
                        fileType = 'txt';
                    }
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    const newFile = {
                        id: (isBinaryMedia ? 'media_' : 'file_') + Date.now() + '_' + Math.random().toString(36)
                        .substring(2, 8),
                        name: file.name,
                        type: 'file',
                        fileType: fileType,
                        content: e.target.result
                    };

                    if (targetFolderId) {
                        let insertSuccess = findAndAddMediaToFolder(fileSystem, targetFolderId, newFile);
                        if (!insertSuccess) fileSystem.push(newFile);
                    } else {
                        fileSystem.push(newFile);
                    }

                    saveProject();
                    renderFileExplorer();

                    if (i === files.length - 1) {
                        openFile(newFile);
                    }
                };

                if (isBinaryMedia) {
                    reader.readAsDataURL(file);
                } else {
                    reader.readAsText(file);
                }
            }

            currentTargetFolderId = null;
            event.target.value = '';
        }

        function findAndAddMediaToFolder(nodes, folderId, newFile) {
            for (let i = 0; i < nodes.length; i++) {
                if (nodes[i].id === folderId && nodes[i].type === 'folder') {
                    if (!nodes[i].children) nodes[i].children = [];
                    nodes[i].children.push(newFile);
                    nodes[i].isOpen = true;
                    return true;
                }
                if (nodes[i].children) {
                    let found = findAndAddMediaToFolder(nodes[i].children, folderId, newFile);
                    if (found) { nodes[i].isOpen = true; return true; }
                }
            }
            return false;
        }

            localStorage.setItem('savedProject', JSON.stringify(fileSystem));
        }

        // ==========================================
        // 8. تنسيق الكود
        // ==========================================
        function formatCurrentCode() {
            if (!editor) return;
            const code = editor.getValue();
            const mode = editor.getOption("mode");
            let formattedCode = code;

            try {
                if (mode === "htmlmixed" || mode === "xml" || (typeof mode === "object" && mode.name === "htmlmixed")) {
                    formattedCode = html_beautify(code, { indent_size: 4, wrap_line_length: 0 });
                } else if (mode === "css") {
                    formattedCode = css_beautify(code, { indent_size: 4 });
                } else if (mode === "javascript" || mode === "application/json" || mode === "text/typescript") {
                    formattedCode = js_beautify(code, { indent_size: 4 });
                } else {
                    editor.operation(() => {
                        for (let i = 0; i < editor.lineCount(); i++) {
                            editor.indentLine(i, "smart");
                        }
                    });
                    return;
                }
                editor.setValue(formattedCode);
            } catch (e) {
                console.error("خطأ في التنسيق:", e);
            }
        }

        // ==========================================
        // 9. المعاينة - الوظيفة الأساسية المعدلة
        // ==========================================
        function togglePreview() {
            const panel = document.getElementById('previewPanel');
            const icon = document.getElementById('previewToggleIcon');
            
            // إذا كانت المعاينة مفتوحة، نغلقها
            if (isPreviewOpen) {
                closePreview();
                return;
            }
            
            // فتح المعاينة
            openPreview();
        }

        function openPreview() {
            const panel = document.getElementById('previewPanel');
            const icon = document.getElementById('previewToggleIcon');
            
            panel.classList.add('active');
            isPreviewOpen = true;
            icon.className = 'fas fa-eye-slash';
            
            // تحديث المعاينة
            updatePreview();
        }

        function closePreview() {
            const panel = document.getElementById('previewPanel');
            const icon = document.getElementById('previewToggleIcon');
            
            panel.classList.remove('active');
            isPreviewOpen = false;
            icon.className = 'fas fa-eye';
            
            // إزالة أي عناصر معاينة سابقة (صور، فيديو، صوت)
            const container = document.querySelector('.preview-panel');
            container.querySelectorAll('.preview-image, .preview-video, .preview-audio').forEach(el => el.remove());

            // إعادة ظهور المحرر
            const wrapper = document.querySelector('.CodeMirror');
            if (wrapper) wrapper.style.display = 'block';
        }

        function updatePreview() {
            if (!isPreviewOpen) return;
            
            // التحقق من وجود ملف مفتوح
            if (!currentOpenFile) {
                document.getElementById('previewFrame').srcdoc = '<h3 style="color:#666;text-align:center;padding:40px;">لا يوجد ملف مفتوح</h3>';
                return;
            }

            const ext = currentOpenFile.fileType;
            
            // إذا كان الملف وسائط (صورة، فيديو، صوت) - تم معالجته في openFile
            if (['image', 'video', 'audio'].includes(ext)) {
                return;
            }

            // إذا كان ملف كود، نقوم بتجميعه وعرضه
            const completeOutput = compileVirtualProject();
            if (!completeOutput) {
                document.getElementById('previewFrame').srcdoc = '<h3 style="color:#666;text-align:center;padding:40px;">لا يوجد ملف HTML لعرضه</h3>';
                return;
            }

            const previewFrame = document.getElementById('previewFrame');
            previewFrame.style.display = 'block';
            
            // إزالة أي عناصر معاينة سابقة
            const container = document.querySelector('.preview-panel');
            container.querySelectorAll('.preview-image, .preview-video, .preview-audio').forEach(el => el.remove());
            
            // عرض الكود في الإطار
            previewFrame.srcdoc = completeOutput;
        }

        // ==========================================
        // 10. تجميع المشروع الافتراضي
        // ==========================================
        function getAllFilesFlat(nodes, map = {}) {
            nodes.forEach(node => {
                if (node.type === 'file') map[node.name] = node;
                else if (node.children) getAllFilesFlat(node.children, map);
            });
            return map;
        }

        function compileSpecificHtml(htmlFileNode, allFilesMap, processedFiles = new Set()) {
            if (processedFiles.has(htmlFileNode.name)) return "#";
            processedFiles.add(htmlFileNode.name);

            let compiledHtml = htmlFileNode.content;

            // دمج JS
            compiledHtml = compiledHtml.replace(/<script\s+[^>]*src=["']([^"']+)["'][^>]*>[\s\S]*?<\/script>/gi, (match, p1) => {
                const filename = p1.split('/').pop();
                if (allFilesMap[filename] && (allFilesMap[filename].fileType === 'js' || allFilesMap[filename]
                        .fileType === 'ts')) {
                    return `<script>\n${allFilesMap[filename].content}\n<\/script>`;
                }
                return match;
            });

            // دمج CSS
            compiledHtml = compiledHtml.replace(/<link\s+[^>]*href=["']([^"']+)["'][^>]*>/gi, (match, p1) => {
                const filename = p1.split('/').pop();
                if (allFilesMap[filename] && allFilesMap[filename].fileType === 'css') {
                    return `<style>\n${allFilesMap[filename].content}\n<\/style>`;
                }
                return match;
            });

            // معالجة الوسائط
            compiledHtml = compiledHtml.replace(/src=["']([^"']+)["']/gi, (match, p1) => {
                const filename = p1.split('/').pop();
                if (allFilesMap[filename]) {
                    const file = allFilesMap[filename];
                    if (file.fileType === 'image' || file.fileType === 'video' || file.fileType === 'audio') {
                        return `src="${file.content}"`;
                    }
                }
                return match;
            });

            return compiledHtml;
        }

        function compileVirtualProject() {
            const allFilesMap = getAllFilesFlat(fileSystem);
            let activeHtmlFile = null;

            if (currentOpenFile && currentOpenFile.fileType === 'html') {
                activeHtmlFile = currentOpenFile;
            } else {
                activeHtmlFile = allFilesMap['index.html'] || Object.values(allFilesMap).find(f => f.fileType === 'html');
            }

            if (!activeHtmlFile) return null;
            return compileSpecificHtml(activeHtmlFile, allFilesMap);
        }

        function renderMinimap() {
            const canvas = document.getElementById('minimapCanvas');
            const container = document.getElementById('minimapContainer');
            canvas.width = container.clientWidth || 50;
            canvas.height = container.clientHeight || 200;
            updateMinimap();

        function updateMinimap() {
            if (!isMinimapOpen) return;
            
            const canvas = document.getElementById('minimapCanvas');
            const ctx = canvas.getContext('2d');
            const content = editor.getValue();
            const lines = content.split('\n');
            const totalLines = lines.length;
            const height = canvas.height;
            const lineHeight = Math.max(1, height / totalLines);

            ctx.fillStyle = '#1e1e1e';
            ctx.fillRect(0, 0, canvas.width, height);

            ctx.fillStyle = '#3a3a3a';
            for (let i = 0; i < totalLines; i++) {
                const y = i * lineHeight;
                const lineLength = Math.min(lines[i].length / 80, 1);
                ctx.fillRect(0, y, canvas.width * lineLength, Math.max(1, lineHeight - 1));
            }

            const cursor = editor.getCursor();
            const cursorY = cursor.line * lineHeight;
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fillRect(0, cursorY, canvas.width, lineHeight);

            requestAnimationFrame(updateMinimap);
        }

        function addLibrary(name) {
            const libraries = {
                bootstrap: {
                    css: 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css',
                    js: 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js'
                },
                tailwind: {
                    css: 'https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css'
                },
                fontawesome: {
                    css: 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css'
                },
                jquery: {
                    js: 'https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js'
                },
                chartjs: {
                    js: 'https://cdn.jsdelivr.net/npm/chart.js'
                },
                threejs: {
                    js: 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js'
                }
            };

            const lib = libraries[name];
            if (!lib) return;

            let htmlContent = '';
            if (lib.css) {
                htmlContent += `<link rel="stylesheet" href="${lib.css}">\n`;
            }
            if (lib.js) {
                htmlContent += `<script src="${lib.js}"><\/script>\n`;
            }

            if (currentOpenFile && currentOpenFile.fileType === 'html') {
                const currentContent = editor.getValue();
                const headMatch = currentContent.match(/<head>([\s\S]*?)<\/head>/);
                if (headMatch) {
                    const newHead = headMatch[1] + '\n    ' + htmlContent;
                    const newContent = currentContent.replace(/<head>[\s\S]*?<\/head>/, `<head>${newHead}</head>`);
                    editor.setValue(newContent);
                } else {
                    const newContent = currentContent.replace('<html>', `<html>\n<head>\n${htmlContent}</head>`);
                    editor.setValue(newContent);
                }
                alert(`✅ تم إضافة ${name} إلى المشروع!`);
            } else {
                alert(`⚠️ يرجى فتح ملف HTML لإضافة المكتبات.`);
            }
        }

        // ==========================================
        // 21. تصدير ZIP
        // ==========================================
        function downloadProjectAsZip() {
            const zip = new JSZip();

            function addToZip(nodes, currentFolder) {
                nodes.forEach(node => {
                    if (node.type === 'file') {
                        if (node.content.startsWith('data:')) {
                            const data = node.content.split(',')[1];
                            currentFolder.file(node.name, data, { base64: true });
                        } else {
                            currentFolder.file(node.name, node.content);
                        }
                    } else {
                        const folder = currentFolder.folder(node.name);
                        addToZip(node.children || [], folder);
                    }
                });
            }
            addToZip(fileSystem, zip);
            zip.generateAsync({ type: "blob" }).then(function(content) {
                saveAs(content, "ButSeven_Project.zip");
            });
        }

async function exportToCommunityProjects() {
    const token = localStorage.getItem('token');
    const author = localStorage.getItem('currentUser');
    if (!token || !author) {
        alert("خطأ: يجب تسجيل الدخول أولاً لنشر المشاريع.");
        return;
    }

    // تجميع المشروع
    const finalBundle = compileVirtualProject();
    if (!finalBundle) {
        alert("خطأ: لا يوجد ملف HTML صالح لتجميعه ونشره.");
        return;
    }

    // جمع جميع ملفات المشروع
    const allFilesMap = getAllFilesFlat(fileSystem);
    const files = {};
    for (let [name, file] of Object.entries(allFilesMap)) {
        files[name] = {
            content: file.content,
            type: file.fileType
        };
    }

    const publishedProjectId = localStorage.getItem('currentPublishedProjectId');
    let isUpdate = false;

    if (publishedProjectId) {
        const userChoice = confirm(
            "هذا المشروع مرتبط بمشروع قمت بنشره مسبقاً.\n\n- اضغط 'موافق' (OK) لتحديث المشروع الحالي.\n- اضغط 'إلغاء' (Cancel) لنشره كمشروع جديد.");
        if (userChoice) {
            isUpdate = true;
        } else {
            const confirmNew = confirm("سيتم فك الارتباط ونشر هذا الكود كمشروع جديد. هل أنت متأكد؟");
            if (!confirmNew) return;
            isUpdate = false;
            localStorage.removeItem('currentPublishedProjectId');
        }
    }

    let title = "", description = "";
    if (!isUpdate) {
        title = prompt("أدخل عنواناً للمشروع:");
        if (!title || title.trim() === "") return;
        description = prompt("أدخل وصفاً مبسطاً للمشروع:") || "لا يوجد وصف متوفر.";
    }

    try {
        let url = 'https://my-backend-api-bntd.onrender.com/api/projects';
        let method = 'POST';
        let payload = {
            html: finalBundle,
            css: "",
            js: "",
            files: files
        };

        if (isUpdate) {
            url = `https://my-backend-api-bntd.onrender.com/api/projects/${publishedProjectId}`;
            method = 'PUT';
        } else {
            payload.title = title.trim();
            payload.description = description.trim();
            payload.author = author;
        }

        const response = await fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json().catch(() => ({}));

        if (response.ok) {
            let projectId = null;
            
            if (!isUpdate) {
                projectId = (data.project && data.project._id) || data._id || 
                           (data.project && data.project.id) || data.id;
                if (projectId) {
                    localStorage.setItem('currentPublishedProjectId', projectId);
                }
            } else {
                projectId = publishedProjectId;
            }

            // ===== التصحيح الأساسي: حفظ المشروع في codeProjects =====
            // 1. جلب المشاريع الحالية من localStorage
            let allProjects = [];
            try {
                allProjects = JSON.parse(localStorage.getItem('codeProjects')) || [];
            } catch(e) {
                allProjects = [];
            }
            
            // 2. إنشاء كائن المشروع الكامل
            const newProject = {
                id: projectId,
                title: isUpdate ? title : title.trim(),
                description: isUpdate ? description : description.trim(),
                author: author,
                htmlCode: finalBundle,
                html: finalBundle,
                css: "",
                js: "",
                files: files,
                views: 0,
                likes: [],
                comments: [],
                ratings: [],
                timestamp: Date.now(),
                createdAt: new Date().toISOString()
            };

            // 3. حفظ أو تحديث المشروع
            if (isUpdate) {
                const index = allProjects.findIndex(p => p.id === projectId);
                if (index !== -1) {
                    // تحديث المشروع الموجود
                    allProjects[index] = { ...allProjects[index], ...newProject };
                    console.log('✅ تم تحديث المشروع في localStorage:', newProject.title);
                } else {
                    // إضافة إذا لم يكن موجوداً
                    allProjects.push(newProject);
                    console.log('✅ تم إضافة المشروع إلى localStorage:', newProject.title);
                }
            } else {
                // إضافة مشروع جديد
                allProjects.push(newProject);
                console.log('✅ تم إضافة مشروع جديد إلى localStorage:', newProject.title);
            }
            
            // 4. حفظ في localStorage
            localStorage.setItem('codeProjects', JSON.stringify(allProjects));
            console.log('📦 عدد المشاريع في localStorage:', allProjects.length);
            
            // 5. أيضاً حفظ نسخة منفصلة للمشروع الحالي للتأكد
            localStorage.setItem('lastPublishedProject', JSON.stringify(newProject));

            alert(isUpdate ? "✅ تم تحديث مشروعك بنجاح!" : "🎉 تم نشر مشروعك بنجاح!");

            // التوجيه مع معلمة تحديث
            setTimeout(() => {
                window.location.href = "index.html?refresh=" + Date.now() + "&projectId=" + projectId;
            }, 500);
            
        } else {
            if (response.status === 404 || data.msg === "The project does not exist.") {
                localStorage.removeItem('currentPublishedProjectId');
                alert("⚠️ هذا المشروع لم يعد موجوداً. يرجى النشر مرة أخرى.");
            } else {
                alert("حدث خطأ: " + (data.msg || data.message || "فشل العملية"));
            }
        }
    } catch (error) {
        console.error(error);
        alert("فشل الاتصال بالسيرفر. يرجى التأكد من اتصالك بالإنترنت.");
    }
}
