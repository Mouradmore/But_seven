<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>مكتبة الأكواد والملفات | But_Seven_7</title>
    <style>
        /* الأنماط الأساسية الموحدة */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
            direction: rtl;
            text-align: right;
        }

        header {
            background-color: #fff;
            color: #666;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            text-align: center;
        }

        header .logo {
            margin: 0;
            font-size: 1.5rem;
            color: #666;
            font-weight: bold;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
        }

        /* أدوات الرفع والتحكم */
        .toolbar {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .toolbar h2 { 
            margin-right: 30px;
            color: #666; }

        .upload-btn-wrapper {
            position: relative;
     margin-right: 80px;
            overflow: hidden;
            display: inline-block;
            
        }

        .btn-upload {
       width: 100%;
            border: 2px dashed #888;
            color: #007bff;
            background-color: #f8f9fa;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-btn-wrapper:hover .btn-upload {
            background-color: #fff;
            color: #007bff;
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            height: 100%;
        }

        /* شبكة الملفات */
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .file-card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
            border-top: 4px solid #007bff;
        }

        .file-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .file-icon {
            font-size: 2.5rem;
            color: #6c757d;
            margin-bottom: 15px;
            text-align: center;
        }

        .file-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 5px;
            word-break: break-all;
            text-align: center;
        }

        .file-meta {
            font-size: 0.85rem;
            color: #888;
            text-align: center;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .file-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
            transition: background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .btn-view { background-color: #17a2b8; }
        .btn-view:hover { background-color: #138496; }
        
        .btn-download { background-color: #28a745; }
        .btn-download:hover { background-color: #218838; }

        .btn-delete { background-color: #dc3545; }
        .btn-delete:hover { background-color: #c82333; }

        /* النافذة المنبثقة (Modal) لعرض الكود */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #282a36; /* لون متوافق مع محررات الأكواد */
            margin: auto;
            padding: 0;
            border-radius: 8px;
            width: 90%;
            max-width: 800px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            padding: 15px 20px;
            background-color: #1e1f29;
            color: #f8f8f2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }

        .modal-header h3 { margin: 0; font-size: 1.2rem; }
        
        .close-modal {
            color: #ff5555;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }
        .close-modal:hover { color: #ff9999; }

        .modal-body {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
        }

        pre {
            margin: 0;
            color: #f8f8f2;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            direction: ltr; /* اتجاه الأكواد من اليسار لليمين دائماً */
            text-align: left;
        }

        /* رسالة حالة فارغة */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: #777;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        /* تنسيق زر المعاينة الجديد */
.btn-preview {
    background-color: #28a745; /* اللون الأخضر للمعاينة */
    color: #fff;
    border: none;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.9rem;

}

.btn-preview:hover {
    background-color: #218838;

/* --- تنسيقات نافذة المعاينة المدمجة --- */
.preview-modal {
    display: none; /* مخفية افتراضياً */

    z-index: 2000; /* لتكون فوق كل شيء */
    left: 0px; 
    top: 0; 
    width: 100%; 
    height: 100%; 
    background-color: #fff; 
    flex-direction: column;
}

.preview-modal.show {
    display: flex;
}

.preview-header {
    background-color: #f8f9fa;
    padding: 10px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #ddd;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.preview-header h3 {
    margin: 0;
    font-size: 1.1rem;
    color: #333;
}

.close-preview-btn {
    background-color: #dc3545;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 5px;
}

.close-preview-btn:hover {
    background-color: #c82333;
}

.preview-iframe {
    width: 100%;
    flex: 1; /* ليأخذ الطول الكامل المتبقي من الشاشة */
    border: none;
    background-color: #fff;
}
    </style>
</head>

<script>
    // ==========================================
// 1. المتغيرات الأساسية والإعدادات
// ==========================================
const fileInput = document.getElementById('fileInput');
const filesContainer = document.getElementById('filesContainer');
const codeModal = document.getElementById('codeModal');
const codeContent = document.getElementById('codeContent');
const modalFileName = document.getElementById('modalFileName');

// استدعاء البيانات من localStorage
let libraryFiles = JSON.parse(localStorage.getItem('libraryFiles')) || [];
let currentFolderId = null; // تتبع المجلد الحالي (null يعني الروت الرئيسي)

// دالة لمعرفة المستخدم المسجل حالياً (مرتبطة بـ index.html)
function getCurrentUser() {
    return localStorage.getItem('currentUser') || 'Visitor';
}

document.addEventListener('DOMContentLoaded', renderFiles);

// ==========================================
// 2. إدارة المجلدات (Folders)
// ==========================================
window.createFolder = function() {
    const folderName = prompt("أدخل اسم المجلد الجديد:");
    if (folderName && folderName.trim() !== "") {
        const newFolder = {
            id: Date.now().toString(),
            name: folderName,
            type: 'folder',
            parentId: currentFolderId,
            date: new Date().toLocaleDateString('ar-EG'),
            author: getCurrentUser() // 👈 تسجيل المالك
        };
        libraryFiles.push(newFolder);
        localStorage.setItem('libraryFiles', JSON.stringify(libraryFiles));
        renderFiles();
    }
};

window.openFolder = function(id) {
    currentFolderId = id;
    renderFiles();
};

window.goBack = function() {
    const currentFolder = libraryFiles.find(f => f.id === currentFolderId);
    currentFolderId = currentFolder ? currentFolder.parentId : null;
    renderFiles();
};

// ==========================================
// 3. رفع الملفات (Upload)
// ==========================================
fileInput.addEventListener('change', function(event) {
    const files = event.target.files;
    if (files.length === 0) return;
    
    let filesProcessed = 0;
    
    Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const newFile = {
                id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                name: file.name,
                size: (file.size / 1024).toFixed(2) + ' KB',
                type: file.type || 'text/plain',
                parentId: currentFolderId, // ربط الملف بالمجلد الحالي
                content: e.target.result,
                date: new Date().toLocaleDateString('ar-EG'),
                author: getCurrentUser() // 👈 تسجيل المالك
            };
            libraryFiles.push(newFile);
            filesProcessed++;
            
            // تحديث الواجهة عند اكتمال قراءة جميع الملفات
            if (filesProcessed === files.length) {
                localStorage.setItem('libraryFiles', JSON.stringify(libraryFiles));
                renderFiles();
                fileInput.value = '';
                alert('تم رفع الملفات بنجاح للمكتبة!');
            }
        };
        reader.readAsText(file);
    });
});

// ==========================================
// 4. بناء واجهة العرض (Render) مع نظام الحماية
// ==========================================
function renderFiles() {
    filesContainer.innerHTML = '';
    
    // عرض زر العودة إذا كنا داخل مجلد
    if (currentFolderId !== null) {
        const backBtn = document.createElement('div');
        backBtn.className = 'file-card';
        backBtn.style.cursor = 'pointer';
        backBtn.style.border = '1px solid #ccc';
        backBtn.innerHTML = `<div class="file-icon"><i class="fas fa-arrow-right" style="color: #666;"></i></div><div class="file-name">رجوع للخلف</div>`;
        backBtn.onclick = goBack;
        filesContainer.appendChild(backBtn);
    }
    
    const currentUser = getCurrentUser();
    const filteredFiles = libraryFiles.filter(f => f.parentId === currentFolderId);
    
    if (filteredFiles.length === 0 && currentFolderId === null) {
        filesContainer.innerHTML = `<div class="empty-state"><h3>المكتبة فارغة</h3><p>ارفع ملفاتك البرمجية لتخزينها.</p></div>`;
        return;
    }
    
    // ترتيب الملفات من الأحدث للأقدم
    filteredFiles.slice().reverse().forEach(item => {
        let iconClass = 'fa-file-code';
        if (item.name && item.name.endsWith('.html')) iconClass = 'fa-html5';
        else if (item.name && item.name.endsWith('.css')) iconClass = 'fa-css3-alt';
        else if (item.name && item.name.endsWith('.js')) iconClass = 'fa-js-square';
        
        const card = document.createElement('div');
        card.className = 'file-card';
        
        // 💡 التحقق من الملكية: إذا كان المستخدم الحالي هو المالك (أو كان مسجلاً كـ Visitor قديماً)
        const isOwner = (item.author === currentUser || !item.author || item.author === 'Visitor');
        
        // تجهيز زر الحذف فقط إذا كان المستخدم هو المالك
        let deleteBtnHTML = isOwner ? `
                <button class="btn-delete" onclick="deleteFile('${item.id}')" title="حذف">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22,4H17V2a2,2,0,0,0-2-2H9A2,2,0,0,0,7,2V4H2V6H4V21a3,3,0,0,0,3,3H17a3,3,0,0,0,3-3V6h2ZM9,2h6V4H9Zm9,19a1,1,0,0,1-1,1H7a1,1,0,0,1-1-1V6H18Z" fill="#fff"/><rect x="9" y="10" width="2" height="8" fill="#fff"/><rect x="13" y="10" width="2" height="8" fill="#fff"/></svg>
                </button>` : '';
        
        if (item.type === 'folder') {
            card.innerHTML = `
                        <div class="file-icon" onclick="openFolder('${item.id}')"><i class="fas fa-folder" style="color: #ffc107; font-size: 40px; cursor: pointer;"></i></div>
                        <div class="file-name">${item.name}</div>
                        ${isOwner 
                            ? `<button class="btn-delete" onclick="deleteFile('${item.id}')" style="margin-top:15px; width:100%; border:none; padding:8px; border-radius:5px; background:#dc3545; color:white; cursor:pointer;">حذف المجلد</button>` 
                            : `<div style="margin-top:15px; text-align:center; color:#999; font-size:0.85rem; font-weight:bold;">بواسطة: ${item.author}</div>`
                        }`;
        } else {
            card.innerHTML = `
                        <div class="file-icon"><i class="${iconClass.includes('fa-') && iconClass !== 'fa-file-code' ? 'fab' : 'fas'} ${iconClass}" style="color: #007bff; font-size: 30px;"></i></div>
                        <div class="file-name" title="${item.name}">${item.name.length > 20 ? item.name.substring(0, 20) + '...' : item.name}</div>
                        <div class="file-meta">
                            <span><i class="fas fa-weight-hanging"></i> ${item.size}</span> <br>
                            <span><i class="far fa-calendar-alt"></i> ${item.date}</span> <br>
                            <span style="color:#007bff; font-weight:bold;">✍️ ${item.author || 'Visitor'}</span>
                        </div>
                        <div class="file-actions" style="margin-top: 15px;">
                            <button class="btn-view" onclick="viewCode('${item.id}')" title="عرض">
                                <svg viewBox="0 0 24 24" width="20" height="20"><path d="m15.941,8c.036-.329.059-.662.059-1s-.022-.671-.059-1h1.559c.534,0,1.034.13,1.485.347-.678.256-1.304.644-1.831,1.171l-.482.482h-.731Zm3.059,14H5v-6.231c-.702-.16-1.371-.403-2-.716v8.947h18v-5.672l-2,2v1.672Zm4.068-8.568l-6.569,6.568h-4.5v-4.5l6.568-6.568c1.24-1.24,3.259-1.24,4.5,0,1.24,1.24,1.24,3.26,0,4.5Zm-1.415-3.086c-.46-.461-1.21-.461-1.671,0l-5.982,5.982v1.672h1.671l5.982-5.982c.46-.461.46-1.211,0-1.672Zm-14.653,3.654c-3.86,0-7-3.141-7-7S3.14,0,7,0s7,3.141,7,7-3.14,7-7,7Zm0-2c2.757,0,5-2.243,5-5s-2.243-5-5-5S2,4.243,2,7s2.243,5,5,5Zm3.992-5.882l-1.402-1.426-3.229,3.175-1.63-1.58-1.393,1.436,1.846,1.789c.315.315.733.488,1.179.488s.864-.174,1.172-.482l3.457-3.399Z" fill="#fff"/></svg>
                            </button>
                            <button class="btn-preview" onclick="previewFile('${item.id}')" title="معاينة">
                                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M20.494,7.968l-9.54-7A5,5,0,0,0,3,5V19a5,5,0,0,0,7.957,4.031l9.54-7a5,5,0,0,0,0-8.064Zm-1.184,6.45-9.54,7A3,3,0,0,1,5,19V5A2.948,2.948,0,0,1,6.641,2.328,3.018,3.018,0,0,1,8.006,2a2.97,2.97,0,0,1,1.764.589l9.54,7a3,3,0,0,1,0,4.836Z" fill="#fff"/></svg>
                            </button>
                            <button class="btn-download" onclick="downloadFile('${item.id}')" title="تحميل">
                                <svg viewBox="0 0 24 24" width="20" height="20"><path d="M9.878,18.122a3,3,0,0,0,4.244,0l3.211-3.211A1,1,0,0,0,15.919,13.5l-2.926,2.927L13,1a1,1,0,0,0-1-1h0a1,1,0,0,0-1,1l-.009,15.408L8.081,13.5a1,1,0,0,0-1.414,1.415Z" fill="#fff"/><path d="M23,16h0a1,1,0,0,0-1,1v4a1,1,0,0,1-1,1H3a1,1,0,0,1-1-1V17a1,1,0,0,0-1-1H1a1,1,0,0,0-1,1v4a3,3,0,0,0,3,3H21a3,3,0,0,0,3-3V17A1,1,0,0,0,23,16Z" fill="#fff"/></svg>
                            </button>
                            ${deleteBtnHTML}
                        </div>`;
        }
        filesContainer.appendChild(card);
    });
}

// ==========================================
// 5. دوال الإجراءات (عرض، معاينة، تحميل، حذف)
// ==========================================
window.viewCode = function(id) {
    const file = libraryFiles.find(f => f.id === id);
    if (file) {
        modalFileName.textContent = file.name;
        codeContent.textContent = file.content;
        codeModal.style.display = 'flex';
    }
};

window.downloadFile = function(id) {
    const file = libraryFiles.find(f => f.id === id);
    if (file) {
        const blob = new Blob([file.content], { type: file.type });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }, 0);
    }
};

window.previewFile = function(id) {
    const file = libraryFiles.find(f => f.id === id);
    if (file) {
        const blob = new Blob([file.content], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        window.open(url, '_blank');
        setTimeout(() => { URL.revokeObjectURL(url); }, 1000);
    }
};

window.deleteFile = function(id) {
    const fileToDelete = libraryFiles.find(f => f.id === id);
    const currentUser = getCurrentUser();
    
    // حماية إضافية في حال تم تجاوز الواجهة: منع الحذف لغير المالك
    if (fileToDelete.author && fileToDelete.author !== currentUser && fileToDelete.author !== 'Visitor') {
        alert('عذراً، لا تملك صلاحية لحذف هذا الملف. المالك فقط يمكنه حذفه.');
        return;
    }
    
    if (confirm('هل أنت متأكد من رغبتك في الحذف؟')) {
        const isFolder = fileToDelete?.type === 'folder';
        if (isFolder) {
            libraryFiles = libraryFiles.filter(f => f.id !== id && f.parentId !== id);
        } else {
            libraryFiles = libraryFiles.filter(f => f.id !== id);
        }
        localStorage.setItem('libraryFiles', JSON.stringify(libraryFiles));
        renderFiles();
    }
};

// إغلاق نافذة عرض الكود
window.closePopup = () => codeModal.style.display = 'none';

window.onclick = function(event) {
    if (event.target === codeModal) {
        closePopup();
    }
};
</script>
