<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>مدير الملفات والمكونات | But_Seven</title>
   
    <style>
        /* ===== متغيرات الوضع الليلي ===== */
        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #f0f2f5;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #8888aa;
            --border-color: #e8ecf1;
            --shadow-color: rgba(0,0,0,0.08);
            --shadow-hover: rgba(0,0,0,0.15);
            --accent-color: #667eea;
            --accent-hover: #5a6fd6;
            --gradient-hero: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --header-bg: #ffffff;
            --header-shadow: 0 2px 20px rgba(0,0,0,0.08);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --success: #28a745;
            --danger: #dc3545;
            --warning: #f5a623;
            --info: #17a2b8;
            --sidebar-width: 260px;
        }

        [data-theme="dark"] {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #1e1e36;
            --bg-hover: #2a2a4a;
            --text-primary: #e8e8f0;
            --text-secondary: #b0b0cc;
            --text-muted: #6a6a8a;
            --border-color: #2a2a4a;
            --shadow-color: rgba(0,0,0,0.3);
            --shadow-hover: rgba(0,0,0,0.5);
            --accent-color: #7c8cf5;
            --accent-hover: #6a7ae0;
            --gradient-hero: linear-gradient(135deg, #1a1a3e 0%, #2d1b69 100%);
            --header-bg: #12122a;
            --header-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        /* ===== CSS العامة ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            direction: rtl;
            text-align: right;
            transition: all var(--transition);
            min-height: 100vh;
            display: flex;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-hover); }

        /* ===== الهيدر ===== */
        header {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            height: 56px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--header-shadow);
            transition: all var(--transition);
        }

        header .logo {
            font-weight: 800;
            font-size: 1.1rem;
            background: var(--gradient-hero);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all var(--transition);
            color: var(--text-secondary);
        }

        .theme-toggle:hover {
            transform: rotate(20deg);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .header-btn {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            padding: 4px 12px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
            text-decoration: none;
        }

        .header-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--accent-color);
        }

        .header-btn.primary {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .header-btn.primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        /* ===== الشريط الجانبي ===== */
        .sidebar-library {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            height: 100vh;
            position: fixed;
            top: 56px;
            right: 0;
            overflow-y: auto;
            padding: 16px 0;
            z-index: 100;
            transition: all var(--transition);
        }

        .sidebar-library .sidebar-title {
            padding: 0 16px 12px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 8px;
        }

        .sidebar-library .folder-item {
            padding: 6px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all var(--transition);
            border-right: 3px solid transparent;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .sidebar-library .folder-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .sidebar-library .folder-item.active {
            background: var(--bg-hover);
            color: var(--accent-color);
            border-right-color: var(--accent-color);
        }

        .sidebar-library .folder-item i {
            width: 18px;
            color: var(--text-muted);
        }

        .sidebar-library .folder-item .folder-count {
            margin-right: auto;
            font-size: 0.7rem;
            color: var(--text-muted);
            background: var(--bg-primary);
            padding: 0 8px;
            border-radius: 10px;
        }

        /* ===== المحتوى الرئيسي ===== */
        .main-content {
            flex: 1;
            margin-right: var(--sidebar-width);
            margin-top: 56px;
            padding: 20px;
            min-height: calc(100vh - 56px);
            transition: all var(--transition);
        }

        /* ===== شريط الأدوات ===== */
        .toolbar {
            background: var(--bg-card);
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px var(--shadow-color);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid var(--border-color);
        }

        .toolbar .left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .toolbar .left h2 {
            font-size: 1rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar .right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .toolbar .stats {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            gap: 16px;
        }

        .toolbar .stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .search-input {
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            transition: all var(--transition);
            min-width: 180px;
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .filter-btn {
            padding: 4px 12px;
            border: 1px solid var(--border-color);
            border-radius: 50px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            transition: all var(--transition);
        }

        .filter-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .filter-btn.active {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .view-toggle {
            display: flex;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .view-toggle button {
            padding: 4px 10px;
            border: none;
            background: var(--bg-primary);
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.8rem;
        }

        .view-toggle button:hover {
            background: var(--bg-hover);
        }

        .view-toggle button.active {
            background: var(--accent-color);
            color: #fff;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .upload-btn-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* ===== شبكة الملفات ===== */
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .files-grid.list-view {
            grid-template-columns: 1fr;
        }

        .file-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px var(--shadow-color);
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: default;
        }

        .file-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--shadow-hover);
        }

        .file-card .checkbox {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            background: var(--bg-primary);
        }

        .file-card .checkbox.checked {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: #fff;
        }

        .file-card .checkbox.checked::after {
            content: '✓';
            font-size: 12px;
            font-weight: 700;
        }

        .file-card .file-icon {
            font-size: 2rem;
            text-align: center;
            padding: 12px 0;
            color: var(--text-muted);
        }

        .file-card .file-icon img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .file-card .file-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-primary);
            text-align: center;
            word-break: break-all;
            margin-bottom: 4px;
        }

        .file-card .file-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 10px;
        }

        .file-card .file-actions {
            display: flex;
            gap: 4px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .file-card .file-actions button {
            padding: 4px 8px;
            border: none;
            border-radius: 4px;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 3px;
            color: #fff;
        }

        .file-card .file-actions button:hover {
            transform: scale(1.05);
        }

        .btn-view-code { background: var(--info); }
        .btn-preview { background: var(--success); }
        .btn-download { background: #6c757d; }
        .btn-delete { background: var(--danger); }
        .btn-edit { background: var(--warning); color: #333 !important; }
        .btn-favorite { background: #ffd700; color: #333 !important; }

        .file-card .file-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 8px;
        }

        .file-card .file-tags .tag {
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 0.55rem;
            font-weight: 600;
            background: var(--bg-primary);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        /* ===== عرض القائمة ===== */
        .files-grid.list-view .file-card {
            flex-direction: row;
            align-items: center;
            padding: 10px 16px;
            gap: 12px;
        }

        .files-grid.list-view .file-card .file-icon {
            padding: 0;
            font-size: 1.5rem;
            min-width: 40px;
        }

        .files-grid.list-view .file-card .file-name {
            text-align: right;
            flex: 1;
            margin-bottom: 0;
            font-size: 0.8rem;
        }

        .files-grid.list-view .file-card .file-meta {
            margin-bottom: 0;
            font-size: 0.65rem;
            min-width: 120px;
        }

        .files-grid.list-view .file-card .file-actions {
            flex-wrap: nowrap;
        }

        /* ===== نافذة عرض الكود ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .modal-header h3 {
            font-size: 1rem;
            color: var(--text-primary);
        }

        .modal-header .close-modal {
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: all var(--transition);
        }

        .modal-header .close-modal:hover {
            color: var(--text-primary);
            transform: rotate(90deg);
        }

        .modal-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #1e1e1e;
            border-radius: 0 0 12px 12px;
        }

        .modal-body pre {
            margin: 0;
            color: #f8f8f2;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            direction: ltr;
            text-align: left;
        }

        /* ===== نافذة المعاينة ===== */
        .preview-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            flex-direction: column;
        }

        .preview-modal.active {
            display: flex;
        }

        .preview-header {
            background: var(--bg-secondary);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .preview-header .device-btns {
            display: flex;
            gap: 4px;
        }

        .preview-header .device-btns button {
            padding: 2px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.7rem;
            transition: all var(--transition);
        }

        .preview-header .device-btns button:hover,
        .preview-header .device-btns button.active {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
        }

        .preview-iframe {
            flex: 1;
            border: none;
            background: #fff;
            width: 100%;
            transition: all 0.3s ease;
        }

        .preview-iframe.device-mobile {
            width: 375px;
            margin: 0 auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .preview-iframe.device-tablet {
            width: 768px;
            margin: 0 auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        /* ===== نافذة المفضلة ===== */
        .favorite-star {
            cursor: pointer;
            color: var(--text-muted);
            transition: all var(--transition);
            font-size: 1.1rem;
        }

        .favorite-star.active {
            color: #ffd700;
        }

        /* ===== حالة فارغة ===== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .empty-state i {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
            color: var(--text-muted);
        }

        /* ===== سلة المحذوفات ===== */
        .trash-badge {
            color: var(--danger);
        }

        /* ===== استجابة ===== */
        @media (max-width: 768px) {
            .sidebar-library {
                width: 0;
                padding: 0;
                overflow: hidden;
                border: none;
            }

            .sidebar-library.open {
                width: var(--sidebar-width);
                padding: 16px 0;
                border-left: 1px solid var(--border-color);
            }

            .main-content {
                margin-right: 0;
            }

            .main-content.sidebar-open {
                margin-right: var(--sidebar-width);
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }

            .toolbar .left,
            .toolbar .right {
                flex-wrap: wrap;
                justify-content: center;
            }

            .search-input {
                min-width: 100%;
            }

            .files-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .files-grid.list-view .file-card {
                flex-wrap: wrap;
            }

            .modal-content {
                width: 95%;
                max-height: 90vh;
            }
        }

        @media (max-width: 480px) {
            .files-grid {
                grid-template-columns: 1fr 1fr;
            }

            .toolbar .stats {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- ===== الهيدر ===== -->
    <header>
        <a href="index.html" class="logo">
            <i class="fas fa-code"></i> But_Seven
        </a>
        <div class="header-actions">
            <button class="header-btn" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i> المجلدات
            </button>
            <button class="theme-toggle" onclick="toggleTheme()" title="تبديل الوضع الليلي">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <a href="codes.html" class="header-btn primary">
                <i class="fas fa-edit"></i> المحرر
            </a>
            <a href="index.html" class="header-btn">
                <i class="fas fa-home"></i>
            </a>
        </div>
    </header>

    <!-- ===== الشريط الجانبي ===== -->
    <div class="sidebar-library" id="sidebarLibrary">
        <div class="sidebar-title"><i class="fas fa-folder"></i> المجلدات</div>
        <div class="folder-item active" onclick="filterByFolder(null)">
            <i class="fas fa-home"></i> الكل
            <span class="folder-count" id="allCount">0</span>
        </div>
        <div class="folder-item" onclick="filterByFolder('favorites')">
            <i class="fas fa-star" style="color:#ffd700;"></i> المفضلة
            <span class="folder-count" id="favCount">0</span>
        </div>
        <div class="folder-item" onclick="filterByFolder('trash')">
            <i class="fas fa-trash" style="color:var(--danger);"></i> سلة المحذوفات
            <span class="folder-count" id="trashCount">0</span>
        </div>
        <div style="border-top:1px solid var(--border-color);margin:8px 16px;"></div>
        <div id="folderList"></div>
        <div style="border-top:1px solid var(--border-color);margin:8px 16px;"></div>
        <div class="folder-item" onclick="createFolder()" style="color:var(--accent-color);">
            <i class="fas fa-folder-plus"></i> مجلد جديد
        </div>
        <div class="folder-item" onclick="createSnippet()" style="color:var(--success);">
            <i class="fas fa-puzzle-piece"></i> مقطع جديد
        </div>
    </div>

    <!-- ===== المحتوى الرئيسي ===== -->
    <div class="main-content" id="mainContent">
        <!-- ===== شريط الأدوات ===== -->
        <div class="toolbar">
            <div class="left">
                <h2><i class="fas fa-folder-open" style="color:var(--accent-color);"></i> <span id="currentFolderTitle">المكتبة</span></h2>
                <div class="stats">
                    <span><i class="fas fa-file"></i> <span id="fileCount">0</span></span>
                    <span><i class="fas fa-folder"></i> <span id="folderCount">0</span></span>
                    <span><i class="fas fa-database"></i> <span id="totalSize">0 KB</span></span>
                </div>
            </div>
            <div class="right">
                <input class="search-input" id="searchInput" placeholder="🔍 بحث..." oninput="renderFiles()">
                <div class="view-toggle">
                    <button class="active" onclick="setView('grid')" title="شبكة"><i class="fas fa-th"></i></button>
                    <button onclick="setView('list')" title="قائمة"><i class="fas fa-list"></i></button>
                </div>
                <div class="upload-btn-wrapper">
                    <button class="header-btn primary"><i class="fas fa-upload"></i> رفع</button>
                    <input type="file" id="fileInput" multiple />
                </div>
                <button class="header-btn" onclick="uploadFolder()"><i class="fas fa-folder-open"></i> مجلد</button>
            </div>
        </div>

        <!-- ===== أزرار الفلتر ===== -->
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">الكل</button>
            <button class="filter-btn" data-filter="html" onclick="setFilter('html')">HTML</button>
            <button class="filter-btn" data-filter="css" onclick="setFilter('css')">CSS</button>
            <button class="filter-btn" data-filter="javascript" onclick="setFilter('javascript')">JS</button>
            <button class="filter-btn" data-filter="json" onclick="setFilter('json')">JSON</button>
            <button class="filter-btn" data-filter="image" onclick="setFilter('image')">صور</button>
            <button class="filter-btn" data-filter="video" onclick="setFilter('video')">فيديو</button>
            <button class="filter-btn" data-filter="audio" onclick="setFilter('audio')">صوت</button>
            <button class="filter-btn" data-filter="snippet" onclick="setFilter('snippet')">مقاطع</button>
        </div>

        <!-- ===== شبكة الملفات ===== -->
        <div class="files-grid" id="filesContainer"></div>
    </div>

    <!-- ===== نافذة عرض الكود ===== -->
    <div class="modal" id="codeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalFileName">اسم الملف</h3>
                <span class="close-modal" onclick="closeCodeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <pre><code id="codeContent"></code></pre>
            </div>
        </div>
    </div>

    <!-- ===== نافذة المعاينة ===== -->
    <div class="preview-modal" id="previewModal">
        <div class="preview-header">
            <span id="previewTitle">معاينة</span>
            <div class="device-btns">
                <button class="active" data-device="desktop" onclick="setPreviewDevice('desktop')"><i class="fas fa-desktop"></i></button>
                <button data-device="tablet" onclick="setPreviewDevice('tablet')"><i class="fas fa-tablet-alt"></i></button>
                <button data-device="mobile" onclick="setPreviewDevice('mobile')"><i class="fas fa-mobile-alt"></i></button>
            </div>
            <button class="header-btn" onclick="closePreview()"><i class="fas fa-times"></i> إغلاق</button>
        </div>
        <iframe class="preview-iframe" id="previewFrame"></iframe>
    </div>

    <!-- ===== سكريبتات ===== -->
    <script>
        // ==========================================
        // 1. إدارة الوضع الليلي
        // ==========================================
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        // ==========================================
        // 2. دوال مساعدة
        // ==========================================
        function getCurrentUser() {
            return localStorage.getItem('currentUser') || 'Visitor';
        }

        function getLibraryFiles() {
            return JSON.parse(localStorage.getItem('libraryFiles')) || [];
        }

        function saveLibraryFiles(files) {
            localStorage.setItem('libraryFiles', JSON.stringify(files));
        }

        function getFileType(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const types = {
                'html': 'html',
                'css': 'css',
                'js': 'javascript',
                'json': 'json',
                'png': 'image',
                'jpg': 'image',
                'jpeg': 'image',
                'gif': 'image',
                'svg': 'image',
                'webp': 'image',
                'ico': 'image',
                'mp4': 'video',
                'webm': 'video',
                'mp3': 'audio',
                'wav': 'audio',
                'pdf': 'pdf',
                'zip': 'zip',
                'rar': 'zip',
                'md': 'markdown',
                'txt': 'text'
            };
            return types[ext] || 'file';
        }

        function getFileIcon(filename) {
            const type = getFileType(filename);
            const icons = {
                'html': '<i class="fab fa-html5" style="color:#e44d26;"></i>',
                'css': '<i class="fab fa-css3-alt" style="color:#264de4;"></i>',
                'javascript': '<i class="fab fa-js" style="color:#f7df1e;"></i>',
                'json': '<i class="fas fa-file-code"></i>',
                'image': '<i class="fas fa-image" style="color:#4CAF50;"></i>',
                'video': '<i class="fas fa-video" style="color:#9c27b0;"></i>',
                'audio': '<i class="fas fa-music" style="color:#00bcd4;"></i>',
                'pdf': '<i class="fas fa-file-pdf" style="color:#e74c3c;"></i>',
                'zip': '<i class="fas fa-file-archive" style="color:#f39c12;"></i>',
                'markdown': '<i class="fas fa-file-alt"></i>',
                'text': '<i class="fas fa-file-alt"></i>',
                'file': '<i class="fas fa-file"></i>',
                'snippet': '<i class="fas fa-puzzle-piece" style="color:#9b59b6;"></i>'
            };
            return icons[type] || icons.file;
        }

        // ==========================================
        // 3. المتغيرات العامة
        // ==========================================
        let currentFilter = 'all';
        let currentFolder = null;
        let currentView = 'grid';
        let selectedFiles = [];
        let fileInput = document.getElementById('fileInput');
        let filesContainer = document.getElementById('filesContainer');

        // ==========================================
        // 4. التهيئة
        // ==========================================
        document.addEventListener('DOMContentLoaded', function() {
            renderFiles();
            renderFolders();

            fileInput.addEventListener('change', function(e) {
                const files = e.target.files;
                if (files.length === 0) return;
                handleUpload(files);
                this.value = '';
            });
        });

        // ==========================================
        // 5. عرض الملفات
        // ==========================================
        function renderFiles() {
            let files = getLibraryFiles();
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();

            // تطبيق الفلتر حسب المجلد
            if (currentFolder === 'favorites') {
                files = files.filter(f => f.favorite);
            } else if (currentFolder === 'trash') {
                files = files.filter(f => f.trash);
            } else if (currentFolder) {
                files = files.filter(f => f.parentId === currentFolder && !f.trash);
            } else {
                files = files.filter(f => !f.parentId && !f.trash);
            }

            // تطبيق فلتر النوع
            if (currentFilter !== 'all') {
                files = files.filter(f => {
                    const type = getFileType(f.name);
                    if (currentFilter === 'snippet') return f.type === 'snippet';
                    return type === currentFilter;
                });
            }

            // تطبيق البحث
            if (searchQuery) {
                files = files.filter(f =>
                    f.name.toLowerCase().includes(searchQuery) ||
                    (f.tags && f.tags.some(t => t.toLowerCase().includes(searchQuery)))
                );
            }

            // تحديث الإحصائيات
            updateStats(files);

            // عرض الملفات
            filesContainer.innerHTML = '';
            filesContainer.className = 'files-grid' + (currentView === 'list' ? ' list-view' : '');

            if (files.length === 0) {
                filesContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>لا توجد ملفات</h3>
                        <p>ارفع ملفاتك أو أنشئ مجلدات لتنظيمها</p>
                    </div>
                `;
                return;
            }

            files.forEach(file => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.dataset.id = file.id;

                const isSelected = selectedFiles.includes(file.id);
                const isOwner = file.author === getCurrentUser() || !file.author;

                let previewContent = '';
                if (getFileType(file.name) === 'image' && file.content) {
                    previewContent = `<img src="${file.content}" style="width:100%;height:80px;object-fit:cover;border-radius:8px;">`;
                } else {
                    previewContent = getFileIcon(file.name);
                }

                const tagsHtml = file.tags ? file.tags.map(t => `<span class="tag">#${t}</span>`).join('') : '';

                card.innerHTML = `
                    <div class="checkbox ${isSelected ? 'checked' : ''}" onclick="toggleSelect('${file.id}')"></div>
                    <div class="file-icon">${previewContent}</div>
                    <div class="file-name">${file.name}</div>
                    <div class="file-tags">${tagsHtml}</div>
                    <div class="file-meta">
                        ${file.size ? `${file.size} • ` : ''}
                        ${file.date || ''}
                        ${file.author ? `• ✍️ ${file.author}` : ''}
                    </div>
                    <div class="file-actions">
                        ${file.type === 'snippet' ? `
                            <button class="btn-edit" onclick="insertSnippet('${file.id}')"><i class="fas fa-paste"></i> إدراج</button>
                        ` : `
                            <button class="btn-view-code" onclick="viewCode('${file.id}')"><i class="fas fa-code"></i></button>
                            <button class="btn-preview" onclick="previewFile('${file.id}')"><i class="fas fa-eye"></i></button>
                            <button class="btn-download" onclick="downloadFile('${file.id}')"><i class="fas fa-download"></i></button>
                        `}
                        <button class="btn-edit" onclick="renameFile('${file.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-favorite" onclick="toggleFavorite('${file.id}')">
                            <i class="fas fa-star ${file.favorite ? 'active' : ''}"></i>
                        </button>
                        ${isOwner ? `
                            <button class="btn-delete" onclick="deleteFile('${file.id}')"><i class="fas fa-trash"></i></button>
                        ` : ''}
                    </div>
                `;
                filesContainer.appendChild(card);
            });
        }

        // ==========================================
        // 6. عرض المجلدات في الشريط الجانبي
        // ==========================================
        function renderFolders() {
            const files = getLibraryFiles();
            const folders = files.filter(f => f.type === 'folder' && !f.trash);
            const container = document.getElementById('folderList');
            container.innerHTML = '';

            // تحديث العدادات
            document.getElementById('allCount').textContent = files.filter(f => !f.trash).length;
            document.getElementById('favCount').textContent = files.filter(f => f.favorite && !f.trash).length;
            document.getElementById('trashCount').textContent = files.filter(f => f.trash).length;

            folders.forEach(folder => {
                const div = document.createElement('div');
                div.className = 'folder-item' + (currentFolder === folder.id ? ' active' : '');
                div.innerHTML = `
                    <i class="fas fa-folder" style="color:#ffc107;"></i>
                    ${folder.name}
                    <span class="folder-count">${files.filter(f => f.parentId === folder.id && !f.trash).length}</span>
                `;
                div.onclick = () => filterByFolder(folder.id);
                container.appendChild(div);
            });
        }

        // ==========================================
        // 7. دوال المجلدات
        // ==========================================
        function createFolder() {
            const name = prompt('أدخل اسم المجلد الجديد:');
            if (!name || name.trim() === '') return;

            const files = getLibraryFiles();
            files.push({
                id: 'folder_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
                name: name.trim(),
                type: 'folder',
                parentId: currentFolder === 'favorites' || currentFolder === 'trash' ? null : currentFolder,
                author: getCurrentUser(),
                date: new Date().toLocaleDateString('ar-EG'),
                trash: false,
                favorite: false
            });
            saveLibraryFiles(files);
            renderFiles();
            renderFolders();
        }

        function filterByFolder(folderId) {
            currentFolder = folderId;
            document.querySelectorAll('.sidebar-library .folder-item').forEach(el => el.classList.remove('active'));
            renderFiles();
            renderFolders();

            const title = document.getElementById('currentFolderTitle');
            if (folderId === 'favorites') title.textContent = '⭐ المفضلة';
            else if (folderId === 'trash') title.textContent = '🗑️ سلة المحذوفات';
            else if (folderId) {
                const files = getLibraryFiles();
                const folder = files.find(f => f.id === folderId);
                title.textContent = folder ? folder.name : 'المكتبة';
            } else {
                title.textContent = '📁 المكتبة';
            }

            // إغلاق الشريط الجانبي في الجوال
            if (window.innerWidth <= 768) {
                toggleSidebar(false);
            }
        }

        // ==========================================
        // 8. دوال الملفات
        // ==========================================
        function handleUpload(files) {
            let processed = 0;

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const newFile = {
                        id: 'file_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
                        name: file.name,
                        size: (file.size / 1024).toFixed(2) + ' KB',
                        type: getFileType(file.name),
                        parentId: currentFolder === 'favorites' || currentFolder === 'trash' ? null : currentFolder,
                        content: e.target.result,
                        date: new Date().toLocaleDateString('ar-EG'),
                        author: getCurrentUser(),
                        trash: false,
                        favorite: false,
                        tags: []
                    };

                    const libraryFiles = getLibraryFiles();
                    libraryFiles.push(newFile);
                    saveLibraryFiles(libraryFiles);
                    processed++;

                    if (processed === files.length) {
                        renderFiles();
                        renderFolders();
                        alert('✅ تم رفع الملفات بنجاح!');
                    }
                };

                if (file.type.startsWith('image/') || file.type.startsWith('video/') || file.type.startsWith('audio/')) {
                    reader.readAsDataURL(file);
                } else {
                    reader.readAsText(file);
                }
            });
        }

        function uploadFolder() {
            const input = document.createElement('input');
            input.type = 'file';
            input.webkitdirectory = true;
            input.multiple = true;
            input.onchange = function(e) {
                if (e.target.files.length > 0) {
                    handleUpload(e.target.files);
                }
            };
            input.click();
        }

        // ==========================================
        // 9. دوال المقاطع البرمجية (Snippets)
        // ==========================================
        function createSnippet() {
            const name = prompt('أدخل اسم المقطع:');
            if (!name || name.trim() === '') return;

            const code = prompt('أدخل الكود (HTML/CSS/JS):');
            if (!code || code.trim() === '') return;

            const files = getLibraryFiles();
            files.push({
                id: 'snippet_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
                name: name.trim(),
                type: 'snippet',
                content: code,
                parentId: currentFolder === 'favorites' || currentFolder === 'trash' ? null : currentFolder,
                author: getCurrentUser(),
                date: new Date().toLocaleDateString('ar-EG'),
                trash: false,
                favorite: false,
                tags: ['snippet']
            });
            saveLibraryFiles(files);
            renderFiles();
            renderFolders();
            alert('✅ تم حفظ المقطع بنجاح!');
        }

        function insertSnippet(id) {
            const files = getLibraryFiles();
            const file = files.find(f => f.id === id);
            if (!file) return;

            // نسخ الكود إلى الحافظة
            navigator.clipboard.writeText(file.content).then(() => {
                alert('✅ تم نسخ المقطع إلى الحافظة! يمكنك لصقه في المحرر.');
            }).catch(() => {
                // إذا فشل النسخ، نعرض الكود في نافذة منبثقة
                prompt('انسخ الكود:', file.content);
            });
        }

        // ==========================================
        // 10. دوال العرض والتحميل
        // ==========================================
        function viewCode(id) {
            const files = getLibraryFiles();
            const file = files.find(f => f.id === id);
            if (!file) return;

            document.getElementById('modalFileName').textContent = file.name;
            document.getElementById('codeContent').textContent = file.content;
            document.getElementById('codeModal').classList.add('active');
        }

        function closeCodeModal() {
            document.getElementById('codeModal').classList.remove('active');
        }

        function previewFile(id) {
            const files = getLibraryFiles();
            const file = files.find(f => f.id === id);
            if (!file) return;

            const modal = document.getElementById('previewModal');
            const frame = document.getElementById('previewFrame');

            document.getElementById('previewTitle').textContent = `معاينة: ${file.name}`;

            // إذا كان الملف HTML أو نصي
            if (file.type === 'html' || file.type === 'javascript' || file.type === 'css') {
                const content = file.type === 'html' ? file.content :
                    `<pre style="padding:20px;background:#1e1e1e;color:#f8f8f2;font-family:monospace;min-height:100vh;margin:0;">${file.content}</pre>`;
                frame.srcdoc = content;
            } else if (file.type === 'image') {
                frame.srcdoc = `
                    <!DOCTYPE html>
                    <html><body style="margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f0f0;">
                        <img src="${file.content}" style="max-width:95%;max-height:95vh;object-fit:contain;">
                    </body></html>
                `;
            } else {
                frame.srcdoc = `
                    <!DOCTYPE html>
                    <html><body style="padding:20px;font-family:sans-serif;background:#f0f0f0;">
                        <h3>${file.name}</h3>
                        <pre style="background:#1e1e1e;color:#f8f8f2;padding:20px;border-radius:8px;overflow:auto;">${file.content || 'لا يوجد محتوى للمعاينة'}</pre>
                    </body></html>
                `;
            }

            modal.classList.add('active');
            frame.className = 'preview-iframe';
        }

        function closePreview() {
            document.getElementById('previewModal').classList.remove('active');
        }

        function setPreviewDevice(device) {
            const frame = document.getElementById('previewFrame');
            frame.className = 'preview-iframe';
            if (device === 'mobile') frame.classList.add('device-mobile');
            if (device === 'tablet') frame.classList.add('device-tablet');

            document.querySelectorAll('.preview-header .device-btns button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.device === device);
            });
        }

        function downloadFile(id) {
            const files = getLibraryFiles();
            const file = files.find(f => f.id === id);
            if (!file) return;

            const blob = new Blob([file.content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = file.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        // ==========================================
        // 11. دوال الإدارة
        // ==========================================
        function renameFile(id) {
            const files = getLibraryFiles();
            const file = files.find(f => f.id === id);
            if (!file) return;

            const newName = prompt('أدخل الاسم الجديد:', file.name);
            if (newName && newName.trim() !== '') {
                file.name = newName.trim();
                saveLibraryFiles(files);
                renderFiles();
            }
        }

        function toggleFavorite(id) {
            const files = getLibraryFiles();
            const file = files.find(f => f.id === id);
            if (!file) return;

            file.favorite = !file.favorite;
            saveLibraryFiles(files);
            renderFiles();
            renderFolders();
        }

        function deleteFile(id) {
            const files = getLibraryFiles();
            const file = files.find(f => f.id === id);
            if (!file) return;

            const isOwner = file.author === getCurrentUser() || !file.author;
            if (!isOwner) {
                alert('عذراً، لا تملك صلاحية حذف هذا الملف.');
                return;
            }

            if (confirm(`هل أنت متأكد من حذف "${file.name}"؟`)) {
                // نقل إلى سلة المحذوفات بدلاً من الحذف النهائي
                file.trash = true;
                saveLibraryFiles(files);
                renderFiles();
                renderFolders();
            }
        }

        function toggleSelect(id) {
            const index = selectedFiles.indexOf(id);
            if (index === -1) {
                selectedFiles.push(id);
            } else {
                selectedFiles.splice(index, 1);
            }
            renderFiles();
        }

        // ==========================================
        // 12. الفلاتر والبحث
        // ==========================================
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            renderFiles();
        }

        function setView(view) {
            currentView = view;
            document.querySelectorAll('.view-toggle button').forEach(btn => {
                btn.classList.toggle('active', btn.querySelector('i').className.includes(view === 'grid' ? 'th' :
                'list'));
            });
            renderFiles();
        }

        // ==========================================
        // 13. تحديث الإحصائيات
        // ==========================================
        function updateStats(files) {
            document.getElementById('fileCount').textContent = files.length;

            const allFiles = getLibraryFiles();
            const folders = allFiles.filter(f => f.type === 'folder' && !f.trash);
            document.getElementById('folderCount').textContent = folders.length;

            let totalSize = 0;
            files.forEach(f => {
                if (f.size) {
                    const size = parseFloat(f.size);
                    if (!isNaN(size)) totalSize += size;
                }
            });
            document.getElementById('totalSize').textContent = totalSize > 1024 ?
                (totalSize / 1024).toFixed(1) + ' MB' :
                totalSize.toFixed(1) + ' KB';
        }

        // ==========================================
        // 14. الشريط الجانبي
        // ==========================================
        function toggleSidebar(force) {
            const sidebar = document.getElementById('sidebarLibrary');
            const main = document.getElementById('mainContent');

            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('open');
                main.classList.toggle('sidebar-open');
            } else if (force !== undefined) {
                sidebar.classList.toggle('open', force);
                main.classList.toggle('sidebar-open', force);
            }
        }

        // ==========================================
        // 15. إغلاق المودال بالضغط خارجها
        // ==========================================
        document.getElementById('codeModal').addEventListener('click', function(e) {
            if (e.target === this) closeCodeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeCodeModal();
                closePreview();
            }
        });

        console.log('📚 But_Seven Library loaded successfully!');
        console.log('💡 Features: Folders, Upload, Preview, Download, Favorites, Trash, Snippets, Search, Filters');
    </script>
</body>
</html>
